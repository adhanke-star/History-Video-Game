    octx.quadraticCurveTo(rx + (rng() - 0.5) * 4, ry, rx + (rng() - 0.5) * 3, ry - rh);
    octx.stroke();
    // reed head
    octx.beginPath();
    octx.ellipse(rx + (rng() - 0.5) * 3, ry - rh, 1.5, 3, 0.3, 0, 6.283);
    octx.fill();
  }
}

/* ----------------------------------------------------------------
   MICRO-DRESSING — seeded per battle
   Draws snake-rail fences, stone walls, orchards, farmstead,
   church+steeple, small graveyard onto the offscreen canvas.
   Each feature is placed once at a fixed seeded position.
   ---------------------------------------------------------------- */
function _drawMicroDressing(octx, M, battleSeed, bs, marginW, marginH, skin) {
  // bs       = bucketScale (world → offscreen pixels)
  // marginW/H = world-unit padding so hex(0,0) center is at (marginW*bs, marginH*bs)
  const rng = mulberry(battleSeed ^ 0xDECAF);
  const cw = hexW() * bs;   // cell width in offscreen pixels
  const ch = HEX * 1.5 * bs;
  const { GW, GH } = M;

  // Map world hex center → offscreen canvas coords (world-space, no camera)
  function hexCenter(c, r) {
    const p = colrowToPixel(c, r);
    // Offset by margin so the map's top-left padding starts at (0,0)
    return { x: (p.x + marginW) * bs, y: (p.y + marginH) * bs };
  }

  function fieldEdgeFences(type) {
    // snake-rail fences along field/clear boundaries — pick ~4 hexes
    const count = 3 + ((rng() * 3) | 0);
    for (let i = 0; i < count; i++) {
      const c = 1 + ((rng() * (GW - 2)) | 0);
      const r = 1 + ((rng() * (GH - 2)) | 0);
      const tile = M.map[M.key(c, r)];
      if (!tile || (tile.t !== "field" && tile.t !== "clear")) continue;
      const { x, y } = hexCenter(c, r);
      octx.save();
      octx.strokeStyle = skin === 0 ? "rgba(100,70,40,0.65)" : "rgba(80,55,30,0.55)";
      octx.lineWidth = 1.2;
      const hw = cw * 0.38;
      // zig-zag rail pattern
      octx.beginPath();
      for (let seg = 0; seg < 5; seg++) {
        const zx = x - hw + seg * (hw * 0.5);
        const zy = y + (seg % 2 === 0 ? -4 : 4);
        seg === 0 ? octx.moveTo(zx, zy) : octx.lineTo(zx, zy);
      }
      octx.stroke();
      octx.restore();
    }
  }

  function ridgeStoneWalls() {
    const count = 2 + ((rng() * 3) | 0);
    for (let i = 0; i < count; i++) {
      const c = 1 + ((rng() * (GW - 2)) | 0);
      const r = 1 + ((rng() * (GH - 2)) | 0);
      const tile = M.map[M.key(c, r)];
      if (!tile || tile.t !== "ridge") continue;
      const { x, y } = hexCenter(c, r);
      octx.save();
      octx.strokeStyle = "rgba(120,100,80,0.7)";
      octx.lineWidth = 2.5;
      octx.lineCap = "round";
      octx.beginPath();
      octx.moveTo(x - cw * 0.3, y + 2);
      octx.lineTo(x + cw * 0.3, y + 2);
      octx.stroke();
      // stone dots
      octx.fillStyle = "rgba(140,120,90,0.55)";
      for (let k = 0; k < 5; k++) {
        octx.beginPath();
        octx.arc(x - cw * 0.28 + k * cw * 0.14, y + 2, 1.5, 0, 6.283);
        octx.fill();
      }
      octx.restore();
    }
  }

  function orchardRows() {
    const c = 2 + ((rng() * (GW - 4)) | 0);
    const r = 2 + ((rng() * (GH - 4)) | 0);
    const tile = M.map[M.key(c, r)];
    if (!tile || (tile.t !== "field" && tile.t !== "clear")) return;
    const { x, y } = hexCenter(c, r);
    const treeCol = skin === 0 ? "rgba(80,110,50,0.8)" : "rgba(65,88,38,0.75)";
    octx.fillStyle = treeCol;
    for (let row = 0; row < 2; row++) {
      for (let col = 0; col < 3; col++) {
        const tx = x - cw * 0.28 + col * cw * 0.28;
        const ty = y - ch * 0.15 + row * ch * 0.2;
        octx.beginPath();
        octx.arc(tx, ty, 4, 0, 6.283);
        octx.fill();
      }
    }
  }

  function farmstead() {
    const c = 2 + ((rng() * (GW - 4)) | 0);
    const r = 2 + ((rng() * (GH - 4)) | 0);
    const tile = M.map[M.key(c, r)];
    if (!tile || tile.t !== "clear") return;
    const { x, y } = hexCenter(c, r);
    // small barn
    const barnW = cw * 0.16, barnH = ch * 0.14;
    octx.fillStyle = skin === 0 ? "#8a4a30" : "#6a3020";
    octx.fillRect(x - barnW, y - barnH, barnW * 2, barnH * 1.2);
    // barn roof
    octx.fillStyle = skin === 0 ? "#4a2818" : "#3a1e10";
    octx.beginPath();
    octx.moveTo(x - barnW, y - barnH);
    octx.lineTo(x + barnW, y - barnH);
    octx.lineTo(x, y - barnH * 2);
    octx.closePath();
    octx.fill();
    // fence posts
    octx.strokeStyle = "rgba(100,70,40,0.5)";
    octx.lineWidth = 1;
    for (let f = 0; f < 4; f++) {
      octx.beginPath();
      octx.moveTo(x + barnW + f * 5, y - 3);
      octx.lineTo(x + barnW + f * 5, y + 5);
      octx.stroke();
    }
  }

  function church() {
    const c = ((GW / 2) | 0) + (((rng() - 0.5) * 4) | 0);
    const r = ((GH / 2) | 0) + (((rng() - 0.5) * 3) | 0);
    const tile = M.map[M.key(c, r)];
    if (!tile || (tile.t !== "town" && tile.t !== "clear")) return;
    const { x, y } = hexCenter(c, r);
    const bw = cw * 0.11, bh = ch * 0.18;
    // nave
    octx.fillStyle = skin === 0 ? "#c4b490" : "#a89870";
    octx.fillRect(x - bw, y - bh * 0.6, bw * 2, bh);
    // gable
    octx.fillStyle = skin === 0 ? "#7a4030" : "#5e2e20";
    octx.beginPath();
    octx.moveTo(x - bw, y - bh * 0.6);
    octx.lineTo(x + bw, y - bh * 0.6);
    octx.lineTo(x, y - bh);
    octx.closePath();
    octx.fill();
    // steeple
    const stx = x, sty = y - bh;
    const sh = bh * 0.9;
    octx.fillStyle = skin === 0 ? "#9a8060" : "#7a6040";
    octx.fillRect(stx - bw * 0.3, sty - sh * 0.5, bw * 0.6, sh * 0.5);
    octx.beginPath();
    octx.moveTo(stx - bw * 0.3, sty - sh * 0.5);
    octx.lineTo(stx + bw * 0.3, sty - sh * 0.5);
    octx.lineTo(stx, sty - sh);
    octx.closePath();
    octx.fillStyle = skin === 0 ? "#605040" : "#403020";
    octx.fill();
    // cross
    octx.strokeStyle = "rgba(50,35,20,0.8)";
    octx.lineWidth = 1;
    octx.beginPath();
    octx.moveTo(stx, sty - sh * 0.85);
    octx.lineTo(stx, sty - sh * 1.08);
    octx.moveTo(stx - bw * 0.2, sty - sh * 0.98);
    octx.lineTo(stx + bw * 0.2, sty - sh * 0.98);
    octx.stroke();
  }

  function graveyard() {
    const c = 1 + ((rng() * (GW - 2)) | 0);
    const r = 1 + ((rng() * (GH - 2)) | 0);
    const tile = M.map[M.key(c, r)];
    if (!tile || tile.t === "river" || tile.t === "water") return;
    const { x, y } = hexCenter(c, r);
    // small markers
    octx.fillStyle = "rgba(180,170,155,0.65)";
    for (let k = 0; k < 5; k++) {
      const mx = x + (k - 2) * 5;
      const my = y + (k % 2 === 0 ? 0 : -3);
      // headstone shape
      octx.fillRect(mx - 1.5, my - 5, 3, 5);
      octx.beginPath();
      octx.arc(mx, my - 5, 1.5, Math.PI, 0);
      octx.fill();
    }
    // low fence
    octx.strokeStyle = "rgba(120,110,90,0.5)";
    octx.lineWidth = 0.8;
    octx.strokeRect(x - 14, y - 8, 28, 14);
  }

  // Draw all micro features
  fieldEdgeFences();
  ridgeStoneWalls();
  orchardRows();
  farmstead();
  church();
  graveyard();
}

/* ----------------------------------------------------------------
   ELEVATION SHADOW — soft SE drop shadow under hills/ridge
   Painted as a semi-transparent gradient arc on the SE side.
   ---------------------------------------------------------------- */
function _drawElevShadow(octx, sx, sy, rad) {
  const grd = octx.createRadialGradient(
    sx + rad * 0.28, sy + rad * 0.3, rad * 0.2,
    sx + rad * 0.28, sy + rad * 0.3, rad * 0.9
  );
  grd.addColorStop(0, "rgba(0,0,0,0)");
  grd.addColorStop(1, "rgba(0,0,0,0.18)");
  octx.fillStyle = grd;
  octx.fill(); // applied on existing path
}

/* ----------------------------------------------------------------
   COMPASS ROSE  (drawn directly on main ctx)
   ---------------------------------------------------------------- */
function _drawCompassRose(mainCtx, x, y, size) {
  const c = mainCtx;
  c.save();
  c.translate(x, y);
  // cardinal arms
  const arms = [
    [0, -1, "N"], [1, 0, "E"], [0, 1, "S"], [-1, 0, "W"]
  ];
  for (const [dx, dy, lbl] of arms) {
    const isN = lbl === "N";
    c.fillStyle = isN ? "#c9a85f" : "#e8dcc0";
    c.strokeStyle = "rgba(20,14,8,0.7)";
    c.lineWidth = 0.8;
    // arrow
    c.beginPath();
    c.moveTo(dx * size * 0.06, dy * size * 0.06);
    c.lineTo(dx * size + dy * size * 0.22, dy * size - dx * size * 0.22);
    c.lineTo(dx * size, dy * size);
    c.lineTo(dx * size - dy * size * 0.22, dy * size + dx * size * 0.22);
    c.closePath();
    c.fill();
    c.stroke();
    // label
    c.fillStyle = "#e8dcc0";
    c.font = `bold ${Math.round(size * 0.45)}px "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif`;
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillText(lbl, dx * size * 1.55, dy * size * 1.55);
  }
  // center circle
  c.beginPath();
  c.arc(0, 0, size * 0.18, 0, 6.283);
  c.fillStyle = "#c9a85f";
  c.fill();
  c.strokeStyle = "#2b2118";
  c.lineWidth = 1;
  c.stroke();
  c.restore();
}

/* ----------------------------------------------------------------
   SCALE BAR  (drawn on main ctx)
   ---------------------------------------------------------------- */
function _drawScaleBar(mainCtx, x, y, zoom) {
  const c = mainCtx;
  // one hex = "1 mile" for display
  const hexPx = hexW() * zoom;
  const barLen = hexPx * 2; // 2 hexes = "2 mi"
  const h = 5;
  c.save();
  c.fillStyle = "#2b2118";
  c.strokeStyle = "#c9a85f";
  c.lineWidth = 1;
  // outer rect
  c.strokeRect(x, y, barLen, h);
  // left half — dark
  c.fillStyle = "#4a3c2c";
  c.fillRect(x, y, barLen / 2, h);
  // right half — light
  c.fillStyle = "#c9a85f";
  c.fillRect(x + barLen / 2, y, barLen / 2, h);
  // text
  c.fillStyle = "#e8dcc0";
  c.font = `${Math.round(Math.max(8, 9))}px "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif`;
  c.textAlign = "left";
  c.textBaseline = "bottom";
  c.fillText("0", x, y);
  c.textAlign = "center";
  c.fillText("1 mi", x + barLen / 2, y);
  c.textAlign = "right";
  c.fillText("2 mi", x + barLen, y);
  c.restore();
}

/* ----------------------------------------------------------------
   _rrectPath helper — roundRect with safe fallback
   ---------------------------------------------------------------- */
function _rrectPath(c, x, y, w, h, r) {
  if (typeof c.roundRect === "function") {
    c.beginPath();
    c.roundRect(x, y, w, h, r);
  } else {
    // fallback: simple rect
    c.beginPath();
    c.rect(x, y, w, h);
  }
}

/* ----------------------------------------------------------------
   BATTLE-NAME CARTOUCHE  (drawn on main ctx)
   ---------------------------------------------------------------- */
function _drawCartouche(mainCtx, x, y, w, bd) {
  const c = mainCtx;
  const text = bd.name + ", " + bd.year;
  c.save();
  // parchment bg
  const pad = 8;
  c.font = `bold 14px "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif`;
  const tw = c.measureText(text).width;
  const bw = Math.max(w, tw + pad * 2);
  const bh = 28;
  const bx = x - bw / 2;
  const by = y - bh / 2;
  // shadow
  c.fillStyle = "rgba(0,0,0,0.4)";
  _rrectPath(c, bx + 2, by + 2, bw, bh, 3);
  c.fill();
  // parchment
  const grd = c.createLinearGradient(bx, by, bx, by + bh);
  grd.addColorStop(0, "#e8dcc0");
  grd.addColorStop(1, "#d4c08a");
  c.fillStyle = grd;
  _rrectPath(c, bx, by, bw, bh, 3);
  c.fill();
  // border
  c.strokeStyle = "#9c7a3c";
  c.lineWidth = 1.5;
  c.stroke();
  // inner rule
  c.strokeStyle = "rgba(156,122,60,0.4)";
  c.lineWidth = 0.5;
  _rrectPath(c, bx + 3, by + 3, bw - 6, bh - 6, 2);
  c.stroke();
  // text
  c.fillStyle = "#2b2118";
  c.textAlign = "center";
  c.textBaseline = "middle";
  c.fillText(text, x, y + 1);
  c.restore();
}

/* ----------------------------------------------------------------
   FAMOUS FEATURES — resolve labels to hex positions and draw them
   ---------------------------------------------------------------- */
function _drawFamousFeatures(mainCtx, M, bd, zoom) {
  // Authored maps carry exact-hex features ({c,r,label,conf}); they win over the
  // tag-scan placement used for generator-built battles.
  const authored = M.authoredFeatures && M.authoredFeatures.length ? M.authoredFeatures : null;
  const features = authored || FAMOUS_FEATURES[bd.id];
  if (!features || !features.length) return;

  // Gather hex candidates by terrain tag
  const byTag = {};
  for (const k in M.map) {
    const tile = M.map[k];
    if (!byTag[tile.t]) byTag[tile.t] = [];
    byTag[tile.t].push(tile);
  }

  const c = mainCtx;
  c.save();
  c.font = `italic ${Math.max(8, Math.round(9 + zoom * 2))}px "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif`;
  c.textAlign = "left";
  c.textBaseline = "middle";

  // Track used tiles to avoid overlap
  const usedHexes = new Set();

  for (const feat of features) {
    let best;
    // Authored feature: place at the exact hex it names.
    if (feat.c != null && feat.r != null) {
      best = M.map[M.key(feat.c, feat.r)];
      if (!best || usedHexes.has(M.key(best.c, best.r))) continue;
      usedHexes.add(M.key(best.c, best.r));
      const wp0 = colrowToPixel(best.c, best.r);
      const sp0 = worldToScreen(wp0.x, wp0.y);
      const sy0 = _tiledY(sp0.y, best.elev || 0, zoom);
      const sx0 = sp0.x;
      const rad0 = HEX * zoom * 0.98;
      const lx0 = sx0 + rad0 * 0.6, ly0 = sy0 - rad0 * 0.8;
      c.strokeStyle = "rgba(60,40,20,0.7)"; c.lineWidth = 0.8; c.setLineDash([2, 2]);
      c.beginPath(); c.moveTo(sx0, sy0); c.lineTo(lx0, ly0); c.stroke(); c.setLineDash([]);
      const tw0 = c.measureText(feat.label).width, lpad0 = 3;
      c.fillStyle = "rgba(232,220,192,0.88)";
      _rrectPath(c, lx0 - lpad0, ly0 - 7, tw0 + lpad0 * 2, 13, 2); c.fill();
      c.strokeStyle = "rgba(156,122,60,0.6)"; c.lineWidth = 0.6; c.stroke();
      c.fillStyle = "#2b2118"; c.fillText(feat.label, lx0, ly0);
      continue;
    }
    const candidates = (byTag[feat.tag] || []).filter(t => !usedHexes.has(M.key(t.c, t.r)));
    if (!candidates.length) continue;

    // posHint-based selection: divide map into quadrants and pick nearest
    best = candidates[0];
    const { GW, GH } = M;
    const hint = feat.posHint || "center";
    let targetC = GW / 2, targetR = GH / 2;
    if (hint.includes("top"))    targetR = GH * 0.25;
    if (hint.includes("bottom")) targetR = GH * 0.75;
    if (hint.includes("left"))   targetC = GW * 0.25;
    if (hint.includes("right"))  targetC = GW * 0.75;
    if (hint === "center-low")   { targetC = GW * 0.5; targetR = GH * 0.55; }
    if (hint === "top-left")     { targetC = GW * 0.25; targetR = GH * 0.2; }
    if (hint === "top-right")    { targetC = GW * 0.75; targetR = GH * 0.2; }
    if (hint === "right-low")    { targetC = GW * 0.75; targetR = GH * 0.65; }

    let bestDist = 1e9;
    for (const t of candidates) {
      const d = (t.c - targetC) ** 2 + (t.r - targetR) ** 2;
      if (d < bestDist) { bestDist = d; best = t; }
    }
    usedHexes.add(M.key(best.c, best.r));

    // Compute screen position (including tilt)
    const wp = colrowToPixel(best.c, best.r);
    const sp = worldToScreen(wp.x, wp.y);
    const elev = best.elev || 0;
    const sy = _tiledY(sp.y, elev, zoom);
    const sx = sp.x;
    const rad = HEX * zoom * 0.98;

    // Leader line from center to label offset
    const lx = sx + rad * 0.6;
    const ly = sy - rad * 0.8;

    c.strokeStyle = "rgba(60,40,20,0.7)";
    c.lineWidth = 0.8;
    c.setLineDash([2, 2]);
    c.beginPath();
    c.moveTo(sx, sy);
    c.lineTo(lx, ly);
    c.stroke();
    c.setLineDash([]);

    // Label box
    const tw = c.measureText(feat.label).width;
    const lpad = 3;
    c.fillStyle = "rgba(232,220,192,0.88)";
    _rrectPath(c, lx - lpad, ly - 7, tw + lpad * 2, 13, 2);
    c.fill();
    c.strokeStyle = "rgba(156,122,60,0.6)";
    c.lineWidth = 0.6;
    c.stroke();
    // Text
    c.fillStyle = "#2b2118";
    c.fillText(feat.label, lx, ly);
  }
  c.restore();
}

/* ----------------------------------------------------------------
   RENDER TERRAIN LAYER TO OFFSCREEN CANVAS  — WORLD-SPACE
   Renders the ENTIRE map once per cache key into a world-space canvas.
   NO worldToScreen calls here — coordinates are raw colrowToPixel × bs.

   The offscreen origin (0,0) corresponds to world point (-marginW, -marginH)
   so hex(0,0) center lands at (marginW*bs, marginH*bs) inside the canvas.

   Called only on a cache miss; blit in draw() applies the camera transform.
   ---------------------------------------------------------------- */
/* ----------------------------------------------------------------
   PAINTED TERRAIN TILES  (graphics pivot 2026-06-14 — locked: painted
   hex-tile set, single-file lock relaxed to allow a sibling assets/ folder).
   Realism comes from painted raster art, not procedural code. Each terrain
   type may be skinned by a painted PNG in assets/terrain/<key>.png.

   file:// constraint: fetch()/XHR to local files is BLOCKED by browsers, but
   `new Image().src="assets/..."` loads fine — so we use a static key→path map
   and Image() preload. ANY tile that fails to load (missing file, 404) leaves
   that terrain on the existing procedural renderer. Zero art → game looks
   exactly as before; drop a PNG in → that terrain becomes painted. Fully
   incremental, no manifest file, no network.
   ---------------------------------------------------------------- */
const TILE_SRC = {
  clear: "assets/terrain/clear.png", field: "assets/terrain/field.png",
  woods: "assets/terrain/woods.png", hills: "assets/terrain/hills.png",
  ridge: "assets/terrain/ridge.png", town:  "assets/terrain/town.png",
  road:  "assets/terrain/road.png",  river: "assets/terrain/river.png",
  ford:  "assets/terrain/ford.png",  swamp: "assets/terrain/swamp.png",
  fort:  "assets/terrain/fort.png",  water: "assets/terrain/water.png",
  shoal: "assets/terrain/shoal.png",
};
const _TILE = {}; // key -> { img, ok:true|false|undefined(=loading) }
function _preloadTiles() {
  if (typeof Image === "undefined") return; // jsdom/headless: skip → procedural
  for (const k in TILE_SRC) {
    const rec = { img: new Image(), ok: undefined };
    rec.img.onload  = function () { rec.ok = rec.img.naturalWidth > 0; _onTileLoaded(); };
    rec.img.onerror = function () { rec.ok = false; };
    try { rec.img.src = TILE_SRC[k]; } catch (e) { rec.ok = false; }
    _TILE[k] = rec;
  }
}
function _onTileLoaded() {
  // A painted tile arrived after the terrain was already cached → drop the
  // stale offscreen canvases and repaint so the new art shows immediately.
  if (typeof _terrainCache !== "undefined" && _terrainCache.clear) _terrainCache.clear();
  if (G && G.mode === "battle" && typeof draw === "function") draw();
}
function _tileReady(t) {
  const r = _TILE[t];
  return (r && r.ok && r.img.complete) ? r.img : null;
}

function _renderTerrainToOffscreen(B, skin, zb) {
  const M = B.M;
  const { worldW, worldH, marginW, marginH } = _worldExtents(M);
  const bs = _bucketScale(zb, M);
  // bs-scaled radius for hex drawing (world-space, no camera)
  const rad = HEX * bs * 0.98;

  // Offscreen canvas: world extents × bucketScale (no DPR — intermediate buffer)
  const off = document.createElement("canvas");
  off.width  = Math.ceil(worldW * bs);
  off.height = Math.ceil(worldH * bs);
  const octx = off.getContext("2d");
  // No DPR transform — this canvas is a world-space buffer, not a display surface

  const grain = _getGrainPattern(skin);

  for (let r = 0; r < M.GH; r++) {
    for (let c = 0; c < M.GW; c++) {
      const t = M.map[M.key(c, r)];
      if (!t) continue;
      const wp = colrowToPixel(c, r);
      // World-space position in offscreen canvas coords (no camera, no worldToScreen)
      // The margin shifts world origin so the top-left of the map has padding.
      const sx = (wp.x + marginW) * bs;
      const elev = t.elev || 0;
      // Tilt: vertical squash applied via transform; elevation y-offset in world units × bs
      const sy = (wp.y + marginH) * bs + elev * (-TILT_ELEV_PX) * bs;

      const squash = TILT_SQUASH;
      // Draw hex with vertical squash
      octx.save();
      octx.translate(sx, sy);
      octx.scale(1, squash);
      octx.translate(-sx, -sy);

      const col = (PALETTE[skin] && PALETTE[skin][t.t]) || "#bbb";
      const paintImg = _tileReady(t.t);
      const tileRng = mulberry(hashStr(B.bd.id + c + "," + r));

      if (paintImg) {
        // Painted tile: clip to the hex and cover its bbox, seeded H-flip so
        // adjacent same-terrain hexes don't read as an obvious repeat.
        _hexClipPath(octx, sx, sy, rad);
        octx.save();
        octx.clip();
        const fx = tileRng() < 0.5 ? 1 : -1;
        if (fx === -1) { octx.translate(sx, 0); octx.scale(-1, 1); octx.translate(-sx, 0); }
        // pointy-top hex is taller than wide → over-cover vertically
        octx.drawImage(paintImg, sx - rad, sy - rad * 1.16, rad * 2, rad * 2.32);
        octx.restore();
      } else {
        // Fill base
        _hexClipPath(octx, sx, sy, rad);
        octx.fillStyle = col;
        octx.fill();
        // Apply grain texture
        if (grain) {
          _hexClipPath(octx, sx, sy, rad);
          octx.fillStyle = grain;
          octx.fill();
        }
      }

      octx.restore();

      // Draw terrain-specific details (no squash — billboard art on top).
      // Skipped entirely when a painted tile carries the look (paintImg).
      octx.save();

      // Terrain-specific features
      if (paintImg) {
        /* painted tile carries the whole look — no procedural feature overdraw */
      } else if (t.t === "woods") {
        _hexClipPath(octx, sx, sy, rad);
        octx.fillStyle = col;
        octx.fill();
        _drawWoodsCanopy(octx, sx, sy, rad, tileRng, skin);
      } else if (t.t === "river") {
        _drawRiver(octx, sx, sy, rad, tileRng, skin);
      } else if (t.t === "ford") {
        _drawFord(octx, sx, sy, rad, tileRng, skin);
      } else if (t.t === "town") {
        _drawTown(octx, sx, sy, rad, tileRng, skin);
      } else if (t.t === "fort") {
        _hexClipPath(octx, sx, sy, rad);
        octx.fillStyle = col;
        octx.fill();
        _drawFort(octx, sx, sy, rad, tileRng, skin);
      } else if (t.t === "road") {
        _hexClipPath(octx, sx, sy, rad);
        octx.fillStyle = col;
        octx.fill();
        _drawRoad(octx, sx, sy, rad, tileRng, skin);
      } else if (t.t === "swamp") {
        _hexClipPath(octx, sx, sy, rad);
        octx.fillStyle = col;
        octx.fill();
        _drawSwamp(octx, sx, sy, rad, tileRng, skin);
      }

      // Elevation SE shadow (hills, ridge) — procedural only; painted tiles supply their own light
      if (!paintImg && (t.t === "hills" || t.t === "ridge")) {
        _hexClipPath(octx, sx, sy, rad);
        octx.fillStyle = (PALETTE[skin] && PALETTE[skin][t.t]) || col;
        octx.fill();
        // highlight top-left (light NW)
        octx.fillStyle = "rgba(255,245,200,0.12)";
        octx.fill();
        _drawElevShadow(octx, sx, sy, rad);
      }

      // Water shimmer — procedural only
      if (!paintImg && t.t === "water") {
        _hexClipPath(octx, sx, sy, rad);
        octx.fillStyle = col;
        octx.fill();
        const wg = octx.createLinearGradient(sx - rad, sy - rad, sx + rad, sy + rad);
        wg.addColorStop(0, "rgba(255,255,255,0.08)");
        wg.addColorStop(0.5, "rgba(255,255,255,0)");
        wg.addColorStop(1, "rgba(0,0,0,0.10)");
        octx.fillStyle = wg;
        octx.fill();
      }

      octx.restore();

      // Hex outline
      _hexClipPath(octx, sx, sy, rad);
      octx.lineWidth = skin === 2 ? 0.8 : 1.1;
      octx.strokeStyle = skin === 0 ? "rgba(43,33,24,0.45)" :
                         skin === 1 ? "rgba(20,14,8,0.55)" :
                                      "rgba(80,70,50,0.28)";
      octx.stroke();

      // Objective flag marker (baked into terrain layer since owner is in cache key)
      if (t.obj) {
        const oc = t.owner === "US" ? "#3d6098" : t.owner === "CS" ? "#9a7d62" : "#5a4a32";
        octx.fillStyle = oc;
        octx.strokeStyle = "#1a130c";
        octx.lineWidth = 1.5;
        const fx = sx, fy = sy - rad * 0.15;
        octx.beginPath();
        octx.moveTo(fx, fy + rad * 0.5);
        octx.lineTo(fx, fy - rad * 0.5);
        octx.stroke();
        octx.beginPath();
        octx.moveTo(fx, fy - rad * 0.5);
        octx.lineTo(fx + rad * 0.45, fy - rad * 0.32);
        octx.lineTo(fx, fy - rad * 0.14);
        octx.closePath();
        octx.fill();
        octx.fillStyle = "rgba(232,220,192,0.85)";
        octx.font = `${Math.max(8, rad * 0.32)}px serif`;
        octx.textAlign = "center";
        octx.fillText("★".repeat(t.obj.val), sx, sy + rad * 0.62);
      }

      // Fog veil (cool blue-grey soft wash — NOT black).
      // fogSig is part of the cache key so this is valid for the life of the cache entry.
      const vis = isVisible(c, r);
      if (!vis) {
        _hexClipPath(octx, sx, sy, rad);
        // Layered cool blue-grey wash
        octx.fillStyle = "rgba(80,100,130,0.55)";
        octx.fill();
        octx.fillStyle = "rgba(40,60,90,0.28)";
        octx.fill();
        octx.strokeStyle = "rgba(60,80,110,0.35)";
        octx.lineWidth = 1;
        octx.stroke();
      }
    }
  }

  // Micro-dressing on top (battle-seeded, drawn in world-space offscreen coords)
  const battleSeed = hashStr(B.bd.id);
  _drawMicroDressing(octx, M, battleSeed, bs, marginW, marginH, skin);

  return off;
}

/* ----------------------------------------------------------------
   MAIN draw() OVERRIDE
   Per-frame: get/build offscreen cache, blit, then draw dynamic layers.
   ---------------------------------------------------------------- */
function draw() {
  if (G.mode !== "battle" || !G.battle) {
    ctx.clearRect(0, 0, Wc, Hc);
    return;
  }

  // Modern (3D) renderer takes over the battlefield; the DOM HUD + minimap stay 2D.
  if (typeof _m3dModern === "function" && _m3dModern() && typeof __M3D !== "undefined" && __M3D && __M3D.ready) {
    _m3dSync();
    if (typeof drawMini === "function") drawMini();
    return;
  }

  const B = G.battle;
  const M = B.M;
  const skin = G.settings.render;
  const z = G.cam.z;
  const rad = HEX * z * 0.98;

  ctx.clearRect(0, 0, Wc, Hc);

  // --- TERRAIN CACHE: get or build world-space offscreen canvas ---
  const cacheKey = _makeCacheKey(B, skin);
  // Zoom bucket needed both for key lookup and for rendering
  const zb = Math.floor(z * 4);
  let cached = _terrainCache.get(cacheKey);

  if (!cached) {
    cached = _renderTerrainToOffscreen(B, skin, zb);
    _terrainCache.set(cacheKey, cached);
    _evictCache();
  }

  // --- BLIT: camera transform maps world-space canvas → screen ---
  // The world-space canvas origin corresponds to world point (-marginW, -marginH).
  // Its screen position is worldToScreen(-marginW, -marginH).
  // The canvas covers (worldW × worldH) world units, scaled to (worldW*z × worldH*z) screen px.
  // drawImage rescales from (worldW*bs) canvas pixels to (worldW*z) screen pixels automatically.
  //
  // Alignment proof: cached pixel for hex(c,r) is at x=(wp.x+marginW)*bs inside the canvas.
  // drawImage maps that to screen x = blitX + (wp.x+marginW)*bs * (worldW*z)/(worldW*bs)
  //                                        = blitX + (wp.x+marginW)*z
  // worldToScreen(wp.x, wp.y).x = (wp.x - cam.x)*z + Wc/2
  // Setting equal: blitX = (-marginW - cam.x)*z + Wc/2 = worldToScreen(-marginW, -marginH).x ✓
  // Same identity holds for y. Units and terrain are drawn from the same worldToScreen transform.
  const { worldW, worldH, marginW, marginH } = _worldExtents(M);
  const blitOrigin = worldToScreen(-marginW, -marginH);
  ctx.drawImage(cached, blitOrigin.x, blitOrigin.y, worldW * z, worldH * z);

  // --- DYNAMIC LAYER 1: Reach overlay (green) ---
  if (G.reach) {
    for (const k of G.reach.keys()) {
      const [c, r] = k.split(",").map(Number);
      const wp = colrowToPixel(c, r);
      const sp = worldToScreen(wp.x, wp.y);
      hexPath(sp.x, sp.y, rad * 0.9);
      ctx.fillStyle = "rgba(120,180,90,0.22)";
      ctx.fill();
      ctx.strokeStyle = "rgba(140,200,110,0.5)";
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // --- DYNAMIC LAYER 2: Fire / charge reticles ---
  function _drawTargetSet(set, col) {
    if (!set) return;
    for (const k of set) {
      const [c, r] = k.split(",").map(Number);
      const wp = colrowToPixel(c, r);
      const sp = worldToScreen(wp.x, wp.y);
      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, rad * 0.62, 0, 6.283);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sp.x - rad * 0.7, sp.y);
      ctx.lineTo(sp.x + rad * 0.7, sp.y);
      ctx.moveTo(sp.x, sp.y - rad * 0.7);
      ctx.lineTo(sp.x, sp.y + rad * 0.7);
      ctx.stroke();
    }
  }
  _drawTargetSet(G.fireT, "rgba(168,61,51,0.9)");
  _drawTargetSet(G.chargeT, "rgba(201,168,95,0.95)");

  // --- DYNAMIC LAYER 3: Units (after terrain blit, before selection rings) ---
  for (const u of B.units) {
    if (!u.alive) continue;
    if (u.side === B.enemySide && !u.spotted) continue;
    const wp = colrowToPixel(u.c, u.r);
    const sp = worldToScreen(wp.x, wp.y);
    if (sp.x < -rad * 2 || sp.x > Wc + rad * 2 ||
        sp.y < -rad * 2 || sp.y > Hc + rad * 2) continue;
    // Seam: use drawUnitSprite if G2 is loaded, else fallback to legacy drawUnit
    if (typeof drawUnitSprite === "function") {
      drawUnitSprite(u, sp.x, sp.y, rad, skin);
    } else {
      drawUnit(u, sp.x, sp.y, rad, skin);
    }
    // Colorblind aid: a side glyph so blue/gray is never the only cue. (WCAG 1.4.1)
    if (G.settings && G.settings.cbAids) {
      const gl = u.side === "US" ? "✦" : "✕";
      ctx.save();
      ctx.font = "bold " + Math.max(9, Math.round(rad * 0.55)) + "px Georgia,serif";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.lineWidth = 2.5; ctx.strokeStyle = "rgba(20,14,8,0.85)";
      ctx.fillStyle = u.side === "US" ? "#dCe6f5" : "#f0e2c4";
      const gy = sp.y - rad * 0.95;
      ctx.strokeText(gl, sp.x, gy); ctx.fillText(gl, sp.x, gy);
      ctx.restore();
    }
  }

  // --- DYNAMIC LAYER 4: Selection ring ---
  if (G.sel && G.sel.alive) {
    const wp = colrowToPixel(G.sel.c, G.sel.r);
    const sp = worldToScreen(wp.x, wp.y);
    ctx.strokeStyle = "#c9a85f";
    ctx.lineWidth = 3;
    hexPath(sp.x, sp.y, rad * 0.96);
    ctx.stroke();
    ctx.strokeStyle = "rgba(201,168,95,0.4)";
    ctx.lineWidth = 6;
    ctx.stroke();
  }

  // --- DYNAMIC LAYER 5: Hover ring (doubles as the keyboard aim cursor) ---
  if (G.hover) {
    const wp = colrowToPixel(G.hover.c, G.hover.r);
    const sp = worldToScreen(wp.x, wp.y);
    if (G.order) {
      // Pending order → a bold dashed brass reticle so keyboard users can aim.
      ctx.save();
      ctx.strokeStyle = "#c9a85f";
      ctx.lineWidth = 2.5;
      ctx.setLineDash([5, 4]);
      hexPath(sp.x, sp.y, rad * 0.92);
      ctx.stroke();
      ctx.restore();
    } else {
      ctx.strokeStyle = "rgba(232,220,192,0.4)";
      ctx.lineWidth = 1.5;
      hexPath(sp.x, sp.y, rad * 0.96);
      ctx.stroke();
    }
  }

  // --- DYNAMIC LAYER 6: Anim flashes (G.anim fallback — G3 takes over when present) ---
  for (const f of G.anim) {
    const wp = colrowToPixel(f.c, f.r);
    const sp = worldToScreen(wp.x, wp.y);
    const a = f.t / f.max;
    ctx.globalAlpha = a;
    ctx.fillStyle = f.type === "fire" ? "rgba(220,120,40,0.8)" : "rgba(220,200,120,0.85)";
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, rad * (1.1 - a * 0.5), 0, 6.283);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // --- DYNAMIC LAYER 7: FX from G3 ---
  if (typeof drawFX === "function") {
    drawFX();
  }

  // --- MAP FURNITURE (drawn on top in screen corners) ---
  const compassSize = Math.max(16, Math.min(28, z * 24));
  _drawCompassRose(ctx, Wc - 48 - compassSize * 0.5, compassSize * 1.8 + 6, compassSize);
  _drawScaleBar(ctx, 12, Hc - 28, z);
  _drawCartouche(ctx, Wc / 2, 12, 240, B.bd);

  // --- FAMOUS FEATURES LABELS ---
  _drawFamousFeatures(ctx, M, B.bd, z);

  // --- MINIMAP (always last) ---
  drawMini();
}

/* ==== §18 — SPRITE THEATER (G2) ==== */

// G2 contract: define drawUnitSprite(u, sx, sy, rad, skin) only.
// Never redeclares draw() or drawUnit(). No Math.random — all randomness
// seeded from u.id via mulberry32. Offscreen sprite cache (Map, cap 64).
// LOD from G.cam.z + (G.lodBias||0). spriteBudgetCheck(dt) implements
// the 22ms/30-frame rule. Flag sine ripple gated on !G.settings.reduceMotion
// and battle-active. Badges compact above formation (morale, ammo, xp).
// Union #2b4d7e, CS butternut #8a7d66, parchment accents.

// ── Sprite cache ──────────────────────────────────────────────────────────
const _spriteCache = new Map(); // key → {cv, width, height}
const _SPRITE_CAP = 64;

function _spriteEvict() {
  // evict oldest entries to stay under cap
  const keys = Array.from(_spriteCache.keys());
  while (_spriteCache.size > _SPRITE_CAP) {
    _spriteCache.delete(keys.shift());
  }
}

// ── LOD tiers ─────────────────────────────────────────────────────────────
// 0 = full (zoom ≥ 0.9): 20+ figures
// 1 = half (0.55–0.9):   ~10 figures
// 2 = block (<0.55):     massed block + flag only
function _lodTier(zoom) {
  const bias = (typeof G !== "undefined" && G.lodBias) ? (G.lodBias | 0) : 0;
  let tier;
  if (zoom >= 0.9)      tier = 0;
  else if (zoom >= 0.55) tier = 1;
  else                   tier = 2;
  return Math.min(2, tier + bias);
}

// ── Figure count from strength + LOD ──────────────────────────────────────
function _figureCount(u, tier) {
  const strFrac = (u.maxStr > 0) ? Math.max(0, Math.min(1, u.strength / u.maxStr)) : 1;
  // full count by type
  const full = (u.type === "inf") ? 22
             : (u.type === "cav") ? 14
             : (u.type === "art") ? 9   // 3 guns × 3 crew
             : (u.type === "nav") ? 1
             : (u.type === "fort") ? 5
             : (u.type === "hq")   ? 2
             : 10;
  const lodMult = tier === 0 ? 1.0 : tier === 1 ? 0.5 : 0;
  if (tier === 2) return 0; // block mode — no individual figures
  let count = Math.round(full * lodMult * strFrac);
  // floor 4 before block tier kicks in (block only at tier 2)
  if (tier <= 1) count = Math.max(4, count);
  return count;
}

// ── Pose bucket ───────────────────────────────────────────────────────────
// Encodes state variants that change the sprite shape.
// 0=normal, 1=routed, 2=done(acted), 3=ent>0, 4=ammo-out
function _poseBucket(u) {
  if (u.routed)    return 1;
  if (u.done)      return 2;
  if (u.ent > 0)   return 3;
  if (u.ammo === 0 && u.maxAmmo > 0) return 4;
  return 0;
}

// ── Cache key ─────────────────────────────────────────────────────────────
// Encodes everything that can change sprite shape.
// Format: "type|side|lodTier|poseBucket|skin|strBucket"
// strBucket: 0=full(>0.75), 1=mid(0.40-0.75), 2=thin(<0.40)
// (strength affects figure count so must be in key)
function _cacheKey(u, tier, skin) {
  const strFrac = (u.maxStr > 0) ? u.strength / u.maxStr : 1;
  const strBucket = strFrac > 0.75 ? 0 : strFrac > 0.40 ? 1 : 2;
  return u.type + "|" + u.side + "|" + tier + "|" + _poseBucket(u) + "|" + skin + "|" + strBucket;
}

// ── lodBias bump machinery ─────────────────────────────────────────────────
let _slowFrames = 0;
const _SLOW_THRESHOLD = 22; // ms
const _SLOW_RUN = 30;       // consecutive frames before bumping bias

function spriteBudgetCheck(dt) {
  if (dt > _SLOW_THRESHOLD) {
    _slowFrames++;
    if (_slowFrames >= _SLOW_RUN) {
      _slowFrames = 0;
      if (typeof G !== "undefined") {
        G.lodBias = Math.min(2, (G.lodBias || 0) + 1);
      }
    }
  } else {
    _slowFrames = 0;
  }
}

// ── Color constants ────────────────────────────────────────────────────────
const _COL = {
  US_COAT:   "#2b4d7e",   // Union coat (contract lock)
  US_LT:     "#4a72a8",   // Union lighter accent
  US_TROUSE: "#1e3560",   // Union trousers
  CS_COAT:   "#8a7d66",   // CS butternut (contract lock)
  CS_LT:     "#a89c82",   // CS lighter accent
  CS_TROUSE: "#6e6150",   // CS trousers
  PARCH:     "#e8dcc0",   // parchment
  PARCH_DK:  "#c9b487",   // dark parchment
  BRASS:     "#c9a85f",   // brass accent
  SKIN_TONE: "#c9a07a",   // face/hand
  KEPI_US:   "#1e3050",   // Union kepi
  KEPI_CS:   "#5a5040",   // CS kepi
  MUSKET:    "#5a4020",   // musket wood
  METAL:     "#888070",   // musket/gun metal
  HORSE_LT:  "#7a6040",   // horse body light
  HORSE_DK:  "#4a3820",   // horse body dark
  WHEEL:     "#4a3820",   // gun wheel
  HULL_US:   "#2a3a5a",   // US naval hull
  HULL_CS:   "#5a4a30",   // CS naval hull
  SMOKE:     "rgba(180,170,160,0.55)",
  FLAG_US:   ["#2b4d7e","#c0392b","#e8dcc0"],  // blue, red, white
  FLAG_CS:   ["#c0392b","#4a3820","#e8dcc0"],  // red, brown, white
  EARTH:     "#8a7050",   // entrench spoil
  BLOOD_LOW: "#a83d33",   // morale low pip
  AMMO_OUT:  "#7a2420",   // ammo pip
};

// ── Offscreen sprite renderer ──────────────────────────────────────────────
function _buildSprite(u, tier, skin, rng) {
  const key = _cacheKey(u, tier, skin);
  if (_spriteCache.has(key)) return _spriteCache.get(key);

  // canvas size proportional to render radius (we normalise to a fixed size
  // and blit scaled at draw time)
  const W = 120, H = 100;
  const oc = document.createElement("canvas");
  oc.width = W; oc.height = H;
  const ox = oc.getContext("2d");

  const cx = W / 2, cy = H / 2;

  if (tier === 2) {
    // ── BLOCK MODE ─────────────────────────────────────────────────────────
    _drawBlock(ox, u, W, H, cx, cy, skin, rng);
  } else {
    // ── FIGURE MODE ────────────────────────────────────────────────────────
    const count = _figureCount(u, tier);
    const pose  = _poseBucket(u);
    _drawFormation(ox, u, W, H, count, pose, skin, rng);
  }

  const entry = { cv: oc, width: W, height: H };
  _spriteCache.set(key, entry);
  _spriteEvict();
  return entry;
}

// ── Block mode (LOD 2) ────────────────────────────────────────────────────
function _drawBlock(ox, u, W, H, cx, cy, skin, rng) {
  const us = (u.side === "US");
  const coat  = us ? _COL.US_COAT : _COL.CS_COAT;
  const coatL = us ? _COL.US_LT   : _COL.CS_LT;

  // massed rectangle
  const bw = W * 0.80, bh = H * 0.50;
  const bx = cx - bw / 2, by = cy - bh / 2 + 6;

  // shadow
  ox.fillStyle = "rgba(0,0,0,0.28)";
  ox.fillRect(bx + 3, by + 3, bw, bh);

  // body gradient
  const g = ox.createLinearGradient(0, by, 0, by + bh);
  g.addColorStop(0, coatL);
  g.addColorStop(1, coat);
  ox.fillStyle = g;
  ox.fillRect(bx, by, bw, bh);

  // outline
  ox.strokeStyle = "rgba(0,0,0,0.55)";
  ox.lineWidth = 1.5;
  ox.strokeRect(bx, by, bw, bh);

  // entrench ridge before the block
  if (u.ent > 0) {
    _drawEntrenchRidge(ox, cx, by + bh - 2, bw * 0.9, u.ent, rng);
  }

  // small flag on top centre
  _drawFlag(ox, u, cx, by - 10, 8, rng, 0 /* no ripple at block tier */);
}

// ── Full formation dispatching ─────────────────────────────────────────────
function _drawFormation(ox, u, W, H, count, pose, skin, rng) {
  const cx = W / 2, cy = H / 2;

  if (u.type === "inf")  _drawInfantry(ox, u, W, H, cx, cy, count, pose, skin, rng);
  else if (u.type === "cav")  _drawCavalry(ox, u, W, H, cx, cy, count, pose, skin, rng);
  else if (u.type === "art")  _drawArtillery(ox, u, W, H, cx, cy, count, pose, skin, rng);
  else if (u.type === "nav")  _drawNaval(ox, u, W, H, cx, cy, skin, rng);
  else if (u.type === "fort") _drawFort(ox, u, W, H, cx, cy, count, pose, skin, rng);
  else if (u.type === "hq")   _drawHQ(ox, u, W, H, cx, cy, skin, rng);
}

// ── Infantry: two ranks ≤11 wide ──────────────────────────────────────────
function _drawInfantry(ox, u, W, H, cx, cy, count, pose, skin, rng) {
  const us = (u.side === "US");
  const coat    = us ? _COL.US_COAT : _COL.CS_COAT;
  const trouse  = us ? _COL.US_TROUSE : _COL.CS_TROUSE;
  const kepi    = us ? _COL.KEPI_US : _COL.KEPI_CS;

  const routed = (pose === 1);
  const acted  = (pose === 2);
  const ent    = (pose === 3);
  const ammoOut= (pose === 4);

  // layout
  const cols   = Math.min(11, Math.ceil(count / 2));
  const rows   = 2;
  const figW   = Math.min(10, (W - 16) / cols);
  const figH   = 16;
  const startX = cx - (cols * figW) / 2 + figW / 2;
  const startY = routed ? cy + 4 : cy;

  // entrench ridge behind front rank (in front visually = lower y since
  // we draw top-down, so render before figures)
  if (ent) {
    const ridgeY = startY + rows * (figH + 2) - 4;
    _drawEntrenchRidge(ox, cx, ridgeY, cols * figW * 0.95, u.ent, rng);
  }

  // colors line (regimental flag on left end of front rank)
  const flagX = startX - figW * 0.5;
  const flagY = startY - 18;
  _drawFlag(ox, u, flagX, flagY, 11, rng, 0);

  // figures
  let drawn = 0;
  for (let row = 0; row < rows && drawn < count; row++) {
    for (let col = 0; col < cols && drawn < count; col++) {
      // seeded per-figure jitter
      const fjitter = mulberry(rng() * 0x100000 | 0);
      const jx = (fjitter() - 0.5) * 1.2;
      const jy = (fjitter() - 0.5) * 0.8;
      // shade variation for depth
      const shade = fjitter() < 0.45 ? -12 : 0;

      const fx = startX + col * figW + jx;
      const fy = startY + row * (figH + 2) + jy;

      if (routed) {
        _drawFigureRouted(ox, fx, fy, figH, coat, kepi, trouse, shade);
      } else if (ammoOut) {
        _drawFigureHeld(ox, fx, fy, figH, coat, kepi, trouse, shade);
      } else {
        _drawFigureMarch(ox, fx, fy, figH, coat, kepi, trouse, shade, row === 0);
      }
      drawn++;
    }
  }

  // dropped colors if routed
  if (routed) {
    _drawDroppedFlag(ox, u, cx, cy - 8, rng);
  }

  // acted alpha applied by blitter
}

// ── Individual figure: marching pose ──────────────────────────────────────
function _drawFigureMarch(ox, fx, fy, fh, coat, kepi, trouse, shade, isFront) {
  const sc = fh / 16; // scale factor
  ox.save();
  ox.translate(fx, fy);

  // kepi
  ox.fillStyle = _shadeHex(kepi, shade);
  ox.beginPath();
  ox.ellipse(0, -fh * 0.42, sc * 2.4, sc * 1.0, 0, Math.PI, 0);
  ox.fill();
  ox.fillRect(-sc * 1.5, -fh * 0.42, sc * 3, sc * 0.8);

  // head (face)
  ox.fillStyle = _COL.SKIN_TONE;
  ox.beginPath();
  ox.arc(0, -fh * 0.28, sc * 1.5, 0, Math.PI * 2);
  ox.fill();

  // coat / body
  ox.fillStyle = _shadeHex(coat, shade);
  ox.fillRect(-sc * 1.8, -fh * 0.18, sc * 3.6, fh * 0.38);

  // trousers
  ox.fillStyle = _shadeHex(trouse, shade);
  ox.fillRect(-sc * 1.4, fh * 0.18, sc * 1.3, fh * 0.28);
  ox.fillRect( sc * 0.1, fh * 0.18, sc * 1.3, fh * 0.28);

  // musket (right shoulder, upright for rear rank, angled for front)
  ox.strokeStyle = _COL.MUSKET;
  ox.lineWidth = sc * 0.9;
  ox.lineCap = "round";
  if (isFront) {
    ox.beginPath();
    ox.moveTo(sc * 1.4, fh * 0.1);
    ox.lineTo(sc * 2.0, -fh * 0.45);
    ox.stroke();
  } else {
    ox.beginPath();
    ox.moveTo(sc * 1.5, fh * 0.05);
    ox.lineTo(sc * 1.8, -fh * 0.50);
    ox.stroke();
  }
  // bayonet glint
  ox.strokeStyle = _COL.METAL;
  ox.lineWidth = sc * 0.5;
  if (isFront) {
    ox.beginPath();
    ox.moveTo(sc * 2.0, -fh * 0.45);
    ox.lineTo(sc * 2.2, -fh * 0.60);
    ox.stroke();
  }

  ox.restore();
}

// ── Figure: held-fire pose (ammo out) ─────────────────────────────────────
function _drawFigureHeld(ox, fx, fy, fh, coat, kepi, trouse, shade) {
  const sc = fh / 16;
  ox.save();
  ox.translate(fx, fy);

  // kepi
  ox.fillStyle = _shadeHex(kepi, shade);
  ox.fillRect(-sc * 1.5, -fh * 0.42, sc * 3, sc * 0.8);

  // head
  ox.fillStyle = _COL.SKIN_TONE;
  ox.beginPath();
  ox.arc(0, -fh * 0.28, sc * 1.5, 0, Math.PI * 2);
  ox.fill();

  // coat — slightly desaturated tint for ammo-out state
  ox.fillStyle = _shadeHex(coat, shade - 20);
  ox.fillRect(-sc * 1.8, -fh * 0.18, sc * 3.6, fh * 0.38);

  // trousers
  ox.fillStyle = _shadeHex(trouse, shade);
  ox.fillRect(-sc * 1.4, fh * 0.18, sc * 2.6, fh * 0.28);

  // musket lowered
  ox.strokeStyle = _COL.MUSKET;
  ox.lineWidth = sc * 0.9;
  ox.lineCap = "round";
  ox.beginPath();
  ox.moveTo(sc * 1.5, fh * 0.20);
  ox.lineTo(sc * 2.2, fh * 0.10);
  ox.stroke();

  ox.restore();
}

// ── Figure: routed (fleeing) ───────────────────────────────────────────────
function _drawFigureRouted(ox, fx, fy, fh, coat, kepi, trouse, shade) {
  const sc = fh / 16;
  ox.save();
  ox.translate(fx, fy);
  ox.rotate(0.35); // leaning forward, running

  // kepi askew
  ox.fillStyle = _shadeHex(kepi, shade);
  ox.save();
  ox.rotate(-0.3);
  ox.fillRect(-sc * 1.5, -fh * 0.42, sc * 3, sc * 0.8);
  ox.restore();

  // head
  ox.fillStyle = _COL.SKIN_TONE;
  ox.beginPath();
  ox.arc(0, -fh * 0.28, sc * 1.5, 0, Math.PI * 2);
  ox.fill();

  // coat
  ox.fillStyle = _shadeHex(coat, shade + 10);
  ox.fillRect(-sc * 1.8, -fh * 0.18, sc * 3.6, fh * 0.38);

  // trousers running spread
  ox.fillStyle = _shadeHex(trouse, shade);
  ox.fillRect(-sc * 2.0, fh * 0.18, sc * 1.2, fh * 0.25);
  ox.fillRect( sc * 0.4, fh * 0.05, sc * 1.2, fh * 0.25);

  ox.restore();
}

// ── Cavalry: mounted riders in two staggered rows ─────────────────────────
function _drawCavalry(ox, u, W, H, cx, cy, count, pose, skin, rng) {
  const us = (u.side === "US");
  const coat  = us ? _COL.US_COAT   : _COL.CS_COAT;
  const kepi  = us ? _COL.KEPI_US   : _COL.KEPI_CS;
  const trouse= us ? _COL.US_TROUSE : _COL.CS_TROUSE;
  const routed = (pose === 1);

  const cols = Math.ceil(count / 2);
  const figW = Math.min(14, (W - 12) / cols);
  const startX = cx - (cols * figW) / 2 + figW / 2;

  if (routed) {
    _drawDroppedFlag(ox, u, cx, cy - 8, rng);
  } else {
    _drawFlag(ox, u, startX - figW * 0.3, cy - 26, 12, rng, 0);
  }

  let drawn = 0;
  for (let row = 0; row < 2 && drawn < count; row++) {
    const rowOff = row * 2; // stagger
    for (let col = 0; col < cols && drawn < count; col++) {
      const fjitter = mulberry(rng() * 0x100000 | 0);
      const jx = (fjitter() - 0.5) * 1.5 + (row === 1 ? figW * 0.5 : 0);
      const jy = (fjitter() - 0.5) * 0.8;
      const fx = startX + col * figW + jx;
      const fy = cy - 10 + row * 18 + jy;

      const hShade = fjitter() < 0.5 ? 0 : -15;
      _drawMountedFigure(ox, fx, fy, coat, kepi, trouse, hShade, routed);
      drawn++;
    }
  }
}

function _drawMountedFigure(ox, fx, fy, coat, kepi, trouse, hShade, routed) {
  ox.save();
  ox.translate(fx, fy);
  if (routed) ox.rotate(0.25);

  // horse body
  const hcol = _shadeHex(_COL.HORSE_LT, hShade);
  ox.fillStyle = hcol;
  ox.beginPath();
  ox.ellipse(0, 4, 7, 4, 0, 0, Math.PI * 2);
  ox.fill();

  // horse legs
  ox.strokeStyle = _COL.HORSE_DK;
  ox.lineWidth = 1.2;
  ox.lineCap = "round";
  if (routed) {
    // galloping legs spread
    ox.beginPath(); ox.moveTo(-5, 6); ox.lineTo(-7, 14); ox.stroke();
    ox.beginPath(); ox.moveTo(-2, 8); ox.lineTo(-4, 15); ox.stroke();
    ox.beginPath(); ox.moveTo(2,  8); ox.lineTo( 5, 13); ox.stroke();
    ox.beginPath(); ox.moveTo(5,  6); ox.lineTo( 8, 12); ox.stroke();
  } else {
    ox.beginPath(); ox.moveTo(-5, 6); ox.lineTo(-5, 14); ox.stroke();
    ox.beginPath(); ox.moveTo(-2, 8); ox.lineTo(-2, 14); ox.stroke();
    ox.beginPath(); ox.moveTo( 2, 8); ox.lineTo( 2, 14); ox.stroke();
    ox.beginPath(); ox.moveTo( 5, 6); ox.lineTo( 5, 14); ox.stroke();
  }

  // head
  ox.fillStyle = hcol;
  ox.beginPath();
  ox.ellipse(7, 0, 4, 2.5, -0.3, 0, Math.PI * 2);
  ox.fill();

  // rider body
  ox.fillStyle = coat;
  ox.fillRect(-2, -10, 5, 10);

  // rider head
  ox.fillStyle = _COL.SKIN_TONE;
  ox.beginPath();
  ox.arc(0, -12, 2.5, 0, Math.PI * 2);
  ox.fill();

  // kepi
  ox.fillStyle = kepi;
  ox.fillRect(-2, -14, 5, 2);

  // saber (if not routed)
  if (!routed) {
    ox.strokeStyle = _COL.METAL;
    ox.lineWidth = 1.0;
    ox.beginPath();
    ox.moveTo(3, -8);
    ox.quadraticCurveTo(7, -12, 10, -6);
    ox.stroke();
  }

  ox.restore();
}

// ── Artillery: 2–3 guns with 3 crew each ──────────────────────────────────
function _drawArtillery(ox, u, W, H, cx, cy, count, pose, skin, rng) {
  const us = (u.side === "US");
  const coat  = us ? _COL.US_COAT   : _COL.CS_COAT;
  const kepi  = us ? _COL.KEPI_US   : _COL.KEPI_CS;
  const trouse= us ? _COL.US_TROUSE : _COL.CS_TROUSE;
  const routed= (pose === 1);

  const guns = Math.min(3, Math.max(1, Math.ceil(count / 3)));
  const gapW = W / (guns + 1);

  if (routed) {
    _drawDroppedFlag(ox, u, cx, cy - 12, rng);
  } else {
    _drawFlag(ox, u, cx - gapW * (guns / 2), cy - 28, 11, rng, 0);
  }

  for (let g = 0; g < guns; g++) {
    const gx = gapW * (g + 1);
    const gy = cy;

    if (!routed) {
      _drawGun(ox, gx, gy, rng);
      // 3 crew around the gun
      for (let c = 0; c < 3; c++) {
        const fjitter = mulberry(rng() * 0x100000 | 0);
        const cr = [
          {dx: -18, dy: -4},
          {dx:  12, dy: -6},
          {dx:   2, dy:  6},
        ][c];
        _drawFigureMarch(ox, gx + cr.dx + (fjitter()-0.5)*1.5,
                             gy + cr.dy + (fjitter()-0.5)*1.5,
                             13, coat, kepi, trouse, 0, false);
      }
    } else {
      // abandoned gun + fleeing crew
      ox.save();
      ox.globalAlpha = 0.55;
      _drawGun(ox, gx, gy, rng);
      ox.restore();
      for (let c = 0; c < 2; c++) {
        const fjitter = mulberry(rng() * 0x100000 | 0);
        _drawFigureRouted(ox, gx + (fjitter()-0.5)*20, gy - 8 + c*10,
                          12, coat, kepi, trouse, 0);
      }
    }
  }
}

function _drawGun(ox, gx, gy, rng) {
  // wheel
  ox.strokeStyle = _COL.WHEEL;
  ox.lineWidth = 2.0;
  ox.beginPath();
  ox.arc(gx - 8, gy + 4, 6, 0, Math.PI * 2);
  ox.stroke();
  // spokes
  for (let s = 0; s < 4; s++) {
    const a = (s / 4) * Math.PI * 2;
    ox.beginPath();
    ox.moveTo(gx - 8, gy + 4);
    ox.lineTo(gx - 8 + Math.cos(a) * 6, gy + 4 + Math.sin(a) * 6);
    ox.stroke();
  }
  // barrel
  ox.strokeStyle = _COL.METAL;
  ox.lineWidth = 3.5;
  ox.lineCap = "round";
  ox.beginPath();
  ox.moveTo(gx - 4, gy + 2);
  ox.lineTo(gx + 12, gy - 5);
  ox.stroke();
  // trail
  ox.strokeStyle = _COL.WHEEL;
  ox.lineWidth = 1.8;
  ox.beginPath();
  ox.moveTo(gx - 8, gy + 4);
  ox.lineTo(gx - 16, gy + 8);
  ox.stroke();
}

// ── Naval: hull + casemate or stack + wake ─────────────────────────────────
function _drawNaval(ox, u, W, H, cx, cy, skin, rng) {
  const us = (u.side === "US");
  const hullCol = us ? _COL.HULL_US : _COL.HULL_CS;
  const ironclad = (u.weapon === "ironclad");
  const pose = _poseBucket(u);
  const routed = (pose === 1);

  // wake / water lines
  ox.strokeStyle = "rgba(100,160,200,0.4)";
  ox.lineWidth = 1.2;
  for (let w = 0; w < 3; w++) {
    ox.beginPath();
    ox.moveTo(cx - 36 - w * 4, cy + 8 + w * 4);
    ox.quadraticCurveTo(cx, cy + 12 + w * 3, cx + 36 + w * 4, cy + 8 + w * 4);
    ox.stroke();
  }

  // hull
  ox.fillStyle = _shadeHex(hullCol, routed ? 20 : 0);
  ox.beginPath();
  ox.moveTo(cx - 32, cy + 2);
  ox.lineTo(cx + 38, cy + 2);
  ox.lineTo(cx + 30, cy + 12);
  ox.lineTo(cx - 26, cy + 12);
  ox.closePath();
  ox.fill();
  ox.strokeStyle = "rgba(0,0,0,0.5)";
  ox.lineWidth = 1.2;
  ox.stroke();

  if (ironclad) {
    // casemate (sloped armour)
    ox.fillStyle = _shadeHex(hullCol, -15);
    ox.beginPath();
    ox.moveTo(cx - 22, cy + 2);
    ox.lineTo(cx + 22, cy + 2);
    ox.lineTo(cx + 16, cy - 10);
    ox.lineTo(cx - 16, cy - 10);
    ox.closePath();
    ox.fill();
    ox.strokeStyle = "rgba(0,0,0,0.45)";
    ox.lineWidth = 1;
    ox.stroke();
    // gun ports
    ox.fillStyle = "#1a1410";
    ox.fillRect(cx - 14, cy - 6, 5, 4);
    ox.fillRect(cx +  9, cy - 6, 5, 4);
  } else {
    // wooden gunboat: stack
    ox.fillStyle = "#3a3028";
    ox.fillRect(cx - 4, cy - 18, 8, 18);
    // smoke wisp
    ox.fillStyle = _COL.SMOKE;
    ox.beginPath();
    ox.ellipse(cx + 2, cy - 22, 5, 3, 0, 0, Math.PI * 2);
    ox.fill();
    // gun on deck
    ox.strokeStyle = _COL.METAL;
    ox.lineWidth = 3;
    ox.lineCap = "round";
    ox.beginPath();
    ox.moveTo(cx + 10, cy + 0);
    ox.lineTo(cx + 24, cy - 5);
    ox.stroke();
  }

  // national ensign (small)
  _drawFlag(ox, u, cx + 28, cy - 16, 7, rng, 0);
}

// ── Fort: parapet + gun + crew ────────────────────────────────────────────
function _drawFort(ox, u, W, H, cx, cy, count, pose, skin, rng) {
  const us = (u.side === "US");
  const coat  = us ? _COL.US_COAT : _COL.CS_COAT;
  const kepi  = us ? _COL.KEPI_US : _COL.KEPI_CS;
  const trouse= us ? _COL.US_TROUSE : _COL.CS_TROUSE;

  // earthwork parapet
  ox.fillStyle = _COL.EARTH;
  ox.beginPath();
  ox.moveTo(cx - 44, cy + 14);
  ox.lineTo(cx - 44, cy - 2);
  ox.lineTo(cx - 30, cy - 8);
  ox.lineTo(cx + 30, cy - 8);
  ox.lineTo(cx + 44, cy - 2);
  ox.lineTo(cx + 44, cy + 14);
  ox.closePath();
  ox.fill();
  ox.strokeStyle = "rgba(0,0,0,0.35)";
  ox.lineWidth = 1.5;
  ox.stroke();

  // parapet crest line
  ox.strokeStyle = _shadeHex(_COL.EARTH, -20);
  ox.lineWidth = 2;
  ox.beginPath();
  ox.moveTo(cx - 44, cy - 2);
  ox.lineTo(cx - 30, cy - 8);
  ox.lineTo(cx + 30, cy - 8);
  ox.lineTo(cx + 44, cy - 2);
  ox.stroke();

  // main gun
  _drawGun(ox, cx, cy + 2, rng);

  // crew (up to 3)
  const crewCount = Math.min(3, count - 1);
  const crewPos = [
    {dx: -26, dy: 2},
    {dx:  20, dy: 2},
    {dx:  -6, dy: 6},
  ];
  for (let i = 0; i < crewCount; i++) {
    const fjitter = mulberry(rng() * 0x100000 | 0);
    _drawFigureMarch(ox,
      cx + crewPos[i].dx + (fjitter()-0.5)*1.5,
      cy + crewPos[i].dy + (fjitter()-0.5)*1.5,
      11, coat, kepi, trouse, 0, false);
  }

  // flag
  _drawFlag(ox, u, cx, cy - 28, 11, rng, 0);
}

// ── HQ: mounted officer + standard bearer ────────────────────────────────
function _drawHQ(ox, u, W, H, cx, cy, skin, rng) {
  const us = (u.side === "US");
  const coat  = us ? _COL.US_COAT   : _COL.CS_COAT;
  const kepi  = us ? _COL.KEPI_US   : _COL.KEPI_CS;
  const trouse= us ? _COL.US_TROUSE : _COL.CS_TROUSE;

  // standard bearer (left) with oversized flag
  _drawMountedFigure(ox, cx - 16, cy + 4, coat, kepi, trouse, 0, false);
  _drawFlag(ox, u, cx - 16, cy - 24, 18, rng, 0); // oversized

  // mounted officer (right) — slightly larger
  ox.save();
  ox.scale(1.08, 1.08);
  _drawMountedFigure(ox, (cx + 12) / 1.08, (cy + 2) / 1.08, coat, kepi, trouse, -10, false);
  ox.restore();
}

// ── Flag: two-segment sine ripple ─────────────────────────────────────────
// ripplePhase = 0 means static. During blit pass, ripple is drawn live.
function _drawFlag(ox, u, fx, fy, height, rng, ripplePhase) {
  const us = (u.side === "US");
  const cols = us ? _COL.FLAG_US : _COL.FLAG_CS;
  const staffH = height * 2.2;
  const flagW  = height * 1.4;
  const segH   = height / 2;

  // staff
  ox.strokeStyle = _COL.PARCH_DK;
  ox.lineWidth = 1.2;
  ox.lineCap = "butt";
  ox.beginPath();
  ox.moveTo(fx, fy);
  ox.lineTo(fx, fy + staffH);
  ox.stroke();

  // honor ticks for xp ≥ 2
  if (u.xp >= 2) {
    ox.strokeStyle = _COL.BRASS;
    ox.lineWidth = 0.8;
    for (let t = 0; t < Math.min(u.xp - 1, 3); t++) {
      const ty = fy + staffH * 0.5 + t * 4;
      ox.beginPath();
      ox.moveTo(fx - 2, ty);
      ox.lineTo(fx + 2, ty);
      ox.stroke();
    }
  }

  // flag body (2 segments, static in sprite — ripple added at blit time)
  const seg0y = fy;
  const seg1y = fy + segH;

  if (ripplePhase === 0) {
    // flat in pre-rendered sprite
    ox.fillStyle = cols[0];
    ox.fillRect(fx, seg0y, flagW, segH);
    ox.fillStyle = cols[1];
    ox.fillRect(fx, seg1y, flagW, segH);
  } else {
    // wavy — used in live-draw path, not sprite cache
    _drawWavyFlag(ox, fx, seg0y, flagW, segH, cols[0], ripplePhase);
    _drawWavyFlag(ox, fx, seg1y, flagW, segH, cols[1], ripplePhase);
  }

  // finial
  ox.fillStyle = _COL.BRASS;
  ox.beginPath();
  ox.arc(fx, fy - 2, 2, 0, Math.PI * 2);
  ox.fill();
}

function _drawWavyFlag(ox, fx, fy, fw, fh, col, phase) {
  ox.fillStyle = col;
  ox.beginPath();
  ox.moveTo(fx, fy);
  const steps = 8;
  for (let s = 0; s <= steps; s++) {
    const t = s / steps;
    const wx = fx + t * fw;
    const wy = fy + Math.sin(t * Math.PI * 2 + phase) * (fh * 0.18);
    s === 0 ? ox.moveTo(wx, wy) : ox.lineTo(wx, wy);
  }
  for (let s = steps; s >= 0; s--) {
    const t = s / steps;
    const wx = fx + t * fw;
    const wy = fy + fh + Math.sin(t * Math.PI * 2 + phase + 0.4) * (fh * 0.18);
    ox.lineTo(wx, wy);
  }
  ox.closePath();
  ox.fill();
}

function _drawDroppedFlag(ox, u, fx, fy, rng) {
  const us = (u.side === "US");
  const cols = us ? _COL.FLAG_US : _COL.FLAG_CS;
  // staff lying diagonally
  ox.save();
  ox.translate(fx, fy);
  ox.rotate(0.7);
  ox.strokeStyle = _COL.PARCH_DK;
  ox.lineWidth = 1.2;
  ox.beginPath();
  ox.moveTo(0, 0);
  ox.lineTo(0, 18);
  ox.stroke();
  ox.fillStyle = cols[0];
  ox.fillRect(0, 0, 10, 8);
  ox.fillStyle = cols[1];
  ox.fillRect(0, 8, 10, 8);
  ox.restore();
}

// ── Entrenchment ridge ────────────────────────────────────────────────────
function _drawEntrenchRidge(ox, cx, ridgeY, width, entLevel, rng) {
  const ridgeH = 5 + entLevel * 2;
  const x0 = cx - width / 2;
  // dirt mound
  ox.fillStyle = _COL.EARTH;
  ox.beginPath();
  ox.moveTo(x0, ridgeY);
  // bumpy top
  const steps = 10;
  for (let s = 0; s <= steps; s++) {
    const t = s / steps;
    const rx = x0 + t * width;
    const ry = ridgeY - ridgeH * (0.5 + 0.5 * Math.abs(Math.sin(s * 1.3)));
    s === 0 ? ox.moveTo(rx, ry) : ox.lineTo(rx, ry);
  }
  ox.lineTo(x0 + width, ridgeY);
  ox.closePath();
  ox.fill();

  // texture ticks (abatis / stakes)
  ox.strokeStyle = _shadeHex(_COL.EARTH, -25);
  ox.lineWidth = 0.8;
  for (let s = 0; s < 6; s++) {
    const ex = x0 + (s / 6) * width + rng() * 4;
    ox.beginPath();
    ox.moveTo(ex, ridgeY - 2);
    ox.lineTo(ex + 3, ridgeY - 7);
    ox.stroke();
  }
}

// ── Hex-colour shade helper ───────────────────────────────────────────────
// Very lightweight: parses 6-digit hex, shifts r/g/b by amount (+ = lighter)
function _shadeHex(hex, amt) {
  if (!hex || hex[0] !== "#") return hex;
  const r = clamp(parseInt(hex.slice(1,3),16) + amt, 0, 255);
  const g = clamp(parseInt(hex.slice(3,5),16) + amt, 0, 255);
  const b = clamp(parseInt(hex.slice(5,7),16) + amt, 0, 255);
  return "#" + (r<16?"0":"") + r.toString(16) + (g<16?"0":"") + g.toString(16) + (b<16?"0":"") + b.toString(16);
}

// ── Badge drawing (compact, above formation) ──────────────────────────────
// Mirrors old drawUnit badge positions, re-expressed for sprite space.
// Called in live pass (not cached) since morale/ammo can change mid-turn.
function _drawBadges(ctx, u, sx, sy, rad) {
  const sz = rad * 0.74;

  // morale pip (low)  — matches old: arc at +sz*0.62, -sz*0.5 (right)
  if (u.morale < u.maxMor * 0.4) {
    ctx.fillStyle = _COL.BLOOD_LOW;
    ctx.beginPath();
    ctx.arc(sx + sz * 0.62, sy - sz * 0.82, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // ammo-out pip — matches old: arc at -sz*0.62, -sz*0.5 (left)
  if (u.type !== "hq" && u.ammo <= 0 && u.maxAmmo > 0) {
    ctx.fillStyle = _COL.AMMO_OUT;
    ctx.beginPath();
    ctx.arc(sx - sz * 0.62, sy - sz * 0.82, 3.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // xp dots — matches old: row of arcs above
  if (u.xp > 0) {
    ctx.fillStyle = _COL.BRASS;
    for (let i = 0; i < Math.min(u.xp, 5); i++) {
      ctx.beginPath();
      ctx.arc(sx - sz * 0.55 + i * 5, sy - sz * 0.96, 2.0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Flag ripple (live pass, not cached) ───────────────────────────────────
function _drawLiveFlagRipple(ctx, u, sx, sy, rad) {
  const sz = rad * 0.74;
  const flagX = sx - sz * 0.5;
  const flagY = sy - sz * 1.3;
  const flagH  = rad * 0.45;
  const flagW  = rad * 0.55;
  const phase  = (Date.now() * 0.003) % (Math.PI * 2);
  const us = (u.side === "US");
  const cols = us ? _COL.FLAG_US : _COL.FLAG_CS;

  // staff
  ctx.strokeStyle = _COL.PARCH_DK;
  ctx.lineWidth = 1.0;
  ctx.beginPath();
  ctx.moveTo(flagX, flagY);
  ctx.lineTo(flagX, flagY + flagH * 2.4);
  ctx.stroke();

  // two wavy segments
  _drawWavyFlag(ctx, flagX, flagY,          flagW, flagH / 2, cols[0], phase);
  _drawWavyFlag(ctx, flagX, flagY + flagH/2, flagW, flagH / 2, cols[1], phase + 0.3);

  // finial
  ctx.fillStyle = _COL.BRASS;
  ctx.beginPath();
  ctx.arc(flagX, flagY - 2, 1.8, 0, Math.PI * 2);
  ctx.fill();
}

// ── Main entry point ──────────────────────────────────────────────────────
function drawUnitSprite(u, sx, sy, rad, skin) {
  // resolve LOD
  const zoom = (typeof G !== "undefined" && G.cam) ? G.cam.z : 1;
  const tier  = _lodTier(zoom);

  // seeded RNG for this unit (deterministic from u.id, no Math.random)
  const rng = mulberry(hashStr("sp" + u.id));

  // acted / routed alpha
  const acted  = (u.done && u.side === (G && G.battle ? G.battle.playerSide : ""));
  const routed = u.routed;
  const baseAlpha = routed ? 0.70 : acted ? 0.82 : 1.0;

  // build or retrieve sprite
  const entry = _buildSprite(u, tier, skin, mulberry(hashStr("sp" + u.id)));

  // blit: scale sprite to current rad
  const scale = (rad * 2.2) / entry.width;
  const dw = entry.width  * scale;
  const dh = entry.height * scale;
  const dx = sx - dw / 2;
  const dy = sy - dh * 0.58; // offset so base of formation sits on hex centre

  const ctx = (typeof G !== "undefined" && G.battle) ? document.getElementById("map").getContext("2d") : null;
  if (!ctx) return;

  ctx.save();
  ctx.globalAlpha = baseAlpha;

  // routed lean
  if (routed) {
    ctx.translate(sx, sy);
    ctx.rotate(-0.18);
    ctx.translate(-sx, -sy);
  }

  ctx.drawImage(entry.cv, dx, dy, dw, dh);

  ctx.restore();

  // ── Live layers (not cached) ────────────────────────────────────────────

  // flag ripple (only when battle active and !reduceMotion)
  const battleActive = (typeof G !== "undefined" && G.battle && !G.battle.over);
  const reduceMotion = (typeof G !== "undefined" && G.settings && G.settings.reduceMotion);
  const shouldAnimate = battleActive && !reduceMotion;

  if (shouldAnimate && tier <= 1) {
    _drawLiveFlagRipple(ctx, u, sx, sy, rad);
    if (typeof G !== "undefined") G.spriteAnim = true;
  }

  // compact badges (always live — they change without cache invalidation)
  _drawBadges(ctx, u, sx, sy, rad);

  // done dim (player side) — drawn live like old drawUnit
  if (acted && u.side === (G && G.battle ? G.battle.playerSide : "")) {
    ctx.save();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = "rgba(13,10,7,1)";
    const sz = rad * 0.74;
    // match old rrect bounds
    ctx.fillRect(sx - sz * 0.8, sy - sz * 0.62 - rad * 0.5, sz * 1.6, sz * 1.24 + rad);
    ctx.restore();
  }
}

/* ==== §19 — FX, SPEED, CAMERA, LOOP (G3) ==== */

// ─────────────────────────────────────────────────────────────────────────────
// LOOP NEUTRALIZATION
//
// The legacy loop() (§8) does: requestAnimationFrame(loop) → conditionally
// draw(). Re-declaring loop() as a no-op prevents its rAF call from ever
// re-scheduling itself again after the current pending frame lands. Because JS
// function declarations hoist and the later declaration wins at parse time,
// but both declarations live in the same script block (appended after engine),
// the override-by-append pattern applies: this file is spliced after the engine
// marker, so this `function loop(){}` textually supersedes the earlier one.
// After the legacy rAF fires once and calls this no-op, it will never schedule
// a successor — the double-draw is eliminated.
//
// Our own driver (_gorDriver) is installed via window.__gorLoop guard so it
// is started exactly once across any number of splices / module re-evals.
// ─────────────────────────────────────────────────────────────────────────────

// Neutralize the legacy loop — becomes a harmless no-op.
function loop() { /* neutralized by G3 — _gorDriver is the sole rAF loop */ }

// ─────────────────────────────────────────────────────────────────────────────
// G.fx  — particle array with hard cap 80
// ─────────────────────────────────────────────────────────────────────────────

if (!G.fx) G.fx = [];
const _FX_CAP = 80;

// ─────────────────────────────────────────────────────────────────────────────
// Wind direction helper (derived deterministically from battle id hash)
// Returns {dx, dy} unit-ish vector (one of 8 compass dirs scaled 0.4)
// ─────────────────────────────────────────────────────────────────────────────
function _windDir() {
  if (!G.battle) return { dx: 0.3, dy: -0.2 };
  const dirs = [
    { dx: 0, dy: -1 }, { dx: 0.7, dy: -0.7 }, { dx: 1, dy: 0 },  { dx: 0.7, dy: 0.7 },
    { dx: 0, dy: 1 },  { dx: -0.7, dy: 0.7 }, { dx: -1, dy: 0 }, { dx: -0.7, dy: -0.7 },
  ];
  const idx = hashStr(G.battle.bd.id) % 8;
  const d = dirs[idx];
  return { dx: d.dx * 0.4, dy: d.dy * 0.4 };
}

// ─────────────────────────────────────────────────────────────────────────────
// emitFX(type, c, r, data)
//
// type: "fire"   — 2-frame muzzle flash star
//       "smoke"  — 3-5 grey-white circles drifting downwind, fade ≤1.4s (TRANSIENT)
//       "dust"   — melee dust cloud
//       "num"    — floating casualty number, rise 14px, fade ≤1.1s
//                  data.n = number to display
//
// All FX durations are divided by G.speed (default 1).
// Under reduceMotion: "num" is skipped entirely (log carries it);
//   "fire"/"smoke"/"dust" are also skipped (instant/static).
// ─────────────────────────────────────────────────────────────────────────────
function emitFX(type, c, r, data) {
  const rm = G.settings && G.settings.reduceMotion;
  const spd = (G.speed && G.speed >= 1) ? G.speed : 1;

  // Under reduceMotion skip all animated FX
  if (rm) return;

  // Enforce hard cap — oldest entries ejected
  if (G.fx.length >= _FX_CAP) {
    G.fx.splice(0, G.fx.length - _FX_CAP + 1);
  }

  const wind = _windDir();
  const now = performance.now();

  if (type === "fire") {
    // 2-frame muzzle flash: short, very bright
    const life = 120 / spd; // ms
    G.fx.push({ type: "fire", c, r, born: now, life, spd });
  } else if (type === "smoke") {
    // 3-5 puff circles drifting downwind, ≤1.4s total
    const count = 3 + (hashStr((c + "," + r + (now | 0))) % 3);
    for (let i = 0; i < count; i++) {
      const life = (900 + i * 120) / spd;
      if (life > 1400) break; // enforce TRANSIENT cap
      G.fx.push({
        type: "smoke",
        c, r,
        born: now,
        life,
        spd,
        offsetX: (i - 1) * 4,
        offsetY: -i * 3,
        windDx: wind.dx,
        windDy: wind.dy,
        radius: 6 + i * 2,
        delay: i * 80 / spd,
      });
    }
  } else if (type === "dust") {
    const life = 600 / spd;
    G.fx.push({ type: "dust", c, r, born: now, life, spd, radius: 10 });
  } else if (type === "num") {
    // Floating casualty number — skip under reduceMotion (already gated above)
    const life = 1100 / spd;
    const val = (data && data.n !== undefined) ? data.n : 0;
    G.fx.push({ type: "num", c, r, born: now, life, spd, val });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// flash(c, r, type)  — thin wrapper preserving the exact 3-arg engine signature
//
// Existing call sites in resolveFire / resolveCharge / moraleCheck remain
// valid. We also push to G.anim for backward compat with any legacy draw path
// that reads G.anim (e.g., old draw() flash rendering loop — now empty since
// G1's draw() replaces that, but defensive).
// ─────────────────────────────────────────────────────────────────────────────
function flash(c, r, type) {
  // Legacy anim array (legacy draw() consumed this; G1 may ignore it but keep it safe)
  G.anim.push({ c, r, type, t: 18, max: 18 });

  // New FX system
  if (type === "fire") {
    emitFX("fire", c, r, null);
    emitFX("smoke", c, r, null);
  } else if (type === "melee") {
    emitFX("dust", c, r, null);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// drawFX()  — called from G1's draw() via typeof guard
//
// Renders all live entries in G.fx onto the main canvas ctx.
// Expects ctx, G.cam, Wc, Hc, HEX, colrowToPixel, worldToScreen to exist
// (they are engine globals present by integration time).
// ─────────────────────────────────────────────────────────────────────────────
function drawFX() {
  if (!G.fx || !G.fx.length) return;
  const now = performance.now();
  const rm = G.settings && G.settings.reduceMotion;

  // Prune dead entries
  G.fx = G.fx.filter(function(f) {
    const age = now - f.born - (f.delay || 0);
    return age < f.life;
  });

  if (rm) return; // under reduceMotion, nothing to draw (emitFX skipped creation anyway)

  ctx.save();

  for (let i = 0; i < G.fx.length; i++) {
    const f = G.fx[i];
    const age = now - f.born - (f.delay || 0);
    if (age < 0) continue; // delayed puff not yet visible

    const t = Math.max(0, Math.min(1, age / f.life)); // 0→1 progress
    const alpha = 1 - t;                               // fade out

    const p = colrowToPixel(f.c, f.r);
    const s = worldToScreen(p.x, p.y);
    const rad = HEX * G.cam.z * 0.98;

    if (f.type === "fire") {
      // 2-frame muzzle flash — star burst
      ctx.globalAlpha = alpha * 0.9;
      const starR = rad * (0.5 + (1 - t) * 0.4);
      const pts = 8;
      ctx.beginPath();
      for (let k = 0; k < pts * 2; k++) {
        const a = (Math.PI / pts) * k - Math.PI / 2;
        const r2 = (k % 2 === 0) ? starR : starR * 0.38;
        const x = s.x + r2 * Math.cos(a);
        const y = s.y + r2 * Math.sin(a);
        k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fillStyle = "rgba(255, 210, 80, 0.95)";
      ctx.fill();
      // inner hot core
      ctx.globalAlpha = alpha * 0.7;
      ctx.beginPath();
      ctx.arc(s.x, s.y, starR * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 200, 1)";
      ctx.fill();

    } else if (f.type === "smoke") {
      // Drifting puff — grey-white circle
      const drift = t * f.life * 0.001; // time-based drift in world units
      const px = s.x + f.offsetX + f.windDx * drift * rad * 2;
      const py = s.y + f.offsetY + f.windDy * drift * rad * 2;
      const pufR = f.radius * G.cam.z * (1 + t * 0.5);
      ctx.globalAlpha = alpha * 0.55;
      ctx.beginPath();
      ctx.arc(px, py, pufR, 0, Math.PI * 2);
      const grey = Math.floor(200 + t * 40);
      ctx.fillStyle = "rgb(" + grey + "," + grey + "," + grey + ")";
      ctx.fill();

    } else if (f.type === "dust") {
      // Melee dust — expanding warm cloud
      const dustR = f.radius * G.cam.z * (1 + t * 1.2);
      ctx.globalAlpha = alpha * 0.45;
      ctx.beginPath();
      ctx.arc(s.x, s.y, dustR, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(210, 185, 130, 0.8)";
      ctx.fill();

    } else if (f.type === "num") {
      // Floating casualty number — period serif, rises 14px, fades ≤1.1s
      const rise = t * 14 * G.cam.z;
      ctx.globalAlpha = alpha * 0.95;
      const fontSize = Math.max(10, Math.round(rad * 0.38));
      ctx.font = "bold " + fontSize + "px 'Iowan Old Style',Palatino,Georgia,serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      // shadow
      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillText("−" + f.val, s.x + 1, s.y - rise + 1);
      // text
      ctx.fillStyle = "#ffcc66";
      ctx.fillText("−" + f.val, s.x, s.y - rise);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────────
// SPEED CONTROL
//
// G.speed ∈ {1, 2, 4}, default 1.
// A segmented control is inserted into #turnstrip before #btnEndTurn.
// Guarded against re-insertion by checking for existing element id "stSpeed".
// FX durations are divided by G.speed at emitFX time (already implemented above).
// aiDelay() is exposed for Fable to wire into runAI timeouts.
// ─────────────────────────────────────────────────────────────────────────────

if (typeof G.speed === "undefined") G.speed = 1;

  return Math.max(40, 150 / ((G.speed && G.speed >= 1) ? G.speed : 1));

// ─────────────────────────────────────────────────────────────────────────────
// CAMERA: glideTo + followAction
// ─────────────────────────────────────────────────────────────────────────────

// Active glide state
let _glide = null;

// glideTo(c, r, ms) — eased pan to hex (c, r) over ms milliseconds.
// Under reduceMotion: snaps instantly (no animation).
function glideTo(c, r, ms) {
  const p = colrowToPixel(c, r);
  const rm = G.settings && G.settings.reduceMotion;
  if (rm) {
    G.cam.x = p.x;
    G.cam.y = p.y;
    if (typeof draw === "function") draw();
    return;
  }
  const duration = (ms && ms > 0) ? ms : 400;
  _glide = {
    fromX: G.cam.x,
    fromY: G.cam.y,
    toX: p.x,
    toY: p.y,
    start: performance.now(),
    dur: duration,
  };
}

// followAction(u) — glide to u if it is off-screen by more than 30%,
// and G.settings.follow !== false.
function followAction(u) {
  if (!u) return;
  if (G.settings && G.settings.follow === false) return;

  const p = colrowToPixel(u.c, u.r);
  const s = worldToScreen(p.x, p.y);

  const marginX = Wc * 0.30;
  const marginY = Hc * 0.30;

  const offscreen = (
    s.x < marginX || s.x > Wc - marginX ||
    s.y < marginY || s.y > Hc - marginY
  );

  if (offscreen) {
    glideTo(u.c, u.r, 320);
  }
}

// Ease function — smooth step (cubic)
function _easeInOut(t) {
  return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN RAF DRIVER
//
// Installs exactly ONE continuous rAF loop, guarded by window.__gorLoop.
// Runs at 30fps idle throttle; steps to 60fps when G.fx.length > 0 or
// G.spriteAnim is true.
// Advances active glide, calls draw() via typeof guard.
// ─────────────────────────────────────────────────────────────────────────────

if (!window.__gorLoop) {
  window.__gorLoop = true;

  let _driverLast = 0;

  function _gorDriver(ts) {
    requestAnimationFrame(_gorDriver);

    const inBattle = (G.mode === "battle");

    // Advance glide regardless of battle mode (camera may be set before mode flips)
    if (_glide) {
      const elapsed = ts - _glide.start;
      const frac = Math.min(1, elapsed / _glide.dur);
      const e = _easeInOut(frac);
      G.cam.x = _glide.fromX + (_glide.toX - _glide.fromX) * e;
      G.cam.y = _glide.fromY + (_glide.toY - _glide.fromY) * e;
      if (frac >= 1) _glide = null;
    }

    if (!inBattle) {
      _driverLast = ts;
      return;
    }

    // Determine target frame interval
    const hasFX = G.fx && G.fx.length > 0;
    const hasSprite = !!G.spriteAnim;
    const hasGlide = !!_glide;
    const targetInterval = (hasFX || hasSprite || hasGlide) ? (1000 / 60) : (1000 / 30);

    const _frameDt = ts - _driverLast;
    if (_frameDt < targetInterval - 1) return; // throttle
    _driverLast = ts;
    if (typeof spriteBudgetCheck === "function") spriteBudgetCheck(_frameDt);

    // Tick legacy G.anim (kept for backward compat — flash() still pushes there)
    if (G.anim && G.anim.length) {
      for (let i = 0; i < G.anim.length; i++) G.anim[i].t--;
      G.anim = G.anim.filter(function(f) { return f.t > 0; });
    }

    if (typeof draw === "function") draw();
  }

  requestAnimationFrame(_gorDriver);
}

// Fixes the dead viewport-rect code in the original.
//
// Viewport math (mental verification):
//
//   World-pixel space origin: colrowToPixel(0,0) = {x:0, y:0}
//   World-pixel width  = hexW() * GW      (rightmost center + half-hex = hexW()*(GW-0.5)+hexW()*0.5 = hexW()*GW)
//   World-pixel height = HEX*1.5*(GH-1) + HEX  (last row center + one HEX above)
//                      = HEX * (1.5*GH - 0.5)
//
//   Minimap pixel coords for a world point (wx, wy):
//     mx = wx / (hexW() * GW)           * minimap_w
//     my = wy / (HEX * (1.5*GH - 0.5)) * minimap_h
//
//   Screen corners in world space via screenToWorld(0,0) and screenToWorld(Wc,Hc).
//   Those get projected to minimap fractions, clamped to [0..1], then scaled to pixels.
//   strokeRect is drawn at (x0, y0, x1-x0, y1-y0).
//
//   Zoom sanity-check at two extremes:
//     zoom-out (G.cam.z → 0.4): screenToWorld sees a very large world slice;
//       mx0 would be negative (clamped to 0), mx1 large (clamped to minimap_w)
//       → rect nearly fills minimap. Correct.
//     zoom-in  (G.cam.z → 2.0): screenToWorld sees a small world slice;
//       rect will be a small box tracking the viewport. Correct.
//
function drawMini() {
  if (!G.battle) return;
  const B = G.battle, M = B.M;

  // canvas dimensions
  const mw = mcv.width, mh = mcv.height;
  mctx.clearRect(0, 0, mw, mh);

  const cw = mw / M.GW, ch = mh / M.GH;

  // ---- terrain layer (PALETTE if defined, else TCOL skin 2 fallback) ----
  const PMAP = (typeof PALETTE !== "undefined") ? PALETTE[G.settings.render] : TCOL[2];

  for (let r = 0; r < M.GH; r++) {
    for (let c = 0; c < M.GW; c++) {
      const t = M.map[M.key(c, r)];
      if (!t) continue;
      mctx.fillStyle = (PMAP && PMAP[t.t]) ? PMAP[t.t] : (TCOL[2][t.t] || "#999");
      mctx.fillRect(c * cw, r * ch, cw + 0.5, ch + 0.5);
    }
  }

  // ---- fog wash ----
  for (let r = 0; r < M.GH; r++) {
    for (let c = 0; c < M.GW; c++) {
      if (!isVisible(c, r)) {
        // cool blue-grey soft wash, consistent with draw() fog veil tone
        mctx.fillStyle = "rgba(18,14,28,0.58)";
        mctx.fillRect(c * cw, r * ch, cw + 0.5, ch + 0.5);
      }
    }
  }

  // ---- objective dots ----
  for (let r = 0; r < M.GH; r++) {
    for (let c = 0; c < M.GW; c++) {
      const t = M.map[M.key(c, r)];
      if (!t || !t.obj) continue;
      // owner color: union blue / reb tan / neutral gold
      mctx.fillStyle = t.owner === "US" ? "#3d6098"
                     : t.owner === "CS" ? "#9a7d62"
                     : "#cccc88";
      // slightly larger than a unit dot so objectives are legible
      const ox = c * cw + cw * 0.5, oy = r * ch + ch * 0.5;
      const rad = Math.max(2.5, Math.min(cw, ch) * 0.55);
      mctx.beginPath();
      mctx.arc(ox, oy, rad, 0, Math.PI * 2);
      mctx.fill();
    }
  }

  // ---- unit dots ----
  for (const u of B.units) {
    if (!u.alive) continue;
    // hide unsighted enemies
    if (u.side === B.enemySide && !u.spotted) continue;

    const ux = u.c * cw + cw * 0.5, uy = u.r * ch + ch * 0.5;
    const dotR = Math.max(1.8, Math.min(cw, ch) * 0.45);

    // spotted enemy: draw a slightly larger ring first, then filled dot
    if (u.side === B.enemySide && u.spotted) {
      mctx.strokeStyle = "rgba(232,220,192,0.75)"; // --parch ring
      mctx.lineWidth = 1;
      mctx.beginPath();
      mctx.arc(ux, uy, dotR + 1.5, 0, Math.PI * 2);
      mctx.stroke();
    }

    mctx.fillStyle = u.side === "US" ? "#5d86c4" : "#b89878";
    mctx.beginPath();
    mctx.arc(ux, uy, dotR, 0, Math.PI * 2);
    mctx.fill();
  }

  // ---- viewport rectangle (FIXED — was dead code in original) ----
  //
  // World pixel extents of the full grid:
  //   width:  hexW() * GW
  //   height: HEX * (1.5 * GH - 0.5)
  //
  // Map the screen corners (world space) to minimap pixel coords.
  // clamp prevents the rect from escaping the minimap canvas.
  //
  const worldW = hexW() * M.GW;
  const worldH = HEX * (1.5 * M.GH - 0.5);

  const topLeft  = screenToWorld(0,    0   );
  const botRight = screenToWorld(Wc,   Hc  );

  // Project to minimap fraction, clamp to [0..1]
  const rx0 = clamp(topLeft.x  / worldW, 0, 1) * mw;
  const ry0 = clamp(topLeft.y  / worldH, 0, 1) * mh;
  const rx1 = clamp(botRight.x / worldW, 0, 1) * mw;
  const ry1 = clamp(botRight.y / worldH, 0, 1) * mh;

  const rw = rx1 - rx0;
  const rh = ry1 - ry0;

  // Only draw if the rect has meaningful area (avoids degenerate 0-size stroke)
  if (rw > 0.5 || rh > 0.5) {
    mctx.strokeStyle = "rgba(232,220,192,0.82)"; // --parch, 1px crisply visible
    mctx.lineWidth = 1;
    mctx.strokeRect(rx0, ry0, Math.max(rw, 1), Math.max(rh, 1));
  }
}
