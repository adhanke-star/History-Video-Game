/* ==== THE MUSTER ROLL (mr) — cross-mode regimental ledger ====
 * The series' soul: every named regiment and its fate, kept permanently.
 * Exports exactly four functions for the integrator:
 *   mrInit(C), mrOnResolve(winnerSide,type,B,C,win), mrRenderHTML(C), mrWire(C)
 * State lives only in C.muster. No engine symbols redeclared. Ledger layer only;
 * never touches battle play, render, combat math, or G.settings. */

const _mrSTATES_US = ["Maine","New York","Pennsylvania","Ohio","Indiana","Illinois",
  "Michigan","Wisconsin","Massachusetts","Connecticut","Iowa","Minnesota"];
const _mrSTATES_CS = ["Virginia","Georgia","Alabama","Mississippi","Texas",
  "South Carolina","North Carolina","Tennessee","Louisiana","Arkansas","Florida"];
const _mrARM = { inf:"Infantry", art:"Battery", cav:"Cavalry" };

// minimal HTML escape for trusted-but-unsanitized roster names
function _mrEsc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ordinal: 1->"1st", 2->"2nd", 3->"3rd", 11->"11th", 21->"21st", 33->"33rd"
function _mrOrd(n) {
  n = (n | 0);
  if (n <= 0) n = 1;
  const t = n % 100, o = n % 10;
  let suf = "th";
  if (t < 11 || t > 13) {
    if (o === 1) suf = "st";
    else if (o === 2) suf = "nd";
    else if (o === 3) suf = "rd";
  }
  return n + suf;
}

// deterministic-ish period regimental name driven by C.muster.nameSeq
function _mrName(C, type, side) {
  const m = C.muster;
  const seq = (m.nameSeq | 0);
  m.nameSeq = seq + 1;
  const pool = (side === "CS") ? _mrSTATES_CS : _mrSTATES_US;
  const state = pool[seq % pool.length];
  const arm = _mrARM[type] || "Infantry";
  // ordinal cycles 1..(pool length*2-ish) so numbers stay period-plausible
  const ord = _mrOrd((seq % 33) + 1);
  return ord + " " + state + " " + arm;
}

// mrInit(C): create C.muster if absent, then sync rolls from C.roster.
function mrInit(C) {
  if (!C) return;
  if (!C.muster || typeof C.muster !== "object") {
    C.muster = { rolls: {}, fallen: [], nameSeq: 0 };
  }
  const m = C.muster;
  if (!m.rolls || typeof m.rolls !== "object") m.rolls = {};
  if (!Array.isArray(m.fallen)) m.fallen = [];
  if (typeof m.nameSeq !== "number") m.nameSeq = 0;

  const roster = Array.isArray(C.roster) ? C.roster : [];
  for (let i = 0; i < roster.length; i++) {
    const e = roster[i];
    if (!e || !e.id) continue;
    const existing = m.rolls[e.id];
    if (!existing) {
      const nm = e.name || _mrName(C, e.type, C.side);
      m.rolls[e.id] = {
        id: e.id,
        name: nm,
        type: e.type || "inf",
        battles: 0,
        kills: 0,
        status: "standing",
        joined: "(mustered in)",
        fellAt: null,
        _auto: !e.name
      };
    } else if (e.name && existing._auto) {
      // player named this regiment after the fact — prefer the real name
      existing.name = e.name;
      existing._auto = false;
    }
  }
}

// mrOnResolve: record the just-finished battle into the ledger. No DOM, no save.
function mrOnResolve(winnerSide, type, B, C, win) {
  mrInit(C);
  if (!C || !C.muster || !B || !Array.isArray(B.units)) return;
  const m = C.muster;
  const pSide = B.playerSide;
  const fellAt = (B.bd && B.bd.name) ? B.bd.name : "an unnamed field";

  for (let i = 0; i < B.units.length; i++) {
    const u = B.units[i];
    if (!u || u.side !== pSide || u.type === "hq") continue;
    const vid = u.vetId;
    let roll = vid ? m.rolls[vid] : null;

    // alive veteran whose roll was never synced (auto-fill) → create standing roll
    if (u.alive && vid && !roll) {
      roll = {
        id: vid,
        // u.vetName is the player-supplied veteran name (null for auto-fill); u.name is
        // the engine's generic in-battle tactical label. Prefer a period _mrName over that.
        name: u.vetName || _mrName(C, u.type, C.side),
        type: u.type || "inf",
        battles: 0,
        kills: 0,
        status: "standing",
        joined: "(mustered in)",
        fellAt: null,
        _auto: !u.vetName
      };
      m.rolls[vid] = roll;
    }
    if (!roll) continue;

    if (u.alive) {
      roll.battles = (roll.battles | 0) + 1;
      // u.kills is PER-BATTLE (it does not persist on the roster), so accumulate to a
      // true campaign credited-kills total rather than taking the single best battle.
      roll.kills = (roll.kills | 0) + (u.kills || 0);
      // Only adopt a genuine player-supplied name (vetName), never the engine's generic label.
      if (u.vetName) { roll.name = u.vetName; roll._auto = false; }
    } else if (roll.status === "standing") {
      roll.status = "fallen";
      roll.fellAt = fellAt;
      m.fallen.push({ id: roll.id, name: roll.name, type: roll.type, fellAt: fellAt });
    }
  }
}

// mrRenderHTML: PURE — returns the War Department tab HTML for the ledger.
function mrRenderHTML(C) {
  if (!C) return "";
  mrInit(C);
  const m = C.muster;
  const rolls = m.rolls || {};
  const standing = [];
  const keys = Object.keys(rolls);
  for (let i = 0; i < keys.length; i++) {
    const r = rolls[keys[i]];
    if (r && r.status === "standing") standing.push(r);
  }
  const fallen = Array.isArray(m.fallen) ? m.fallen : [];
  const served = standing.length + fallen.length;

  let html = "";
  html += "<div class='mr-roll' style=\"font-family:Georgia,serif;background:#f5edd6;color:#2b2118;border:1px solid #c8b07a;border-radius:3px;padding:10px 16px 14px;\">";
  html += "<h3 style=\"margin:6px 0 2px;letter-spacing:.04em;\">The Muster Roll</h3>";
  html += "<p class='mr-counts'>" + standing.length + " standing &middot; " +
          fallen.length + " fallen &middot; " + served + " served in all</p>";

  html += "<h4>Standing</h4>";
  if (!standing.length) {
    html += "<p class='mr-empty'>No regiments yet mustered.</p>";
  } else {
    let s = "<ul class='mr-standing'>";
    for (let i = 0; i < standing.length; i++) {
      const r = standing[i];
      const arm = _mrARM[r.type] || "Infantry";
      s += "<li>" + _mrEsc(r.name) + " &mdash; " + _mrEsc(arm) +
           " &middot; " + (r.battles | 0) + " battle" + ((r.battles | 0) === 1 ? "" : "s") +
           " &middot; " + (r.kills | 0) + " credited</li>";
    }
    s += "</ul>";
    html += s;
  }

  html += "<h4>Roll of the Fallen</h4>";
  if (!fallen.length) {
    html += "<p class='mr-empty'>None have fallen. Long may it hold.</p>";
  } else {
    let f = "<ul class='mr-fallen'>";
    for (let i = 0; i < fallen.length; i++) {
      const r = fallen[i];
      const arm = _mrARM[r.type] || "Infantry";
      f += "<li>" + _mrEsc(r.name) + " &mdash; " + _mrEsc(arm) +
           " &mdash; fell at " + _mrEsc(r.fellAt) + "</li>";
    }
    f += "</ul>";
    html += f;
  }

  html += "</div>";
  return html;
}

// mrWire: ledger is read-only in v1 — no interactive controls.
function mrWire(C) {}


/* =====================================================================
   THE WAR ROOM — war-economy table (namespace "wr", state C.warroom)
   DESIGN-BIBLE v1.5 lock. CAMPAIGN-LAYER ONLY: funds, supply rating, and
   a political-capital trickle into C.clock. Does NOT touch in-battle
   combat numbers or any renderer — classic 2D unaffected.
   Exports exactly: wrInit, wrOnResolve, wrRenderHTML, wrWire.
   ===================================================================== */

const _wrKEYS = ["industry", "ordnance", "provisions", "rail", "depot"];
const _wrLABELS = {
  US: { industry: "Factory", ordnance: "Arsenal", provisions: "Farm Belt", rail: "Railroad", depot: "Forward Depot" },
  CS: { industry: "Tredegar Works", ordnance: "Niter Bureau", provisions: "Plantation Belt", rail: "Railroad", depot: "Forward Depot" }
};

function _wrEsc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function _wrCost(level) { return 120 + 90 * level; }

function _wrSideLabels(C) {
  var side = (C && C.side === "CS") ? "CS" : "US";
  return _wrLABELS[side];
}

function _wrPush(wr, msg) {
  wr.log.unshift(msg);
  while (wr.log.length > 6) wr.log.pop();
}

function wrInit(C) {
  if (!C) return;
  if (!C.warroom || typeof C.warroom !== "object") {
    C.warroom = {
      nodes: { industry: 0, ordnance: 0, provisions: 0, rail: 0, depot: 0 },
      supply: 50,
      raidCooldown: 0,
      log: []
    };
  }
  var wr = C.warroom;
  if (!wr.nodes || typeof wr.nodes !== "object") wr.nodes = { industry: 0, ordnance: 0, provisions: 0, rail: 0, depot: 0 };
  for (var i = 0; i < _wrKEYS.length; i++) {
    var k = _wrKEYS[i];
    if (typeof wr.nodes[k] !== "number") wr.nodes[k] = 0;
  }
  if (typeof wr.supply !== "number") wr.supply = 50;
  if (typeof wr.raidCooldown !== "number") wr.raidCooldown = 0;
  if (!Array.isArray(wr.log)) wr.log = [];
}

function wrOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  wrInit(C);
  var wr = C.warroom;
  var n = wr.nodes;
  if (typeof C.funds !== "number") C.funds = 0;

  // Supply rating drifts 1/3 toward a node-driven target.
  var target = clamp(40 + 8 * n.provisions + 6 * n.rail + 5 * n.depot - (win ? 0 : 8), 0, 100);
  wr.supply += Math.round((target - wr.supply) / 3);
  wr.supply = clamp(wr.supply, 0, 100);

  // Economic output to campaign funds (no combat effect).
  var gain = 25 * n.industry + 20 * n.ordnance + 15 * n.provisions;
  var railed = Math.round(gain * (wr.supply / 100) * (1 + 0.1 * n.rail));
  C.funds += railed;

  // Political-capital trickle — interlink with the 1864 Clock, if present.
  if (C.clock && typeof C.clock === "object") {
    if (typeof C.clock.capital !== "number") C.clock.capital = 0;
    C.clock.capital += Math.round((n.industry + n.ordnance) / 2);
  }

  // Raider event — CS rails are rawer, so higher strike chance.
  var pSide = (B && B.playerSide === "CS") ? "CS" : "US";
  var labels = _wrLABELS[pSide];
  if (wr.raidCooldown <= 0 && Math.random() < (pSide === "US" ? 0.18 : 0.28)) {
    wr.supply = clamp(wr.supply - 12, 0, 100);
    C.funds -= Math.round(C.funds * 0.06);
    if (C.funds < 0) C.funds = 0;
    wr.raidCooldown = 2;
    _wrPush(wr, "Raiders cut the " + labels.rail + " — supply and stores lost.");
  } else {
    wr.raidCooldown = Math.max(0, wr.raidCooldown - 1);
  }

  _wrPush(wr, "Quartermaster: +" + railed + " funds railed forward; supply " + wr.supply + ".");
}

function wrRenderHTML(C) {
  if (!C) return "";
  wrInit(C);
  var wr = C.warroom;
  var n = wr.nodes;
  var labels = _wrSideLabels(C);
  var funds = (typeof C.funds === "number") ? C.funds : 0;

  var parts = [];
  parts.push('<div class="wr-room" style="font-family:Georgia,serif;color:#2b2118;background:#f5edd6;border:1px solid #c8b07a;border-radius:3px;padding:12px 14px;">');
  parts.push('<div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #7a5f35;padding-bottom:4px;margin-bottom:8px;">');
  parts.push('<strong style="font-size:1.05em;letter-spacing:.04em;">THE WAR ROOM</strong>');
  parts.push('<span style="font-weight:bold;">Treasury: ' + _wrEsc(funds) + ' funds</span>');
  parts.push('</div>');

  // Supply meter bar.
  var sup = clamp(wr.supply, 0, 100);
  parts.push('<div style="margin-bottom:10px;">');
  parts.push('<div style="font-size:.82em;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">Campaign Supply &mdash; ' + _wrEsc(sup) + '/100</div>');
  parts.push('<div style="height:12px;background:#c9b78c;border:1px solid #7a5f35;border-radius:3px;overflow:hidden;">');
  parts.push('<div style="height:100%;width:' + sup + '%;background:#7a5f35;"></div>');
  parts.push('</div></div>');

  // Five build nodes.
  for (var i = 0; i < _wrKEYS.length; i++) {
    var k = _wrKEYS[i];
    var lvl = n[k];
    var cost = _wrCost(lvl);
    var maxed = lvl >= 5;
    var poor = funds < cost;
    var disabled = maxed || poor;
    var pips = "";
    for (var p = 0; p < 5; p++) pips += (p < lvl) ? "&#9632;" : "&#9633;";
    var btnLabel = maxed ? "Maxed (Lv 5)" : "Build &mdash; " + cost + " funds";
    var btnStyle = disabled
      ? "color:#9a8c70;background:#d6c8a4;border:1px solid #b3a079;cursor:default;"
      : "color:#f4ecd8;background:#7a5f35;border:1px solid #5a431f;cursor:pointer;";
    parts.push('<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px dotted #b3a079;">');
    parts.push('<span style="flex:1;">' + _wrEsc(labels[k]) + ' <span style="opacity:.7;font-size:.85em;">Lv ' + lvl + '</span></span>');
    parts.push('<span style="letter-spacing:2px;color:#7a5f35;margin:0 10px;">' + pips + '</span>');
    parts.push('<button id="wrBuild_' + k + '" ' + (disabled ? "disabled " : "") + 'style="padding:3px 8px;border-radius:3px;font-family:Georgia,serif;font-size:.85em;' + btnStyle + '">' + btnLabel + '</button>');
    parts.push('</div>');
  }

  // Dispatch log (newest first).
  parts.push('<div style="margin-top:10px;">');
  parts.push('<div style="font-size:.82em;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">Dispatches</div>');
  if (wr.log.length === 0) {
    parts.push('<div style="font-style:italic;opacity:.65;font-size:.85em;">No dispatches yet.</div>');
  } else {
    for (var d = 0; d < wr.log.length; d++) {
      parts.push('<div style="font-size:.85em;opacity:' + (d === 0 ? "1" : ".75") + ';">&bull; ' + _wrEsc(wr.log[d]) + '</div>');
    }
  }
  parts.push('</div>');

  parts.push('</div>');
  return parts.join("");
}

function wrWire(C) {
  if (!C) return;
  wrInit(C);
  var wr = C.warroom;
  var n = wr.nodes;
  var labels = _wrSideLabels(C);

  for (var i = 0; i < _wrKEYS.length; i++) {
    (function (k) {
      var btn = document.getElementById("wrBuild_" + k);
      if (!btn) return;
      btn.addEventListener("click", function () {
        var lvl = n[k];
        var cost = _wrCost(lvl);
        var funds = (typeof C.funds === "number") ? C.funds : 0;
        if (lvl < 5 && funds >= cost) {
          C.funds = funds - cost;
          n[k] = lvl + 1;
          _wrPush(wr, labels[k] + " expanded to Lv " + n[k] + ".");
          if (typeof _wdRefresh === "function") _wdRefresh();
          saveLocal();
        } else {
          toast("Can't build that yet.");
        }
      });
    })(_wrKEYS[i]);
  }
}


/* ============================================================================
   §24 — THE WAR DEPARTMENT (v1.5 strategic shell)  — Fable-authored integration glue
   Hosts the three v1.5 systems (1864 Clock / Muster Roll / War Room) behind one
   campaign-gated menu entry. Each system is an append-only chunk exposing exactly
   four functions (<ns>Init / <ns>OnResolve / <ns>RenderHTML / <ns>Wire); this shell
   wires them into the existing engine without the systems touching the HTML.
     • _t1InitAll(C)                       — idempotent init of all three systems
     • _t1Resolve(winnerSide,type,B,C,win) — per-battle tick (called from campaignAdvance)
     • openWarDept()                       — opens the tabbed War Department sheet
     • _wdRefresh()                        — re-renders the active tab (systems' Wire calls this)
   All guarded: absent system → tab shows a placeholder; G.campaign null → no-op.
   ============================================================================ */
var _wdTab = "clock"; // UI-only (not persisted)

function _t1InitAll(C) {
  if (!C) return;
  try { if (typeof clkInit === "function") clkInit(C); } catch (e) {}
  try { if (typeof mrInit  === "function") mrInit(C);  } catch (e) {}
  try { if (typeof wrInit  === "function") wrInit(C);  } catch (e) {}
}

// Tick order: clock first (creates C.clock), then war room (trickles into C.clock.capital),
// then muster roll (records fates). Each call is isolated so one failure can't abort the others.
function _t1Resolve(winnerSide, type, B, C, win) {
  if (!C) return;
  try { if (typeof clkOnResolve === "function") clkOnResolve(winnerSide, type, B, C, win); } catch (e) {}
  try { if (typeof wrOnResolve  === "function") wrOnResolve(winnerSide, type, B, C, win);  } catch (e) {}
  try { if (typeof mrOnResolve  === "function") mrOnResolve(winnerSide, type, B, C, win);  } catch (e) {}
}

function _wdTabBtn(k, label) {
  var on = (k === _wdTab);
  return '<button id="wdTab_' + k + '" type="button" style="padding:7px 13px;border:1px solid var(--rule);'

   the Settings sound toggle, so the looping wind bed never started on battle entry.
   _audEnterBattle starts it (and _audLeaveBattle/_audMenu stop it).

      "consensus": "A pontoon train was the army's portable bridge: a wagon convoy hauling wooden boats (bateaux, ~1,250 lb each, needing roughly 20 men to lift), the heavy timber \"balks\" that spanned boat-to-boat, the \"chess\" planks that floored the roadway, plus anchor, rope, tool, and forge wagons — a standard Federal bridge train ran on the order of ~34 pontoon wagons + ~22 chess wagons + ~4 tool and ~2 forge wagons, each wagon drawn by six animals. Engineers slid the boats into the stream, anchored them in line, laid balks across, planked them with chess, and lashed the whole into a roadway; ready bridging let an army cross at the point and moment it chose, sparing the days-long forced marches needed to reach a ford or standing bridge. Fredericksburg is the cautionary case: Burnside's vanguard reached Falmouth on Nov 17, 1862 expecting his pontoons to be waiting, but bureaucratic and transport failures (Halleck and QM Gen. Meigs slow to act; Brig. Gen. Woodbury's engineer brigade and Maj. Ira Spaulding's 50th New York short of teams/draft animals and stalled in mud) meant the trains did not consolidate until ~Nov 24–25 — by which point Lee held the heights, surprise was gone, and the Dec 11 crossing had to be forced under fire from Barksdale's Mississippi sharpshooters. The countercase is Grant's mid-June 1864 crossing of the James: to slip away from Lee and lunge at Petersburg, Union engineers (Benham's Engineer Brigade, the 50th NY Engineers, and Capt. Mendell's U.S. Engineer Battalion) threw a tidal-water pontoon bridge of roughly 2,100 feet using about 101 boats — among the longest of the war — across the James near Weyanoke/Windmill Point in about seven to eight hours beginning June 14, anchored against a roughly 4-foot tide and strong current by schooners moored midstream, over which the army's three corps, plus artillery, wagons, and herds, crossed across the next several days.",

  "_designNote": "Asymmetry is the point, again. The Union's military engineering was a decisive, under-celebrated advantage: the USMRR under Haupt and then McCallum rebuilt track and bridges faster than Confederate raiders could destroy them, the Engineer Battalion and volunteer pioneer regiments dug and bridged at scale, and the North's industry supplied the iron, timber framing, and prefabricated equipage. The Confederacy had able engineers (Gilmer, the Vicksburg and Petersburg defenders) but could not match the SCALE or resupply — the same iron shortage that decays its railroads starves its repair. So: (1) every branch costs the CS a materials/skilled-labor premium (costPremiumCS 1.25); (2) the Construction Corps claws back only a FRACTION of the rail lost each turn (railClawbackFractionPerLevel x level, capped railClawbackCap = 0.7 < 1; src/57-engineering.js engOnResolve reads src/50-production.js's railLossLast) — the headline CONFEDERATE benefit, slowing the South's irreversible decay without ever stopping or reversing it (no iron to truly rebuild), so rail still declines monotonically toward the floor, just more slowly; the recovery can never reach an equilibrium or pin rail at 100, even with the rail War-Room node fully funded; (3) the engineering score is symmetric per level otherwise, so the asymmetry is paid in cost, not effect, keeping the South's defensive engineering (its real historical strength at Vicksburg/Petersburg) viable. engScore = baselineEngineeringScore + sum(level * scorePerLevel), clamped 0-100; it feeds the bridge as an additive overall bonus (weight 0.10, like the artillery facet), plus construction raises the supply facet and pontoons lower the fatigue facet. Field Fortifications and Siege Works feed only the aggregate score in the STRATEGIC layer; their decisive defend/assault effects belong to the battle-day layer (A3 terrain cover + A6 conditioning) and the tactical engine (P-phases)."

/* ===== module: 10-president-state.js ===== */
/* ===========================================================================
   S0 · 10-president-state.js — The President's Desk: STATE + per-battle tick.

   The owner-mode (grand-strategy) layer per GRAND-STRATEGY-PLAN.md. This module
   adds C.president as a SIBLING of C.clock / C.muster / C.warroom (the existing
   War Department systems) — EXTENDING G.campaign, never duplicating it (§11).

   Four-function contract, identical to the clk/mr/wr systems:
     presInit(C)                         — idempotent; creates C.president; tolerates null C
     presOnResolve(winnerSide,type,B,C,win) — per-battle tick; mutates C.president ONLY
                                             (no DOM, no saveLocal — matches clkOnResolve)
   (presRenderHTML / presWire — the desk UI — arrive in the render/shell modules.)

   These two are REGISTERED into the overridden _t1InitAll / _t1Resolve in
   90-president-register.js, so they run automatically from startCampaign,
   openWarDept/openPresidentDesk, and campaignAdvance — by bare-name call.

   CODEBASE RULES honored here:
     • G is a bare-name lexical global — reference G directly, NEVER window.G.
     • New const/let helpers use a UNIQUE _pd* prefix (a duplicate top-level
       const is a hard SyntaxError; _pd names do not collide with _wr/_clk/_mr).
     • C.president holds PLAIN DATA only (no fns/DOM/cycles) so it JSON-serializes
       into the existing save (serializeSave sends all of G.campaign wholesale —
       it rides the save with NO _SAVE_VER bump; back-compat = idempotent presInit).
   =========================================================================== */

var _pdLOG_MAX = 6;

/* Append a dispatch line to the President's log (newest-first, capped) —
   mirrors the clk/wr log convention. Guarded; never throws into the tick. */
function _pdLog(C, line) {
  try {
    if (!C || !C.president) return;
    if (!C.president.log) C.president.log = [];
    C.president.log.unshift(line);
    if (C.president.log.length > _pdLOG_MAX) C.president.log.length = _pdLOG_MAX;
  } catch (e) {}
}

/* Authored cabinet rosters. No cabinet/advisor data exists anywhere in the repo
   (verified), so S0 authors it. Real historical secretaries, side-scoped; the
   per-domain advisor system (auto-manage + recommend + TEACH, R25) layers on in
   S2. Names are surnames (the portrait API keys on surname). Provenance: all
   Verified (standard cabinet records). */
var _pdCABINET = {
  US: [
    { role: "Secretary of War",       name: "Stanton",   domain: "war"      },
    { role: "Secretary of the Treasury", name: "Chase",  domain: "treasury" },
    { role: "Secretary of State",     name: "Seward",    domain: "state"    },
    { role: "Secretary of the Navy",  name: "Welles",    domain: "navy"     }
  ],
  CS: [
    { role: "Secretary of War",       name: "Seddon",    domain: "war"      },
    { role: "Secretary of the Treasury", name: "Memminger", domain: "treasury" },
    { role: "Secretary of State",     name: "Benjamin",  domain: "state"    },
    { role: "Secretary of the Navy",  name: "Mallory",   domain: "navy"     }
  ]
};

/* The head of state for each side (the player's persona, R32). */
var _pdPRESIDENT = {
  US: { name: "Lincoln", title: "President of the United States",       seat: "Executive Mansion, Washington" },
  CS: { name: "Davis",   title: "President of the Confederate States",  seat: "Executive Mansion, Richmond"   }
};

/* ---- presInit: idempotent lazy init — the back-compat / migration mechanism ----
   Old (pre-S0) ver-1 saves gain C.president on the next desk-open or battle tick;
   applySave restores G.campaign wholesale and does NOT re-run init, so EVERY
   reader must call presInit first. Re-validates each field for partial objects. */
function presInit(C) {
  if (!C) return;                                  // warWonScreen sets G.campaign=null — tolerate it
  var side = (C.side === "CS") ? "CS" : "US";
  if (!C.president) {
    C.president = {
      // Strategic clock. War opens at Fort Sumter (April 1861) — the layered
      // onboarding anchor (§10/§23). Advances as the war proceeds.
      date: { year: 1861, month: 4 },
      head: { name: _pdPRESIDENT[side].name, title: _pdPRESIDENT[side].title, seat: _pdPRESIDENT[side].seat },
      cabinet: _pdCABINET[side].map(function (a) {
        return { role: a.role, name: a.name, domain: a.domain, delegated: false };
      }),
      pendingChoices: [],   // curated, non-blocking executive choices surfaced per turn (R3/R24/R22)
      onboarded: false,     // layered-onboarding flag (set true once the desk is first opened)
      turn: 0,              // count of strategic turns elapsed
      log: []
    };
  }
  var P = C.president;
  if (!P.date)               P.date = { year: 1861, month: 4 };
  if (typeof P.date.year !== "number")  P.date.year = 1861;
  if (typeof P.date.month !== "number") P.date.month = 4;
  if (!P.head)               P.head = { name: _pdPRESIDENT[side].name, title: _pdPRESIDENT[side].title, seat: _pdPRESIDENT[side].seat };
  if (!P.cabinet || !P.cabinet.length) {
    P.cabinet = _pdCABINET[side].map(function (a) {
      return { role: a.role, name: a.name, domain: a.domain, delegated: false };
    });
  }
  if (!P.pendingChoices)     P.pendingChoices = [];
  if (typeof P.turn !== "number") P.turn = 0;
  if (typeof P.onboarded !== "boolean") P.onboarded = false;
  if (!P.log)                P.log = [];
}

/* Pretty month label for the strategic clock. */
function _pdMonthName(m) {
  var names = ["", "January", "February", "March", "April", "May", "June",
               "July", "August", "September", "October", "November", "December"];
  return names[m] || "";
}

/* ---- presOnResolve: per-battle strategic-turn tick. Mutate C.president ONLY.
   No DOM, no saveLocal. Runs AFTER clkOnResolve in _t1Resolve, so C.clock
   exists if we want to read/feed it (interlink pattern, like wr→clk.capital). ---- */
function presOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  presInit(C);                                     // belt-and-suspenders for wholesale-restored saves
  try {
    var P = C.president;
    P.turn = (P.turn || 0) + 1;

    // 1) Advance the strategic date. Placeholder cadence: ~one month per battle.
    //    (Real variable pacing — weekly in season, compressed in winter, §22 —
    //    arrives with the strategic-turn loop content.)
    var d = P.date;
    d.month += 1;
    if (d.month > 12) { d.month = 1; d.year += 1; }
    // Keep the strategic year in step with the 1864 Clock if it has advanced
    // further (the clock tracks max battle year). Interlink, never regress.
    if (C.clock && typeof C.clock.year === "number" && d.year < C.clock.year) {
      d.year = C.clock.year;
    }

    // 2) Surface curated, NON-BLOCKING executive choices for the next turn.
    //    S0 keeps this an empty stub (the loop is live but content-light); S1+
    //    fills it with preset-gated, advisor-mediated options (economy, finance,
    //    appointments, diplomacy, home-front events). Reset each turn.
    P.pendingChoices = [];

    // 3) Log a dispatch to the Executive Mansion (newest-first, capped).
    var bn = (B && B.bd && B.bd.name) ? B.bd.name : (B && B.name) ? B.name : "the field";
    _pdLog(C, (win ? "Victory" : (type === "draw" ? "Stalemate" : "Setback"))
              + " at " + bn + " — " + _pdMonthName(d.month) + " " + d.year + ".");
  } catch (e) {}
}

   Codebase rules: bare-name globals (G, never window.G); portraitFor lives in a

/* Small two-cell stat row for the overview ledger. */
function _pdStat(label, value, accent) {
  return '<div style="display:flex;justify-content:space-between;gap:12px;padding:3px 0;border-bottom:1px dotted var(--rule)">'
    + '<span style="opacity:.75">' + label + '</span>'
    + '<span style="font-weight:bold' + (accent ? ';color:' + accent : '') + '">' + value + '</span>'
    + '</div>';
}

/* A meter (0-100) drawn as a thin period bar. */
function _pdMeter(label, v, hi) {
  v = Math.max(0, Math.min(100, Math.round(v || 0)));
  var col = hi ? (v > 66 ? '#9c3b2e' : v > 33 ? '#b8863b' : '#4a6b3a')   // higher = worse (weariness/intervention)
               : (v > 66 ? '#4a6b3a' : v > 33 ? '#b8863b' : '#9c3b2e');  // higher = better (supply/capital)
  return '<div style="margin:5px 0">'
    + '<div style="display:flex;justify-content:space-between;font-size:12px;opacity:.8"><span>' + label + '</span><span>' + v + '</span></div>'
    + '<div style="height:7px;background:rgba(0,0,0,.25);border:1px solid var(--rule);border-radius:3px;overflow:hidden">'
    + '<div style="height:100%;width:' + v + '%;background:' + col + '"></div></div></div>';
}

/* ---- "The War Effort": the President's state-of-the-war overview (S0). ----
   A live ledger drawn from the existing systems; full economy/finance is S1. */
function presRenderEconomy(C) {

  var P = C.president, clk = C.clock || {}, wr = C.warroom || {};

  var head = P.head || {};
  var portrait = "";
  if (typeof window.portraitFor === "function") {
    try {
      portrait = '<img src="' + window.portraitFor(head.name, C.side, { named: true }) + '" alt="'
        + (head.name || 'President') + '" style="width:84px;height:84px;object-fit:cover;border:2px solid var(--rule);border-radius:4px;flex:0 0 auto">';
    } catch (e) {}
  }
  var nodeLevels = 0, nodeKeys = ["industry", "ordnance", "provisions", "rail", "depot"];
  if (wr.nodes) for (var i = 0; i < nodeKeys.length; i++) nodeLevels += (wr.nodes[nodeKeys[i]] || 0);

  var dispatches = "";
  if (P.log && P.log.length) {
    dispatches = '<div style="margin-top:12px"><div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin-bottom:4px">From the Wires</div>';
    for (var d = 0; d < P.log.length; d++) dispatches += '<div style="font-size:12px;opacity:.85;padding:2px 0">&bull; ' + P.log[d] + '</div>';
    dispatches += '</div>';
  } else {
    dispatches = '<p class="lede" style="opacity:.6;font-size:12px;margin-top:12px">No dispatches yet — the war is young.</p>';
  }

  var electionLine = clk.resolved1864
    ? (clk.elected ? 'Won (war continues)' : 'Lost (peace platform ascendant)')
    : (clk.year >= 1864 ? 'Pending — November 1864' : 'Not yet at hand');

  return ''
    + '<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:10px">'
    +   portrait
    +   '<div style="flex:1 1 auto">'
    +     '<div style="font-size:18px;font-weight:bold">' + (head.title || 'The President') + '</div>'
    +     '<div style="opacity:.75;font-size:13px">' + (head.seat || '') + '</div>'
    +     '<div style="opacity:.85;font-size:13px;margin-top:4px">'
    +       _pdMonthName(P.date.month) + ' ' + P.date.year + ' &middot; Strategic Turn ' + (P.turn || 0)
    +     '</div>'
    +   '</div>'
    + '</div>'
    + '<hr class="rule">'

/* ===== module: 40-economy.js ===== */
/* ===========================================================================
   S1 · 40-economy.js — The finance core (the spine of the asymmetric economy).

   Content-complete from data/economy.json (build-injected as GAME_DATA.economy;
   citation-grade research, run i). Models the war's central economic morality
   tale: HOW a side finances the war (bonds / taxes / the printing press) and the
   consequence (inflation). The Union balances bonds+taxes and stays anchored;
   the Confederacy — thin bond market + near-zero tax collection — is FORCED onto
   the press and spirals into hyperinflation. The asymmetry is EMERGENT from the
   real parameters, not scripted (the teaching mechanic, §2 + R29).

   Adds C.economy as a sibling of clock/muster/warroom/president. Four-function
   contract: econInit / econOnResolve (tick) / econRenderFinance / econWireFinance.
   Balance principle (§27): the Treasury is DELEGATED to the Secretary by default
   (auto-managed, historical mix) — opt in to run it yourself. Non-blocking.

   Bare-name globals (G, GAME_DATA); _ec* unique helper names; render never
   mutates/saves; the tick mutates C.economy + feeds C.clock.weariness (interlink).
   =========================================================================== */

var _ecPRINT_HI = 0.40;        // printing fraction above which the CS spiral compounds
var _ecINFL_MAX = 200;         // hard clamp so a runaway CS never hits Infinity
var _ecDEMAND   = 100;         // normalized per-turn war-financing demand (both sides)

/* Pull a side's finance config from GAME_DATA with hardcoded fallbacks that
   mirror data/economy.json (so the module works even if GAME_DATA is absent). */
function _ecCfg(side) {
  var G2 = (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.economy) ? GAME_DATA.economy : null;
  var d = {
    US: { startFunds: 6500, mix: { bonds: 0.66, taxes: 0.21, printing: 0.13 },
          taxEff: 0.80, bondAbsorb: 100, inflCoeff: 0.06, spiral: 1.0, target: 1.8, secretary: "Chase" },
    CS: { startFunds: 900, mix: { bonds: 0.32, taxes: 0.08, printing: 0.60 },
          taxEff: 0.10, bondAbsorb: 20, inflCoeff: 0.18, spiral: 1.15, target: 90.0, secretary: "Memminger" }
  };
  var base = d[side] || d.US;
  if (G2) {
    try {
      var s = G2.sides && G2.sides[side];
      if (s && typeof s.startFunds === "number") base.startFunds = s.startFunds;
      var rm = G2.finance && G2.finance.revenueMix && G2.finance.revenueMix[side];
      if (rm) base.mix = { bonds: rm.bonds, taxes: rm.taxes, printing: rm.printing };
      var lv = G2.finance && G2.finance.levers;
      if (lv) {
        if (lv.taxes && lv.taxes[side] && typeof lv.taxes[side].collectionEfficiency === "number") base.taxEff = lv.taxes[side].collectionEfficiency;
        if (lv.bonds && lv.bonds[side] && typeof lv.bonds[side].absorptionPerTurn === "number") base.bondAbsorb = lv.bonds[side].absorptionPerTurn;
        if (lv.printing && lv.printing[side] && typeof lv.printing[side].inflationPerUnitPrinted === "number") base.inflCoeff = lv.printing[side].inflationPerUnitPrinted * (side === "CS" ? 1.8 : 4.0);
      }
      var inf = G2.finance && G2.finance.inflation && G2.finance.inflation[side];
      if (inf) { if (typeof inf.spiralCoefficient === "number") base.spiral = inf.spiralCoefficient; if (typeof inf.cumulativeTargetMultiplier === "number") base.target = inf.cumulativeTargetMultiplier; }
    } catch (e) {}
  }
  return base;
}

function _ecSecretary(C) {
  var side = (C && C.side === "CS") ? "CS" : "US";
  return (side === "CS") ? "Memminger" : "Chase";
}

function _ecPush(C, line) {
  try {
    if (!C.economy.log) C.economy.log = [];
    C.economy.log.unshift(line);
    if (C.economy.log.length > 6) C.economy.log.length = 6;
  } catch (e) {}
}

/* Normalize the 3-way mix to sum to 1 (after a lever shift). */
function _ecNorm(mix) {
  var s = (mix.bonds || 0) + (mix.taxes || 0) + (mix.printing || 0);
  if (s <= 0) { mix.bonds = 0.34; mix.taxes = 0.33; mix.printing = 0.33; return mix; }
  mix.bonds /= s; mix.taxes /= s; mix.printing /= s; return mix;
}

/* ---- econInit: idempotent; seeds C.economy from the side's finance config. ---- */
function econInit(C) {
  if (!C) return;
  var side = (C.side === "CS") ? "CS" : "US";
  var cfg = _ecCfg(side);
  if (!C.economy) {
    C.economy = {
      inflation: 1.0,                                   // cumulative price level vs 1861 = 1.0
      mix: { bonds: cfg.mix.bonds, taxes: cfg.mix.taxes, printing: cfg.mix.printing },
      debt: 0,
      hiPrintTurns: 0,                                  // turns of heavy printing (CS spiral driver)
      delegated: true,                                  // Treasury auto-managed by default (balance principle)
      lastTurn: null,
      log: []
    };
  }
  var E = C.economy;
  if (typeof E.inflation !== "number") E.inflation = 1.0;
  if (!E.mix) E.mix = { bonds: cfg.mix.bonds, taxes: cfg.mix.taxes, printing: cfg.mix.printing };
  if (typeof E.debt !== "number") E.debt = 0;
  if (typeof E.hiPrintTurns !== "number") E.hiPrintTurns = 0;
  if (typeof E.delegated !== "boolean") E.delegated = true;
  if (!E.log) E.log = [];
}

/* ---- econOnResolve: the per-turn finance tick. Mutates C.economy + (interlink)
   C.clock.weariness. Runs AFTER clkOnResolve so the clock exists. ----
   Emergent asymmetry: each turn the side must finance _ecDEMAND. Taxes yield
   little (CS efficiency ~0.10); bonds are capped by what the public absorbs
   (CS thin + shrinks as inflation rises); WHATEVER is left must be PRINTED →
   inflation. The CS shortfall forces the press → spiral; the US covers demand
   with bonds+taxes → stays anchored. */
function econOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  econInit(C);
  try {
    var side = (C.side === "CS") ? "CS" : "US";
    var cfg = _ecCfg(side);
    var E = C.economy;

    // Delegated Treasury → the Secretary reverts to the historical mix each turn.
    if (E.delegated) E.mix = { bonds: cfg.mix.bonds, taxes: cfg.mix.taxes, printing: cfg.mix.printing };
    _ecNorm(E.mix);

    // Bond absorption: US deep + steady; CS thin and shrinks as inflation climbs.
    var bondCap = (side === "CS") ? (cfg.bondAbsorb / Math.max(1, E.inflation)) : cfg.bondAbsorb;
    var taxYield  = _ecDEMAND * E.mix.taxes * cfg.taxEff;
    var bondYield = Math.min(_ecDEMAND * E.mix.bonds, bondCap);
    var printed   = _ecDEMAND - taxYield - bondYield;     // the residue MUST be printed
    if (printed < 0) printed = 0;
    var printFrac = printed / _ecDEMAND;

    // Inflation: US linear-dampened; CS super-linear (compounds with sustained printing).
    if (printFrac > _ecPRINT_HI) E.hiPrintTurns += 1; else if (E.hiPrintTurns > 0) E.hiPrintTurns -= 1;
    var spiralFactor = (side === "CS") ? Math.pow(cfg.spiral, E.hiPrintTurns) : 1.0;
    var inflRate = printFrac * cfg.inflCoeff * spiralFactor;
    if (side === "US") inflRate = Math.min(inflRate, 0.04);  // US per-turn cap (anchored)
    var before = E.inflation;
    E.inflation = Math.min(_ecINFL_MAX, E.inflation * (1 + inflRate));

    E.debt += bondYield;
    E.lastTurn = { taxYield: Math.round(taxYield), bondYield: Math.round(bondYield),
                   printed: Math.round(printed), inflRatePct: Math.round(inflRate * 1000) / 10,
                   inflation: Math.round(E.inflation * 100) / 100 };

    // Interlink: inflation erodes the home front (feeds the 1864 Clock weariness).
    if (C.clock && typeof C.clock.weariness === "number") {
      var wDelta = Math.min(9, inflRate * 22);
      C.clock.weariness = Math.max(0, Math.min(100, C.clock.weariness + wDelta));
    }

    if (E.inflation > before * 1.08) _ecPush(C, "Prices surge — paper money buys ×" + (Math.round(E.inflation * 10) / 10) + " of 1861.");
    else if (printed > _ecDEMAND * 0.5) _ecPush(C, "The Treasury leans hard on the printing press this quarter.");
  } catch (e) {}
}

/* Status word for an inflation multiplier. */
function _ecInflStatus(m) {
  if (m < 1.5) return ["Stable", "#4a6b3a"];
  if (m < 3)   return ["Rising", "#b8863b"];
  if (m < 10)  return ["Severe", "#c9712e"];
  if (m < 30)  return ["Critical", "#9c3b2e"];
  return ["Collapsing", "#7a241b"];
}

/* The teaching card (R7/R26 — ambient, on-demand). */
function _ecWhyText(C) {
  var side = (C && C.side === "CS") ? "CS" : "US";
  if (side === "CS") {
    return '<b>The Confederacy printed itself to death.</b> With almost no banking system, a population that resisted taxation, '
      + 'and a cotton economy strangled by the blockade, the Richmond government covered ~60% of its spending by printing paper money. '
      + 'Prices rose roughly <b>9,000%</b> by 1865 — flour reached hundreds of dollars a barrel. Historians (Douglas Ball; Roger Ransom) '
      + 'argue the financial collapse was as fatal as any battlefield defeat. <span style="opacity:.7">Verified.</span>';
  }
  return '<b>The Union invented modern war finance.</b> Salmon Chase and Jay Cooke sold war bonds to ordinary citizens through ~2,500 agents, '
    + 'the 1862 Legal Tender Act made "greenbacks" national currency, and the National Banking Acts tied banks to federal debt. '
    + 'Borrowing and taxing — not just printing — held cumulative inflation to ~<b>80%</b> (McPherson). Sound finance was a Northern war-winning weapon. '
    + '<span style="opacity:.7">Verified.</span>';
}

/* ---- econWireFinance: lever buttons, delegate toggle, teaching expander. ---- */
function econWireFinance(C) {

  if (del) del.addEventListener("click", function () {
    E.delegated = !E.delegated;

    if (typeof _wdRefresh === "function") _wdRefresh();
  });
  var why = document.getElementById("ecWhy");
  if (why) why.addEventListener("click", function () {
    var box = document.getElementById("ecWhyBox");
    if (!box) return;

    else box.style.display = "none";
  });
  if (!E.delegated) {
    var btns = document.querySelectorAll('[data-eclever]');
    for (var i = 0; i < btns.length; i++) {
      (function (b) {
        b.addEventListener("click", function () {
          var lever = b.getAttribute("data-eclever"), dir = parseInt(b.getAttribute("data-ecdir"), 10);
          var step = 0.05 * dir;
          E.mix[lever] = Math.max(0, Math.min(1, (E.mix[lever] || 0) + step));
          // pull the opposite weight mainly from the printing press (or to it)
          var other = (lever === "printing") ? "bonds" : "printing";
          E.mix[other] = Math.max(0, (E.mix[other] || 0) - step);
          _ecNorm(E.mix);
          if (typeof saveLocal === "function") saveLocal();
          if (typeof _wdRefresh === "function") _wdRefresh();
        });
      })(btns[i]);
    }
  }
}


/* ===== module: 50-production.js ===== */
/* ===========================================================================
   S1b · 50-production.js — the asymmetric war-production layer.

   Content-complete from data/economy.json (GAME_DATA.economy.production). EXTENDS
   the existing War Room (G.campaign.warroom nodes — industry/ordnance/provisions/
   rail/depot) rather than duplicating it: the wr nodes are the INPUTS; this layer
   computes the matériel REALITY on top — arms & artillery output, rail integrity,
   food distribution, and a composite army EQUIP index — with the historical
   asymmetry. The Union is effectively unconstrained; the Confederacy is throttled
   by a hard iron ceiling (~20k tons/yr), import-dependence for small arms, and
   IRREVERSIBLE rail decay (no replacement iron → ~7%/turn throughput loss). The
   result: CS armies grow ragged and hungry as the war drags — emergent, not scripted.

   Adds C.production (sibling state). prodInit / prodOnResolve (tick, after wr so it
   can read the nodes) / presProdBlock (overview render fragment, called from the
   War Effort tab). Bare-name globals; _pr* helpers; tick may nudge clock.weariness
   (CS hunger) — modest, additive to the finance-inflation pressure.
   =========================================================================== */

var _prRAIL_DECAY_CS = 0.07;     // CS rail throughput lost per turn (no replacement iron)
var _prARMS_NEED = 45;           // per-turn small-arms need (both sides, normalized vs CS 16-turn scale)

function _prCfg(side) {
  var P = (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.economy && GAME_DATA.economy.production) ? GAME_DATA.economy.production : null;
  var d = {
    US: { arms: 85, arty: 40, foodDist: 0.85, importFactor: 1.0, railDecay: 0, ironCeiling: 9999 },
    CS: { arms: 6, arty: 17, foodDist: 0.45, importFactor: 0.6, railDecay: 0.07, ironCeiling: 20 }
  };
  var base = d[side] || d.US;
  if (P) {
    try {
      if (P.industry && P.industry.smallArmsPerTurn && typeof P.industry.smallArmsPerTurn[side] === "number") base.arms = P.industry.smallArmsPerTurn[side];
      if (P.industry && P.industry.artilleryPerTurn && typeof P.industry.artilleryPerTurn[side] === "number") base.arty = P.industry.artilleryPerTurn[side];
      if (P.rail && P.rail.deteriorationPerTurnPct && typeof P.rail.deteriorationPerTurnPct[side] === "number") base.railDecay = P.rail.deteriorationPerTurnPct[side] / 100;
      var ag = P.agriculture && P.agriculture.distributionEfficiency;
      if (ag) { if (side === "US" && typeof ag.US === "number") base.foodDist = ag.US; else if (side === "CS" && ag.CS_byTurn && typeof ag.CS_byTurn.start === "number") base.foodDist = ag.CS_byTurn.start; }
    } catch (e) {}
  }
  return base;
}

function _prPush(C, line) {
  try {
    if (!C.production.log) C.production.log = [];
    C.production.log.unshift(line);
    if (C.production.log.length > 6) C.production.log.length = 6;
  } catch (e) {}
}

function prodInit(C) {
  if (!C) return;
  var side = (C.side === "CS") ? "CS" : "US";
  var cfg = _prCfg(side);
  if (!C.production) {
    C.production = { railIntegrity: 100, equipIndex: (side === "CS" ? 60 : 95), foodDist: cfg.foodDist, lastTurn: null, log: [] };
  }
  var P = C.production;
  if (typeof P.railIntegrity !== "number") P.railIntegrity = 100;
  if (typeof P.equipIndex !== "number") P.equipIndex = (side === "CS" ? 60 : 95);
  if (typeof P.foodDist !== "number") P.foodDist = cfg.foodDist;
  if (!P.log) P.log = [];
}

/* Per-turn production tick. Reads the War Room nodes; runs AFTER wrOnResolve. */
function prodOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  prodInit(C);
  try {
    var side = (C.side === "CS") ? "CS" : "US";
    var cfg = _prCfg(side);
    var P = C.production;
    var wr = C.warroom || { nodes: {} };
    var nodes = wr.nodes || {};
    var industry = nodes.industry || 0, ordnance = nodes.ordnance || 0, railNode = nodes.rail || 0, provisions = nodes.provisions || 0;

    // 1) Rail integrity: CS decays irreversibly (no replacement iron); rail-node investment slows it a touch.
    if (cfg.railDecay > 0) {
      var decay = cfg.railDecay * (1 - 0.08 * railNode);    // depots/rail spending mitigates slightly
      var railBefore = P.railIntegrity;
      P.railIntegrity = Math.max(8, P.railIntegrity * (1 - decay));
      P.railLossLast = railBefore - P.railIntegrity;         // A2: the Engineer Corps may claw back a FRACTION of this (never all)
    } else {
      P.railIntegrity = Math.min(100, P.railIntegrity + 2);  // US repairs/USMRR keeps it full
      P.railLossLast = 0;
    }
    var throughput = P.railIntegrity / 100;

    // 2) Matériel output. US scales freely with industry/ordnance nodes; CS is gated by the
    //    iron ceiling + import-dependence (small arms mostly imported → blockade-gated). S1c
    //    wires the live blockade importFactor (C.blockade, set this same turn BEFORE prod);
    //    falls back to the static cfg.importFactor placeholder if the blockade layer is absent.
    var impF = (side === "CS")
      ? ((C.blockade && typeof C.blockade.importFactor === "number") ? C.blockade.importFactor : cfg.importFactor)
      : 1;
    var armsRaw = cfg.arms * (1 + 0.18 * industry) * impF;
    var artyRaw = cfg.arty * (1 + 0.15 * ordnance);
    if (side === "CS") {
      // iron ceiling: rail repair + ordnance compete for the same scarce metal
      var ironPressure = 1 / (1 + 0.05 * (ordnance + railNode));   // more nodes chasing same iron → diminishing
      armsRaw *= ironPressure; artyRaw *= ironPressure;
    }
    var armsThisTurn = Math.round(armsRaw);
    var artyThisTurn = Math.round(artyRaw);

    // 3) Food distribution declines with rail integrity (CS "hunger amid plenty").
    P.foodDist = Math.max(0.15, cfg.foodDist * (side === "CS" ? throughput : 1) + 0.02 * provisions);
    P.foodDist = Math.min(0.95, P.foodDist);

    // 4) Composite EQUIP index — how well-found the armies are (arms adequacy + rail + food).
    var armsAdequacy = Math.min(1, armsThisTurn / _prARMS_NEED);
    var target = 100 * (0.45 * armsAdequacy + 0.30 * throughput + 0.25 * (P.foodDist / 0.85));
    P.equipIndex = Math.round(Math.max(5, Math.min(100, P.equipIndex + (target - P.equipIndex) * 0.5)));

    P.lastTurn = { arms: armsThisTurn, arty: artyThisTurn, rail: Math.round(P.railIntegrity), food: Math.round(P.foodDist * 100), equip: P.equipIndex };

    // 5) Interlink: CS supply/hunger erodes the home front (additive to inflation pressure).
    if (side === "CS" && C.clock && typeof C.clock.weariness === "number") {
      if (P.equipIndex < 45) C.clock.weariness = Math.min(100, C.clock.weariness + (45 - P.equipIndex) * 0.08);
    }
    if (side === "CS" && P.railIntegrity < 50) _prPush(C, "The railroads fail — stores rot in depots while the men go hungry.");
    else if (side === "US" && P.equipIndex >= 90) _prPush(C, "The arsenals and railroads keep the armies well-found.");
  } catch (e) {}
}

/* Status word for the equip index. */
function _prEquipStatus(v) {
  if (v >= 85) return ["Well-found", "#4a6b3a"];
  if (v >= 60) return ["Adequate", "#b8863b"];
  if (v >= 35) return ["Strained", "#c9712e"];
  return ["Ragged", "#9c3b2e"];
}

/* Overview fragment for the War Effort tab (called by presRenderEconomy). */
function presProdBlock(C) {
  if (!C || !C.production) return '';
  var P = C.production, es = _prEquipStatus(P.equipIndex);
  var lt = P.lastTurn;
  var bar = function (label, v, col) {
    v = Math.max(0, Math.min(100, Math.round(v)));
    return '<div style="margin:4px 0"><div style="display:flex;justify-content:space-between;font-size:12px;opacity:.8"><span>' + label + '</span><span>' + v + '</span></div>'
      + '<div style="height:7px;background:rgba(0,0,0,.25);border:1px solid var(--rule);border-radius:3px;overflow:hidden"><div style="height:100%;width:' + v + '%;background:' + col + '"></div></div></div>';
  };
  var out = '<hr class="rule"><div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:2px 0 4px">War Production &amp; Logistics</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:13px">Army equipment</span>'
    + '<span style="font-weight:bold;color:' + es[1] + '">' + P.equipIndex + ' &middot; ' + es[0] + '</span></div>'
    + bar('Railroad integrity', P.railIntegrity, P.railIntegrity > 60 ? '#4a6b3a' : P.railIntegrity > 30 ? '#b8863b' : '#9c3b2e')
    + bar('Food reaching the front', P.foodDist * 100, P.foodDist > 0.6 ? '#4a6b3a' : '#b8863b');
  if (lt) out += '<div style="font-size:12px;opacity:.8;margin-top:4px">Last quarter: <b>' + lt.arms + '</b>k shoulder arms, <b>' + lt.arty + '</b> guns produced.</div>';
  return out;
}


/* ===== module: 55-weapons.js ===== */
/* ===========================================================================
   S? · 55-weapons.js — The Armory: buy real weapons with money, loot-game style.

   Aaron's directive: battlefield accuracy boosts + weapon upgrades "like Borderlands,
   weapons spec fun", AND "money be a factor to buy best weapons for army person or
   brigade, partial or whole part of army." This is §6 (procure/issue real arms via
   the economy, cost/supply-limited) + §19 (RPG-style weapon variety) made concrete —
   and it finally makes C.funds matter.

   Real Civil War small arms (data/weapons.json -> GAME_DATA.weapons) carry loot-style
   RARITY tiers (common -> legendary) and specs (range/accuracy/rate-of-fire/quality).
   You spend funds to ARM a fraction of your army with a weapon — 10% at a time (your
   best brigades) or the whole line. Better guns cost more; arming everyone with
   Spencers is ruinous, so you mix. The army's weapon-SCORE feeds the battle bridge
   (firepower/equipment) — and, once the battle-day hook lands, on-field accuracy.

   Adds C.armory { loadout } (weaponId -> fraction of the army). armoryInit /
   armoryWeaponScore / armoryBuy / armoryRenderArmory / armoryWireArmory. Bare-name
   globals; _arm* helpers; render never mutates or saves.
   =========================================================================== */

function _armData() {
  return (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.weapons) ? GAME_DATA.weapons : null;
}
function _armCat() {
  var D = _armData();
  return (D && D.weapons) ? D.weapons : [];
}
function _armBaseline() { var D = _armData(); return (D && typeof D.baselineQuality === "number") ? D.baselineQuality : 30; }
function _armBatch() { var D = _armData(); return (D && typeof D.batchFraction === "number") ? D.batchFraction : 0.1; }

function armoryInit(C) {
  if (!C) return;
  if (!C.armory || typeof C.armory !== "object") C.armory = { loadout: {} };
  if (!C.armory.loadout || typeof C.armory.loadout !== "object") C.armory.loadout = {};
}

function _armYear(C) {
  return (C && C.clock && typeof C.clock.year === "number") ? C.clock.year
       : (C && C.president && C.president.date && typeof C.president.date.year === "number") ? C.president.date.year : 1861;
}

/* Availability + the side's price for a weapon. */
function _armAvail(C, w) {
  var side = (C && C.side === "CS") ? "CS" : "US";
  var year = _armYear(C);
  if (w.year && year < w.year) return { ok: false, reason: "Not yet available (" + w.year + ")" };
  if (w.csOnly && side === "US") return { ok: false, reason: "Confederate manufacture only" };
  var mult = 1.0;
  if (side === "CS") {
    if (w.csImport) mult = 1.4;            // blockade premium on imports
    else if (w.id === "springfield") mult = 1.6;  // captured Federal arms
    else if (w.usFavored) mult = 1.5;      // scarce in the South
  }
  return { ok: true, mult: mult };
}

function _armSumLoadout(C) {
  var lo = C.armory.loadout, t = 0;
  for (var k in lo) if (lo.hasOwnProperty(k)) t += (lo[k] || 0);
  return Math.min(1, t);
}

/* The army's weapon-score (0-100): issued weapons by fraction + the musket baseline. */
function armoryWeaponScore(C) {
  if (!C) return _armBaseline();
  armoryInit(C);
  var cat = _armCat(), lo = C.armory.loadout, base = _armBaseline();
  var qById = {}; for (var i = 0; i < cat.length; i++) qById[cat[i].id] = cat[i].quality || base;
  var total = 0, acc = 0;
  for (var k in lo) if (lo.hasOwnProperty(k)) { var f = lo[k] || 0; total += f; acc += f * (qById[k] || base); }
  total = Math.min(1, total);
  acc += (1 - total) * base;
  return Math.round(Math.max(0, Math.min(100, acc)));
}

/* Buy: mode "batch" arms one batch (~10%) more; mode "all" re-arms the whole line.
   Returns { ok, reason }. Mutates C.funds + C.armory.loadout. */
function armoryBuy(C, weaponId, mode) {
  if (!C) return { ok: false, reason: "no campaign" };
  armoryInit(C);
  var cat = _armCat(), w = null;
  for (var i = 0; i < cat.length; i++) if (cat[i].id === weaponId) { w = cat[i]; break; }
  if (!w) return { ok: false, reason: "unknown weapon" };
  var av = _armAvail(C, w);
  if (!av.ok) return { ok: false, reason: av.reason };
  var batch = _armBatch();
  if (mode === "all") {
    var costAll = Math.round(w.cost * (1 / batch) * av.mult);
    if ((C.funds || 0) < costAll) return { ok: false, reason: "Insufficient funds ($" + costAll + " needed)" };
    C.funds -= costAll;
    C.armory.loadout = {}; C.armory.loadout[weaponId] = 1.0;
    return { ok: true, spent: costAll };
  }
  var total = _armSumLoadout(C);
  var room = Math.max(0, 1 - total);
  var added = Math.min(batch, room);
  if (added <= 0.0001) return { ok: false, reason: "Whole army already armed — re-arm the line to upgrade" };
  var cost = Math.round(w.cost * (added / batch) * av.mult);
  if ((C.funds || 0) < cost) return { ok: false, reason: "Insufficient funds ($" + cost + " needed)" };
  C.funds -= cost;
  C.armory.loadout[weaponId] = (C.armory.loadout[weaponId] || 0) + added;
  return { ok: true, spent: cost };
}

function _armRarityCol(r) {
  return r === "legendary" ? "#b8863b" : r === "rare" ? "#7a5cff" : r === "uncommon" ? "#4a6b3a" : "#8a8276";
}
function _armScoreWord(v) {
  if (v >= 80) return ["Devastating", "#4a6b3a"];
  if (v >= 62) return ["Modern", "#6f9e5a"];
  if (v >= 45) return ["Rifled line", "#b8863b"];
  if (v >= 32) return ["Mixed arms", "#c9712e"];
  return ["Antiquated", "#9c3b2e"];
}

/* ---- armoryRenderArmory: The Armory desk tab. ---- */
function armoryRenderArmory(C) {
  if (!C) return '';
  armoryInit(C);
  var cat = _armCat();
  if (!cat.length) return '<p class="lede" style="text-align:center;opacity:.7">The armory records are not yet available.</p>';
  var score = armoryWeaponScore(C), sw = _armScoreWord(score);
  var lo = C.armory.loadout, total = Math.round(_armSumLoadout(C) * 100);

  // current loadout summary
  var issued = "";
  var names = {}; for (var i = 0; i < cat.length; i++) names[cat[i].id] = cat[i];
  for (var k in lo) if (lo.hasOwnProperty(k) && lo[k] > 0.001) {
    var wk = names[k] || { name: k, rarity: "common" };
    issued += '<span style="display:inline-block;margin:2px 6px 2px 0;padding:2px 7px;border:1px solid ' + _armRarityCol(wk.rarity) + ';border-radius:3px;font-size:11px">'
      + wk.name + ' <b>' + Math.round(lo[k] * 100) + '%</b></span>';
  }
  if (total < 100) issued += '<span style="display:inline-block;margin:2px 6px 2px 0;padding:2px 7px;border:1px solid var(--rule);border-radius:3px;font-size:11px;opacity:.7">Model 1842 Musket <b>' + (100 - total) + '%</b></span>';

  var cards = "";
  for (var c = 0; c < cat.length; c++) {
    var w = cat[c], av = _armAvail(C, w), col = _armRarityCol(w.rarity);
    var batchCost = Math.round(w.cost * (av.mult || 1));
    var allCost = Math.round(w.cost * (1 / _armBatch()) * (av.mult || 1));
    var disabled = !av.ok;
    cards += '<div style="padding:9px;border:1px solid ' + col + ';border-radius:5px;background:rgba(0,0,0,.12);opacity:' + (disabled ? '.5' : '1') + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:baseline"><b style="font-size:13px">' + w.name + '</b>'
      + '<span style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:' + col + '">' + w.rarity + '</span></div>'
      + '<div style="font-size:11px;opacity:.6">' + w.caliber + ' &middot; ' + w.rangeYds + ' yds &middot; acc ' + w.accuracy + ' &middot; ' + w.rateOfFire + '/min &middot; quality ' + w.quality + '</div>'
      + '<div style="font-size:11px;opacity:.78;margin:4px 0">' + w.flavor + '</div>';
    if (disabled) cards += '<div style="font-size:11px;color:#9c3b2e">' + av.reason + '</div>';
    else cards += '<div class="btn-row" style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">'
      + '<button class="upg" data-armbuy="' + w.id + '" data-armmode="batch" style="padding:2px 8px;font-size:11px">Arm 10% &middot; $' + batchCost + '</button>'
      + '<button class="upg" data-armbuy="' + w.id + '" data-armmode="all" style="padding:2px 8px;font-size:11px">Arm the line &middot; $' + allCost + '</button></div>';
    cards += '</div>';
  }

  return ''
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap">'
    +   '<div><div style="font-size:17px;font-weight:bold">The Armory</div>'
    +     '<div style="opacity:.75;font-size:12px">Procure arms for your army — the best guns win firefights, but money is a factor.</div></div>'
    +   '<div style="text-align:right"><div style="font-size:12px;opacity:.7">Army firepower</div>'
    +     '<div style="font-size:22px;font-weight:bold;color:' + sw[1] + '">' + score + '</div>'
    +     '<div style="font-size:12px;color:' + sw[1] + '">' + sw[0] + '</div></div>'
    + '</div><hr class="rule">'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:13px;margin-bottom:4px"><span>Treasury: <b>$' + (C.funds || 0) + '</b></span></div>'
    + '<div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:4px 0 2px">How your army is armed</div>'
    + '<div style="margin-bottom:8px">' + (issued || '<span style="opacity:.6;font-size:12px">Muskets, all.</span>') + '</div>'
    + '<div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:8px 0 4px">The catalog</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">' + cards + '</div>'
    + '<div class="btn-row" style="margin-top:10px"><button id="armReset" type="button" class="upg" style="font-size:11px">Reset to muskets</button></div>';
}

function armoryWireArmory(C) {
  if (!C) return;
  var btns = document.querySelectorAll('[data-armbuy]');
  for (var i = 0; i < btns.length; i++) {
    (function (b) {
      b.addEventListener("click", function () {
        var id = b.getAttribute("data-armbuy"), mode = b.getAttribute("data-armmode");
        var r = armoryBuy(C, id, mode);
        if (!r.ok && typeof toast === "function") toast(r.reason);
        if (typeof saveLocal === "function") saveLocal();
        if (typeof _wdRefresh === "function") _wdRefresh();
      });
    })(btns[i]);
  }
  var reset = document.getElementById("armReset");
  if (reset) reset.addEventListener("click", function () {
    C.armory.loadout = {};
    if (typeof saveLocal === "function") saveLocal();
    if (typeof _wdRefresh === "function") _wdRefresh();
  });
}


/* ===== module: 56-artillery.js ===== */
/* ===========================================================================
   A1 · 56-artillery.js — The Cannon Corps: build an artillery arm, battery by
   battery, with money. The companion to The Armory (55-weapons.js): small arms
   are issued by FRACTION of the line; cannon are raised by the BATTERY (a corps
   you assemble), because that is how the long arm actually scaled.

   Aaron's directive (backlog A1): "an artillery tier in The Armory — 12-pdr
   Napoleon, 3-inch Ordnance Rifle, 10-pdr Parrott, Whitworth (rare). Buildable as
   a corps (battery counts) feeding the bridge 'firepower' + battle artillery."

   Real Civil War field pieces (data/artillery.json -> GAME_DATA.artillery) carry
   loot-style RARITY tiers and a `quality` composite. You spend funds to RAISE
   batteries (Union ~6 guns, Confederate ~4 — the historical asymmetry); a battery
   is a big-ticket purchase next to a rifle. The corps' BATTERY-SCORE (quality of
   your guns x how full your park is) feeds the battle bridge as an "artillery"
   facet that adds punch to the army you field. The CS pays an import premium on
   the Whitworth and a captured-gun premium on Federal-standard pieces.

   Adds C.artillery { batteries } (gunId -> battery count). artInit /
   artBatteryScore / artBuy / artRenderSection / artWireSection. Bare-name globals;
   _art* helpers; reuses _armRarityCol from 55-weapons; render never mutates/saves.
   =========================================================================== */

function _artData() {
  return (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.artillery) ? GAME_DATA.artillery : null;
}
function _artGuns() { var D = _artData(); return (D && D.guns) ? D.guns : []; }
function _artBaseline() { var D = _artData(); return (D && typeof D.baselineArtilleryScore === "number") ? D.baselineArtilleryScore : 8; }
function _artFull() { var D = _artData(); return (D && typeof D.fullComplementBatteries === "number" && D.fullComplementBatteries > 0) ? D.fullComplementBatteries : 12; }
function _artGunsPerBattery(C) {
  var D = _artData(), side = (C && C.side === "CS") ? "CS" : "US";
  if (!D) return side === "CS" ? 4 : 6;
  return side === "CS" ? (D.batteryGunsCS || 4) : (D.batteryGunsUnion || 6);
}
function _artUnionGuns() { var D = _artData(); return (D && D.batteryGunsUnion) ? D.batteryGunsUnion : 6; }

/* Honor a configured cost of 0 (a starter/gift gun); only fall back to 1000 when the field is missing/invalid. */
function _artCost(g) { return (g && typeof g.costPerBattery === "number" && isFinite(g.costPerBattery) && g.costPerBattery >= 0) ? g.costPerBattery : 1000; }

/* Escape data-driven text before it enters innerHTML — the catalog is tunable/untrusted-shaped data. */
function _artEsc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

function artInit(C) {
  if (!C) return;
  // typeof [] === "object", so guard arrays explicitly: a JSON round-trip serializes an array as []
  // and drops every named property, silently wiping the player's whole park on the next save.
  if (Array.isArray(C.artillery) || !C.artillery || typeof C.artillery !== "object") C.artillery = { batteries: {} };
  if (Array.isArray(C.artillery.batteries) || !C.artillery.batteries || typeof C.artillery.batteries !== "object") C.artillery.batteries = {};
  // Sanitize the battery COUNTS once at the chokepoint: a corrupt/hand-edited/imported save can carry
  // "3" / null / objects that would poison the score (string concatenation, NaN). Coerce or drop.
  var b = C.artillery.batteries;
  for (var k in b) if (b.hasOwnProperty(k)) {
    var raw = b[k];   // only numbers/numeric-strings; reject booleans/objects (Number(true)===1 would grant a free battery)
    var n = (typeof raw === "number" || typeof raw === "string") ? Math.floor(Number(raw)) : NaN;
    if (!isFinite(n) || n <= 0) delete b[k];   // drop null/NaN/booleans/objects/<=0
    else b[k] = n;                             // coerce "3" -> 3
  }
}

function _artYear(C) {
  return (C && C.clock && typeof C.clock.year === "number") ? C.clock.year
       : (C && C.president && C.president.date && typeof C.president.date.year === "number") ? C.president.date.year : 1861;
}

/* Availability + the side's price multiplier for a gun. */
function _artAvail(C, g) {
  var side = (C && C.side === "CS") ? "CS" : "US";
  var year = _artYear(C);
  if (g.year && year < g.year) return { ok: false, reason: "Not yet available (" + g.year + ")" };
  if (g.csOnly && side === "US") return { ok: false, reason: "Confederate manufacture only" };
  if (g.usOnly && side === "CS") return { ok: false, reason: "Federal manufacture only" };
  var mult = 1.0;
  if (g.csImport) mult = (side === "CS") ? 1.5 : 1.2;   // a British import: blockade premium (CS) vs foreign-import premium (US) — the South pays more, but the rare tier is dear for everyone
  else if (side === "CS" && g.usFavored) mult = 1.4;    // Federal-standard pieces scarce in the South — captured, mostly
  return { ok: true, mult: mult };
}

function _artTotalBatteries(C) {
  var b = C.artillery.batteries, t = 0;
  for (var k in b) if (b.hasOwnProperty(k)) t += (Number(b[k]) || 0);
  return t;
}

/* The corps' artillery-score (0-100): quality of your guns x how full your park is,
   then the Confederate stacking handicaps that made the long arm a Union strength.
   No batteries -> the baseline (a token of attached guns). A full park of fine
   rifles -> the gun's quality; a few Napoleons -> a real but partial arm.

   Asymmetry (data/artillery.json _designNote + the CS-handicap teaching card; numbers
   are designer calibration, logged in DECISIONS.md D42):
     · gun ratio   — a CS battery is 4 guns to the Union's 6, so its batteries fill the
                     park ~2/3 as fast (the metal-per-battery handicap is mechanical now,
                     not just a UI label).
     · fuze        — a flat haircut for the unreliable Bormann copy: shell/case duds.
                     Solid shot & canister need no fuze, so this is a small expected-value
                     hit, NOT a per-shot roll (that roll + gun-loss-on-retreat belong to the
                     battle-day layer A6 / tactical P-phases).
     · horse/forage— a mobility malus that worsens to severe in 1864-65.
     · mixed cal.  — a resupply drag once the park runs 3+ calibers.
     · massing 1863— the battalion reorganizations concentrated fire (both armies); the Union
                     kept an army-level Artillery Reserve the ANV abolished after Chancellorsville,
                     so the Union bonus is larger. */
function artBatteryScore(C) {
  if (!C) return _artBaseline();
  artInit(C);
  var guns = _artGuns(), bat = C.artillery.batteries, full = _artFull();
  var base = Math.max(0, Math.min(100, _artBaseline()));   // clamp the (data-tunable) baseline into range
  var qById = {}; for (var i = 0; i < guns.length; i++) { var gid = guns[i] && guns[i].id; if (gid == null) continue; qById[gid] = guns[i].quality || 50; }
  var total = 0, acc = 0, types = 0;
  for (var k in bat) if (bat.hasOwnProperty(k)) { var n = Number(bat[k]) || 0; if (n > 0) { total += n; acc += n * (qById[k] || 50); types++; } }
  if (total <= 0) return base;
  var avgQ = acc / total;
  var side = (C.side === "CS") ? "CS" : "US";
  var gunRatio = (_artUnionGuns() > 0) ? (_artGunsPerBattery(C) / _artUnionGuns()) : 1;   // US 1.0, CS ~0.667
  var coverage = Math.min(1, (total * gunRatio) / full);
  var score = avgQ * (0.4 + 0.6 * coverage);
  var year = _artYear(C);
  if (side === "CS") {
    score *= 0.96;                                                         // fuze unreliability (shell/case)
    if (year >= 1864) score *= 0.88; else if (year >= 1862) score *= 0.95; // horse/forage collapse worsens late
    if (types >= 3) score *= 0.94;                                         // mixed-caliber resupply drag
  }
  if (year >= 1863 && total >= 6) score *= (side === "US") ? 1.08 : 1.04;  // 1863 massing reform (Union Reserve edge)
  return Math.round(Math.max(base, Math.min(100, score)));
}

/* Buy n batteries of a gun. Mutates C.funds + C.artillery.batteries. */
function artBuy(C, gunId, n) {
  if (!C) return { ok: false, reason: "no campaign" };
  if (gunId == null) return { ok: false, reason: "unknown gun" };   // never buy into the "undefined" key
  artInit(C);
  n = Math.max(1, Math.round(Number(n) || 1));   // Number() so a stray non-numeric n can't yield NaN batteries
  var guns = _artGuns(), g = null;
  for (var i = 0; i < guns.length; i++) if (guns[i].id === gunId) { g = guns[i]; break; }
  if (!g) return { ok: false, reason: "unknown gun" };
  var av = _artAvail(C, g);
  if (!av.ok) return { ok: false, reason: av.reason };
  var cost = Math.round(_artCost(g) * (av.mult || 1) * n);
  if ((C.funds || 0) < cost) return { ok: false, reason: "Insufficient funds ($" + cost + " for " + n + " " + (n > 1 ? "batteries" : "battery") + ")" };
  C.funds -= cost;
  C.artillery.batteries[gunId] = (C.artillery.batteries[gunId] || 0) + n;
  return { ok: true, spent: cost, batteries: C.artillery.batteries[gunId] };
}

function _artScoreWord(v) {
  if (v >= 80) return ["A grand battery", "#4a6b3a"];
  if (v >= 62) return ["A strong park", "#6f9e5a"];
  if (v >= 45) return ["A serviceable arm", "#b8863b"];
  if (v >= 25) return ["A few guns", "#c9712e"];
  return ["Almost no guns", "#9c3b2e"];
}

/* Rarity colour: reuse The Armory's palette so the two tiers read as one catalog. */
function _artRar(r) {
  return (typeof _armRarityCol === "function") ? _armRarityCol(r)
    : (r === "legendary" ? "#b8863b" : r === "rare" ? "#7a5cff" : r === "uncommon" ? "#4a6b3a" : "#8a8276");
}

/* ---- artRenderSection: the Cannon Corps block, appended below The Armory. ---- */
function artRenderSection(C) {
  if (!C) return '';
  artInit(C);
  var guns = _artGuns();
  if (!guns.length) return '';   // no data -> render nothing (The Armory still stands)
  var score = artBatteryScore(C), sw = _artScoreWord(score);
  var bat = C.artillery.batteries, totalBat = _artTotalBatteries(C), perBat = _artGunsPerBattery(C);
  var names = {}; for (var i = 0; i < guns.length; i++) names[guns[i].id] = guns[i];

  // current park summary
  var park = "";
  for (var k in bat) if (bat.hasOwnProperty(k) && bat[k] > 0) {
    var gk = names[k] || { name: k, rarity: "common" };
    park += '<span style="display:inline-block;margin:2px 6px 2px 0;padding:2px 7px;border:1px solid ' + _artRar(gk.rarity) + ';border-radius:3px;font-size:11px">'
      + _artEsc(gk.name) + ' &times;<b>' + bat[k] + '</b></span>';
  }

  var cards = "";
  for (var c = 0; c < guns.length; c++) {
    var g = guns[c], av = _artAvail(C, g), col = _artRar(g.rarity);
    var batCost = Math.round(_artCost(g) * (av.mult || 1));
    var btnCost = Math.round(_artCost(g) * (av.mult || 1) * 3);
    var owned = bat[g.id] || 0;
    var disabled = !av.ok;
    var proj = (g.projectiles && g.projectiles.length) ? g.projectiles.join(', ') : '';
    cards += '<div style="padding:9px;border:1px solid ' + col + ';border-radius:5px;background:rgba(0,0,0,.12);opacity:' + (disabled ? '.5' : '1') + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:baseline"><b style="font-size:13px">' + _artEsc(g.name) + '</b>'
      + '<span style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:' + col + '">' + _artEsc(g.rarity) + '</span></div>'
      + '<div style="font-size:11px;opacity:.6">' + _artEsc(g.caliber) + ' &middot; ' + g.rangeYds + ' yds &middot; ' + g.rateOfFire + '/min &middot; crew ' + g.crew + ' &middot; quality ' + g.quality + '</div>'
      + (proj ? '<div style="font-size:10px;opacity:.5">' + _artEsc(proj) + '</div>' : '')
      + '<div style="font-size:11px;opacity:.78;margin:4px 0">' + _artEsc(g.flavor) + '</div>'
      + (owned ? '<div style="font-size:11px;color:' + col + '">In the park: ' + owned + ' ' + (owned > 1 ? 'batteries' : 'battery') + '</div>' : '');
    if (disabled) cards += '<div style="font-size:11px;color:#9c3b2e">' + av.reason + '</div>';
    else cards += '<div class="btn-row" style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">'
      + '<button class="upg" data-artbuy="' + _artEsc(g.id) + '" data-artn="1" style="padding:2px 8px;font-size:11px">Raise a battery &middot; $' + batCost + '</button>'
      + '<button class="upg" data-artbuy="' + _artEsc(g.id) + '" data-artn="3" style="padding:2px 8px;font-size:11px">Raise a battalion (3) &middot; $' + btnCost + '</button></div>';
    cards += '</div>';
  }

  return ''
    + '<hr class="rule" style="margin:16px 0 10px">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap">'
    +   '<div><div style="font-size:17px;font-weight:bold">The Cannon Corps</div>'
    +     '<div style="opacity:.75;font-size:12px">Raise batteries to build your long arm. Massed guns firing canister break a charge &mdash; but cannon cost dear, and the South gets ' + perBat + ' to the Union\'s ' + (_artData() ? (_artData().batteryGunsUnion || 6) : 6) + '.</div></div>'
    +   '<div style="text-align:right"><div style="font-size:12px;opacity:.7">Artillery</div>'
    +     '<div style="font-size:22px;font-weight:bold;color:' + sw[1] + '">' + score + '</div>'
    +     '<div style="font-size:12px;color:' + sw[1] + '">' + sw[0] + '</div></div>'
    + '</div>'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;margin:4px 0 6px"><span>Batteries: <b>' + totalBat + '</b></span><span>Guns: <b>' + (totalBat * perBat) + '</b></span><span>Treasury: <b>$' + (C.funds || 0) + '</b></span></div>'
    + (park ? '<div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:4px 0 2px">Your park</div><div style="margin-bottom:8px">' + park + '</div>' : '')
    + '<div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:8px 0 4px">The ordnance catalog</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">' + cards + '</div>'
    + (totalBat ? '<div class="btn-row" style="margin-top:10px"><button id="artDisband" type="button" class="upg" style="font-size:11px">Disband the park</button></div>' : '');
}

function artWireSection(C) {
  if (!C) return;
  var btns = document.querySelectorAll('[data-artbuy]');
  for (var i = 0; i < btns.length; i++) {
    (function (b) {
      b.addEventListener("click", function () {
        var id = b.getAttribute("data-artbuy"), n = parseInt(b.getAttribute("data-artn"), 10) || 1;
        var r = artBuy(C, id, n);
        if (!r.ok && typeof toast === "function") toast(r.reason);
        if (typeof saveLocal === "function") saveLocal();
        if (typeof _wdRefresh === "function") _wdRefresh();
      });
    })(btns[i]);
  }
  var dis = document.getElementById("artDisband");
  if (dis) dis.addEventListener("click", function () {
    C.artillery.batteries = {};
    if (typeof saveLocal === "function") saveLocal();
    if (typeof _wdRefresh === "function") _wdRefresh();
  });
}


/* ===== module: 57-engineering.js ===== */
/* ===========================================================================
   A2 · 57-engineering.js — The Engineering Works Corps: build the army's
   engineer arm with money. The third buildable in The Armory (after small arms
   55-weapons.js and the Cannon Corps 56-artillery.js), but engineering is
   bought as CAPABILITY LEVELS, not units: you raise four branches —
   Construction Corps (Haupt's USMRR rail/bridge repair), Field Fortifications
   (the spade), Pontoon Train (river crossings), Siege Works (saps/parallels) —
   each from level 0 to 3.

   Aaron's directive (backlog A2): "Engineering Works Corps — Haupt's USMRR
   Construction Corps: rail/bridge repair, fieldworks/entrenchment, pontoons,
   siege. A buildable branch that raises the bridge's entrench/supply/fatigue
   facets + slows CS rail decay (ties production rail). Additive."

   Wiring:
     · engScore(C) (0-100) feeds the battle bridge (85-…) as an additive
       `engineering` facet (like the Cannon Corps' artillery facet).
     · engBranchBoost(C,"construction") raises the bridge SUPPLY facet;
       engBranchBoost(C,"pontoons") lowers the bridge FATIGUE facet.
     · engOnResolve repairs C.production.railIntegrity each turn by the
       Construction Corps level — the headline CONFEDERATE benefit: it SLOWS
       (cannot stop) the South's irreversible rail decay (50-production.js).
   Asymmetry: the CS pays a materials/skilled-labor premium (costPremiumCS).

   Adds C.engineering { levels:{branchId->level} }. engInit / engScore /
   engBranchLevel / engBranchBoost / engBuy / engOnResolve / engRenderSection /
   engWireSection. Bare-name globals; _eng* helpers; render never mutates/saves
   (init is idempotent + shape-defensive). Hardened up front per A1/D42:
   Array.isArray guards, value coercion, data escaped before innerHTML.
   =========================================================================== */

function _engData() {
  return (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.engineering) ? GAME_DATA.engineering : null;
}
function _engBranches() { var D = _engData(); return (D && D.branches && D.branches.length) ? D.branches : []; }
function _engBaseline() { var D = _engData(); return (D && typeof D.baselineEngineeringScore === "number") ? D.baselineEngineeringScore : 12; }
function _engMax(b) {
  if (b && typeof b.maxLevel === "number" && b.maxLevel > 0) return Math.floor(b.maxLevel);
  if (b && b.costPerLevel && b.costPerLevel.length) return b.costPerLevel.length - 1;
  return 3;
}
function _engCostPremium(C) {
  var D = _engData(), p = (D && typeof D.costPremiumCS === "number") ? D.costPremiumCS : 1.25;
  return (C && C.side === "CS") ? p : 1.0;
}
function _engLevelCost(b, lvl) {
  var arr = b && b.costPerLevel;
  if (!arr || lvl < 0 || lvl >= arr.length) return null;
  var c = arr[lvl];
  return (typeof c === "number" && isFinite(c) && c >= 0) ? c : null;
}

/* Escape data-driven text before it enters innerHTML — quote-safe so it is also correct in
   attribute position (data-engbuy="..."), not just element text. */
