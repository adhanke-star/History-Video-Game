// ---- logMsg(msg, cls) ----
function logMsg(msg, cls) {
  const body = document.getElementById("logBody");
  if (!body) return;
  const el = document.createElement("div");
  el.className = cls ? "e " + cls : "e";
  el.textContent = msg;
  body.appendChild(el);
  while (body.children.length > 80) body.removeChild(body.firstChild);
  const log = document.getElementById("log");
  if (log) log.scrollTop = log.scrollHeight;
  if (G.battle) G.battle.log.push({ msg, cls: cls || "" });
}

// ---- toast(msg, ms=1900) ----
let _toastTimer = null;
function toast(msg, ms) {
  const el = document.getElementById("toast");
  if (!el) return;
  if (_toastTimer !== null) { clearTimeout(_toastTimer); _toastTimer = null; }
  el.textContent = msg;
  el.classList.add("show");
  _toastTimer = setTimeout(function () { el.classList.remove("show"); _toastTimer = null; },
    (typeof ms === "number") ? ms : 1900);
}

// ---- showHud() / hideHud() ----
// showHud reveals all panels except #info (hidden until unit selected via refreshUI)
const _HUD_IDS = ["topbar", "objbar", "info", "orders", "log", "mini", "turnstrip"];
function showHud() {
  for (const id of _HUD_IDS) {
    const el = document.getElementById(id);
    if (el) el.classList[id === "info" ? "add" : "remove"]("hidden");
  }
}
function hideHud() {
  for (const id of _HUD_IDS) {
    const el = document.getElementById(id);
    if (el) el.classList.add("hidden");
  }
}

// ---- refreshUI() ----
// No-op unless G.battle. Never calls draw().
function refreshUI() {
  if (!G.battle) return;
  const B = G.battle;

  // topbar
  const elB = document.getElementById("tbBattle"); if (elB) elB.textContent = B.bd.name;
  const elY = document.getElementById("tbYear");   if (elY) elY.textContent = B.bd.year;
  const elW = document.getElementById("tbWx");
  if (elW && WX[B.wx]) elW.textContent = WX[B.wx].ico + " " + WX[B.wx].name;
  const elS = document.getElementById("tbSide");
  if (elS) { elS.textContent = B.playerSide === "US" ? "UNION" : "CONFEDERATE"; elS.className = "sidechip " + B.playerSide; }

  // turn strip
  const elT = document.getElementById("tsTurn"); if (elT) elT.textContent = B.turn;
  const elM = document.getElementById("tsMax");  if (elM) elM.textContent = B.maxTurns;

  // objectives list
  const elOL = document.getElementById("objList");
  if (elOL && B.M && B.M.objs) {
    let h = "";
    for (const obj of B.M.objs) {
      const dc = obj.owner === "US" ? "dot held-US" : obj.owner === "CS" ? "dot held-CS" : "dot held-0";
      const tn = (TERRAIN[obj.t] && TERRAIN[obj.t].name) ? TERRAIN[obj.t].name : obj.t;
      // Colorblind + screen-reader redundancy: ownership is NEVER conveyed by the
      // colored dot alone — a glyph and a word say who holds it. (WCAG 1.4.1)
      const heldSym  = obj.owner === "US" ? "✦" : obj.owner === "CS" ? "✕" : "○";
      const heldWord = obj.owner === "US" ? "Union held" : obj.owner === "CS" ? "Rebel held" : "Contested";
      const valStr = obj.obj ? obj.obj.val : "";
      h += '<div class="ob" role="listitem" aria-label="Objective, ' + heldWord + ', ' + tn + '">'
        + '<span class="' + dc + '" aria-hidden="true"></span>'
        + '<span><span aria-hidden="true" style="font-weight:700;margin-right:3px">' + heldSym + '</span>'
        + 'Objective ★' + valStr + ' — ' + tn
        + ' <span style="color:var(--rule);font-size:10px">(' + heldWord + ')</span></span></div>';
    }
    elOL.setAttribute("role", "list");
    elOL.innerHTML = h;
  }

  // unit info panel
  const infoEl = document.getElementById("info");
  const u = G.sel;

  if (u) {
    if (infoEl) infoEl.classList.remove("hidden");

    const flagEl = document.getElementById("ufFlag");
    if (flagEl) {
      flagEl.style.background  = u.side === "US" ? "var(--union)" : "var(--reb)";
      flagEl.style.borderColor = u.side === "US" ? "var(--union-lt)" : "var(--reb-lt)";
    }

    const nameEl = document.getElementById("ufName");
    if (nameEl) nameEl.textContent = unitLabel(u);

    const roleEl = document.getElementById("ufRole");
    if (roleEl) {
      const an = (ARM[u.type] && ARM[u.type].name) ? ARM[u.type].name : u.type;
      const wn = (u.weapon && WEAPONS[u.weapon]) ? WEAPONS[u.weapon].name : "";
      roleEl.textContent = wn ? an + " — " + wn : an;
    }

    const bodyEl = document.getElementById("ufBody");
    if (bodyEl) {
      function bar(label, pct, fillCls, lowThresh, valStr) {
        const low = pct < lowThresh;
        return '<div class="stat"><span class="lab">' + label + '</span>'
          + '<div class="bar"><i class="' + fillCls + (low ? " fill-low" : "") + '" style="width:' + Math.round(pct * 100) + '%"></i>'
          + '<span class="num">' + valStr + '</span></div></div>';
      }
      const sp = u.maxStr > 0 ? clamp(u.strength / u.maxStr, 0, 1) : 0;
      const mp = u.maxMor > 0 ? clamp(u.morale  / u.maxMor, 0, 1) : 0;
      let h = bar("Strength", sp, "fill-str", 0.34, u.strength)
            + bar("Morale",   mp, "fill-mor", 0.30, u.morale);
      if (u.maxAmmo > 0) {
        const ap = clamp(u.ammo / u.maxAmmo, 0, 1);
        h += bar("Ammo", ap, "fill-amm", 0.26, u.ammo + "/" + u.maxAmmo);
      }
      // XP pips
      let xp = "";
      const xv = u.xp || 0;
      for (let i = 0; i < 5; i++) xp += '<span class="xp' + (i < xv ? "" : " off") + '"></span>';
      h += '<div class="kv"><span>XP</span><span>' + xp + "</span></div>";
      h += '<div class="kv"><span>Entrench</span><b>' + (u.ent || 0) + "/3</b></div>";
      h += '<div class="kv"><span>Supplied</span><b>' + (u.supplied ? "Yes" : "No") + "</b></div>";
      if (u.leader && u.leader.alive) {
        const td = (TRAITS[u.leader.trait] && TRAITS[u.leader.trait].desc) ? TRAITS[u.leader.trait].desc : "";
        h += '<div class="lead-badge"><div class="lnm">' + u.leader.name + (u.leader.cmd ? " ★" : "") + "</div>"
           + (td ? "<div>" + td + "</div>" : "") + "</div>";
      }
      // Madden-style ratings card (C11)
      if (typeof renderRatingsCard === "function" && u.type !== "hq") {
        h += '<div style="margin-top:8px">' + renderRatingsCard(u, {}) + '</div>';
      }
      bodyEl.innerHTML = h;
    }
  } else {
    if (infoEl) infoEl.classList.add("hidden");
  }

  // order buttons
  const bMv = document.getElementById("obMove");
  const bFi = document.getElementById("obFire");
  const bCh = document.getElementById("obCharge");
  const bEn = document.getElementById("obEntrench");
  const bDn = document.getElementById("obDone");
  function setDis(btn, v) { if (!btn) return; v ? btn.setAttribute("disabled","disabled") : btn.removeAttribute("disabled"); }

  if (u && u.side === B.playerSide) {
    setDis(bMv, u.mp <= 0 || u.done || u.routed || u.type === "fort");
    setDis(bFi, u.fired || u.done || u.ammo <= 0 || !u.weapon);
    setDis(bCh, u.done || u.type === "art" || u.type === "nav" || u.type === "fort");
    setDis(bEn, u.done || u.type === "cav" || u.type === "nav" || u.type === "hq" || u.ent >= 3);
    setDis(bDn, u.done);
  } else {
    setDis(bMv, true); setDis(bFi, true); setDis(bCh, true); setDis(bEn, true); setDis(bDn, true);
  }

  // highlight active order button
  for (const [btn, ord] of [[bMv,"move"],[bFi,"fire"],[bCh,"charge"]]) {
    if (!btn) continue;
    btn.style.borderColor = G.order === ord ? "var(--brass-lt)" : "";
    btn.style.boxShadow   = G.order === ord ? "0 0 0 1px var(--brass)" : "";
  }
}

// ---- coachShow / coachNext / coachEnd ----
let _coachSteps = [], _coachIdx = 0;

function coachShow(steps) {
  if (!steps || !steps.length) return;
  _coachSteps = steps; _coachIdx = 0; _coachRender();
}

function _coachRender() {
  const el = document.getElementById("coach");
  if (!el) return;
  const step = _coachSteps[_coachIdx];
  if (!step) { coachEnd(); return; }
  const total = _coachSteps.length;
  const isLast = _coachIdx >= total - 1;
  el.innerHTML =
    '<div class="ct">' + (step.title || "") + "</div>"
    + '<div style="margin:4px 0 8px;font-size:12px;color:var(--parch-dk)">' + (step.body || "") + "</div>"
    + '<div class="cb"><span class="cstep">' + (_coachIdx + 1) + " / " + total + "</span>"
    + '<button class="cnext" id="_coachNxt">' + (isLast ? "Done" : "Next") + "</button></div>";
  el.classList.remove("hidden");
  el.style.left = "50%"; el.style.bottom = "140px"; el.style.transform = "translateX(-50%)";
  const nb = document.getElementById("_coachNxt");
  if (nb) nb.addEventListener("click", isLast ? coachEnd : coachNext);
}

function coachNext() {
  _coachIdx++;
  if (_coachIdx >= _coachSteps.length) coachEnd(); else _coachRender();
}

function coachEnd() {
  const el = document.getElementById("coach");
  if (el) { el.classList.add("hidden"); el.innerHTML = ""; }
  _coachSteps = []; _coachIdx = 0;
}

/* ==== §10 — SOUND (CHUNK-02) ==== */

(function(){
  "use strict";

  // ---- shared AudioContext (lazy) ----
  let ctx = null;        // single shared context, created on first use
  let voices = [];       // active voice tracking [{src,gain,end}]
  const MAX_VOICES = 8;

  // ambient state
  let ambientNode = null;   // BufferSourceNode for looping wind
  let ambientGain = null;   // GainNode for ambient

  function getCtx() {
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
    }
    if (ctx.state === "suspended") {
      ctx.resume();
    }
    return ctx;
  }

  // drop oldest voice when at cap
  function claimVoice() {
    const now = ctx.currentTime;
    // purge already-finished voices
    voices = voices.filter(v => v.end > now);
    if (voices.length >= MAX_VOICES) {
      // stop the oldest
      const oldest = voices.shift();
      try { oldest.src.stop(); } catch(e) {}
    }
  }

  function trackVoice(src, duration) {
    voices.push({ src, end: ctx.currentTime + duration });
  }

  // ---- individual sfx builders ----

  // volley: white-noise burst ~0.18s, bandpassed ~1.8kHz
  function sfxVolley(c) {
    const dur = 0.18;
    const bufLen = Math.ceil(c.sampleRate * dur);
    const buf = c.createBuffer(1, bufLen, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const src = c.createBufferSource();
    src.buffer = buf;

    const bpf = c.createBiquadFilter();
    bpf.type = "bandpass";
    bpf.frequency.value = 1800;
    bpf.Q.value = 1.2;

    const gain = c.createGain();
    gain.gain.setValueAtTime(0.6, c.currentTime);
    gain.gain.linearRampToValueAtTime(0, c.currentTime + dur);

    src.connect(bpf);
    bpf.connect(gain);
    gain.connect(c.destination);

    claimVoice();
    src.start();
    trackVoice(src, dur);
  }

  // cannon: low sine thump + noise, ~0.5s, ~70Hz
  function sfxCannon(c) {
    const dur = 0.5;
    const t0 = c.currentTime;

    // sine thump
    const osc = c.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(70, t0);
    osc.frequency.exponentialRampToValueAtTime(30, t0 + 0.4);

    const oscGain = c.createGain();
    oscGain.gain.setValueAtTime(0.9, t0);
    oscGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.5);

    osc.connect(oscGain);
    oscGain.connect(c.destination);

    // noise punch
    const bufLen = Math.ceil(c.sampleRate * 0.12);
    const buf = c.createBuffer(1, bufLen, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const noiseSrc = c.createBufferSource();
    noiseSrc.buffer = buf;

    const lpf = c.createBiquadFilter();
    lpf.type = "lowpass";
    lpf.frequency.value = 220;

    const noiseGain = c.createGain();
    noiseGain.gain.setValueAtTime(0.7, t0);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.25);

    noiseSrc.connect(lpf);
    lpf.connect(noiseGain);
    noiseGain.connect(c.destination);

    claimVoice();
    osc.start(t0);
    osc.stop(t0 + dur);
    noiseSrc.start(t0);
    trackVoice(osc, dur);
  }

  // march: two soft ticks (~0.12s apart), like boot-heel cadence
  function sfxMarch(c) {
    const t0 = c.currentTime;
    function tick(when) {
      const bufLen = Math.ceil(c.sampleRate * 0.04);
      const buf = c.createBuffer(1, bufLen, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
      const src = c.createBufferSource();
      src.buffer = buf;
      const bpf = c.createBiquadFilter();
      bpf.type = "bandpass";
      bpf.frequency.value = 300;
      bpf.Q.value = 2.0;
      const gain = c.createGain();
      gain.gain.setValueAtTime(0.35, when);
      gain.gain.linearRampToValueAtTime(0, when + 0.04);
      src.connect(bpf);
      bpf.connect(gain);
      gain.connect(c.destination);
      src.start(when);
      trackVoice(src, 0.04 + (when - t0));
    }
    claimVoice();
    tick(t0);
    tick(t0 + 0.14);
  }

  // charge: rising triad (C4-E4-G4) + noise swell, 0.7s
  function sfxCharge(c) {
    const t0 = c.currentTime;
    const dur = 0.7;
    const freqs = [261.63, 329.63, 392.00]; // C4, E4, G4

    freqs.forEach((freq, i) => {
      const osc = c.createOscillator();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(freq, t0 + i * 0.08);

      const g = c.createGain();
      g.gain.setValueAtTime(0, t0 + i * 0.08);
      g.gain.linearRampToValueAtTime(0.22, t0 + i * 0.08 + 0.05);
      g.gain.linearRampToValueAtTime(0, t0 + dur);

      osc.connect(g);
      g.connect(c.destination);
      osc.start(t0 + i * 0.08);
      osc.stop(t0 + dur);
    });

    // noise swell
    const bufLen = Math.ceil(c.sampleRate * dur);
    const buf = c.createBuffer(1, bufLen, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const noiseSrc = c.createBufferSource();
    noiseSrc.buffer = buf;
    const hpf = c.createBiquadFilter();
    hpf.type = "highpass";
    hpf.frequency.value = 800;
    const noiseGain = c.createGain();
    noiseGain.gain.setValueAtTime(0.0, t0);
    noiseGain.gain.linearRampToValueAtTime(0.25, t0 + dur * 0.7);
    noiseGain.gain.linearRampToValueAtTime(0, t0 + dur);
    noiseSrc.connect(hpf);
    hpf.connect(noiseGain);
    noiseGain.connect(c.destination);

    claimVoice();
    noiseSrc.start(t0);
    trackVoice(noiseSrc, dur);
  }

  // rout: falling tone, 0.6s
  function sfxRout(c) {
    const t0 = c.currentTime;
    const dur = 0.6;

    const osc = c.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(440, t0);
    osc.frequency.exponentialRampToValueAtTime(180, t0 + dur * 0.8);

    const gain = c.createGain();
    gain.gain.setValueAtTime(0.4, t0);
    gain.gain.setValueAtTime(0.4, t0 + 0.05);
    gain.gain.linearRampToValueAtTime(0, t0 + dur);

    osc.connect(gain);
    gain.connect(c.destination);

    claimVoice();
    osc.start(t0);
    osc.stop(t0 + dur);
    trackVoice(osc, dur);
  }

  // bugle: three-note call G4-C5-E5, square-ish, quiet
  function sfxBugle(c) {
    const t0 = c.currentTime;
    const notes = [
      { f: 392.00, when: 0.00, dur: 0.18 },   // G4
      { f: 523.25, when: 0.20, dur: 0.18 },   // C5
      { f: 659.25, when: 0.40, dur: 0.28 },   // E5 (held)
    ];

    notes.forEach(n => {
      const osc = c.createOscillator();
      osc.type = "square";
      osc.frequency.value = n.f;

      // slight "bugle bell" character — tame the harshness with a lowpass
      const lpf = c.createBiquadFilter();
      lpf.type = "lowpass";
      lpf.frequency.value = 2200;

      const gain = c.createGain();
      gain.gain.setValueAtTime(0.0, t0 + n.when);
      gain.gain.linearRampToValueAtTime(0.15, t0 + n.when + 0.02);
      gain.gain.setValueAtTime(0.15, t0 + n.when + n.dur - 0.03);
      gain.gain.linearRampToValueAtTime(0, t0 + n.when + n.dur);

      osc.connect(lpf);
      lpf.connect(gain);
      gain.connect(c.destination);
      osc.start(t0 + n.when);
      osc.stop(t0 + n.when + n.dur);
    });

    claimVoice();
    // track against longest note
    const dummySrc = c.createOscillator();
    dummySrc.frequency.value = 1;
    const dummyGain = c.createGain();
    dummyGain.gain.value = 0;
    dummySrc.connect(dummyGain);
    dummyGain.connect(c.destination);
    dummySrc.start(t0);
    dummySrc.stop(t0 + 0.70);
    trackVoice(dummySrc, 0.70);
  }

  // click: 10ms tick for UI feedback
  function sfxClick(c) {
    const dur = 0.010;
    const bufLen = Math.ceil(c.sampleRate * dur);
    const buf = c.createBuffer(1, bufLen, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);

    const src = c.createBufferSource();
    src.buffer = buf;

    const gain = c.createGain();
    gain.gain.setValueAtTime(0.25, c.currentTime);

    src.connect(gain);
    gain.connect(c.destination);

    claimVoice();
    src.start();
    trackVoice(src, dur);
  }

  // ---- public API ----

  function playSfx(name) {
    if (!G.settings.sound) return;
    try {
      const c = getCtx();
      if (!c) return;
      switch (name) {
        case "volley":  sfxVolley(c);  break;
        case "cannon":  sfxCannon(c);  break;
        case "march":   sfxMarch(c);   break;
        case "charge":  sfxCharge(c);  break;
        case "rout":    sfxRout(c);    break;
        case "bugle":   sfxBugle(c);   break;
        case "click":   sfxClick(c);   break;
        default: break;
      }
    } catch(e) {
      // audio errors must never crash the game
    }
  }

  // ambient: very quiet looping brown-noise bed (wind)
  // ~0.05 gain; built from a filled AudioBuffer played in a loop
  function ambientStart() {
    if (!G.settings.sound) return;
    try {
      const c = getCtx();
      if (!c) return;
      if (ambientNode) return; // already running

      // generate ~2s of brown noise
      const sampleRate = c.sampleRate;
      const bufLen = sampleRate * 2;
      const buf = c.createBuffer(1, bufLen, sampleRate);
      const data = buf.getChannelData(0);
      let last = 0;
      for (let i = 0; i < bufLen; i++) {
        const white = Math.random() * 2 - 1;
        last = (last + 0.02 * white) / 1.02;
        data[i] = last * 3.5; // scale to audible range
      }

      // normalize
      let peak = 0;
      for (let i = 0; i < bufLen; i++) if (Math.abs(data[i]) > peak) peak = Math.abs(data[i]);
      if (peak > 0) for (let i = 0; i < bufLen; i++) data[i] /= peak;

      const src = c.createBufferSource();
      src.buffer = buf;
      src.loop = true;

      const lpf = c.createBiquadFilter();
      lpf.type = "lowpass";
      lpf.frequency.value = 600; // muffled wind character

      ambientGain = c.createGain();
      ambientGain.gain.setValueAtTime(0, c.currentTime);
      ambientGain.gain.linearRampToValueAtTime(0.05, c.currentTime + 2.0); // fade in

      src.connect(lpf);
      lpf.connect(ambientGain);
      ambientGain.connect(c.destination);

      src.start();
      ambientNode = src;
    } catch(e) {
      // audio errors must never crash the game
    }
  }

  function ambientStop() {
    try {
      if (!ambientNode) return;
      if (ambientGain && ctx) {
        ambientGain.gain.setValueAtTime(ambientGain.gain.value, ctx.currentTime);
        ambientGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5); // fade out
        const nodeToStop = ambientNode;
        setTimeout(function() {
          try { nodeToStop.stop(); } catch(e) {}
        }, 1600);
      } else {
        try { ambientNode.stop(); } catch(e) {}
      }
      ambientNode = null;
      ambientGain = null;
    } catch(e) {
      // audio errors must never crash the game
    }
  }

  // expose globals (no redefinitions — these are declared ❌ by engine facts)
  window.playSfx = playSfx;
  window.ambientStart = ambientStart;
  window.ambientStop = ambientStop;

})();

/* ==== §11 — AI (CHUNK-03) ==== */
function runAI(cb) {
  const B = G.battle;
  let fired = false;

  function done_cb() {
    if (!fired) { fired = true; cb(); }
  }

  // Guard: if battle already over on entry (beginTurn found victory), fire cb once and return.
  if (!G.battle || B.over) { done_cb(); return; }

  // Collect living enemy units in priority order:
  //   artillery + naval first, then infantry + cavalry, then hq last.
  //   Routed units are included — they still need retreatHex processing.
  const D = DIFF[G.settings.diff];
  const A = D.aiAgg;    // aggression 0..1.25
  const S = D.skill;    // targeting skill 0..1

  const rawUnits = B.units.filter(u => u.alive && u.side === B.enemySide);

  // Sort into buckets
  const artNav  = rawUnits.filter(u => u.type === "art" || u.type === "nav" || u.type === "fort");
  const infCav  = rawUnits.filter(u => u.type === "inf" || u.type === "cav");
  const hqUnits = rawUnits.filter(u => u.type === "hq");
  const queue   = artNav.concat(infCav).concat(hqUnits);

  // Track which units we have processed so each is visited at most once.
  const processed = new Set();

  let idx = 0;

  function step() {
    // Re-check battle reference and over flag on every tick.
    if (G.battle !== B || B.over) { done_cb(); return; }

    if (idx >= queue.length) {
      // All units processed — schedule final callback with a small delay
      // so the last draw has a chance to settle.
      setTimeout(() => { done_cb(); }, 200);
      return;
    }

    const u = queue[idx];
    idx++;

    // Skip if already processed (shouldn't happen given queue build, but safety).
    if (processed.has(u.id)) { setTimeout(step, 0); return; }
    processed.add(u.id);

    // Skip dead units that may have been killed mid-phase by a return volley.
    if (!u.alive) { setTimeout(step, (typeof aiDelay==="function"?aiDelay():150)); return; }
    if (typeof followAction==="function") followAction(u);

    // ---- Routed units: retreat toward home edge, then continue. ----
    if (u.routed) {
      retreatHex(u);
      u.done = true;
      if (typeof refreshUI === "function") refreshUI();
      if (typeof draw === "function") draw();
      setTimeout(step, (typeof aiDelay==="function"?aiDelay():150));
      return;
    }

    // ---- HQ units: move toward friendly combat-unit centroid, avoid adjacency to enemy. ----
    if (u.type === "hq") {
      processHQ(u);
      if (typeof refreshUI === "function") refreshUI();
      if (typeof draw === "function") draw();
      setTimeout(step, (typeof aiDelay==="function"?aiDelay():150));
      return;
    }

    // ---- Combat units (art, nav, fort, inf, cav). ----
    processCombatUnit(u);
    if (typeof refreshUI === "function") refreshUI();
    if (typeof draw === "function") draw();
    setTimeout(step, (typeof aiDelay==="function"?aiDelay():150));
  }

  // -----------------------------------------------------------------------
  // HQ movement logic
  // -----------------------------------------------------------------------
  function processHQ(u) {
    if (u.done) return;

    // Compute centroid of friendly combat units.
    const friends = B.units.filter(f => f.alive && f.side === B.enemySide && f.type !== "hq");
    let goal = null;
    if (friends.length) {
      const sc = friends.reduce((acc, f) => { acc.c += f.c; acc.r += f.r; return acc; }, {c: 0, r: 0});
      goal = [Math.round(sc.c / friends.length), Math.round(sc.r / friends.length)];
    }

    if (!goal) { u.done = true; return; }

    // Build reachable set, pick hex closest to centroid that is not adjacent to any enemy.
    G.reach = reachable(u);
    if (G.reach.size === 0) { G.reach = null; u.done = true; return; }

    // HQ is enemy-side; player units are enemies of the HQ.
    const playerSide = B.playerSide;

    let bestKey = null;
    let bestDist = Infinity;

    for (const [key] of G.reach) {
      const [hc, hr] = key.split(",").map(Number);
      // Avoid hexes adjacent to player units if possible.
      const adjPlayer = neighbors(hc, hr).some(n => {
        const o = unitAt(n[0], n[1]);
        return o && o.side === playerSide && o.type !== "hq";
      });
      const d = hexDist([hc, hr], goal);
      // Prefer non-adjacent hex; use a penalty of +1000 for adjacent enemy hexes.
      const score = d + (adjPlayer ? 1000 : 0);
      if (score < bestDist) { bestDist = score; bestKey = key; }
    }

    if (bestKey) {
      const [tc, tr] = bestKey.split(",").map(Number);
      doMove(u, tc, tr);
    }

    G.reach = null;
    u.done = true;
  }

  // -----------------------------------------------------------------------
  // Combat unit AI
  // -----------------------------------------------------------------------
  function processCombatUnit(u) {
    if (u.done) return;

    // ---- 1. Attempt fire if targets available. ----
    const fTargets = fireTargets(u);
    if (fTargets.size > 0) {
      const tgt = chooseBestFireTarget(u, fTargets, S);
      if (tgt) {
        resolveFire(u, tgt[0], tgt[1]);
        // resolveFire sets u.fired=true, u.done=true internally.
        // B.over may now be true — next tick's guard will catch it.
        return;
      }
    }

    // ---- 2. Attempt charge if targets available and ratio favorable. ----
    const cTargets = chargeTargets(u);
    if (cTargets.size > 0 && !u.fired) {
      const bestCharge = chooseBestChargeTarget(u, cTargets, A);
      if (bestCharge) {
        resolveCharge(u, bestCharge[0], bestCharge[1]);
        // resolveCharge sets u.done=true, u.fired=true, u.moved=true internally.
        return;
      }
    }

    // ---- 3. Defensive posture check (defender holding good ground). ----
    if (shouldHoldGround(u, A)) {
      // Entrench with 50% chance.
      if (chance(0.5) && u.ent < 3) {
        u.ent = Math.min(3, u.ent + 1);
      }
      u.done = true;
      return;
    }

    // ---- 4. Advance: move toward goal, then fire if possible after move. ----
    advanceUnit(u, S);
  }

  // -----------------------------------------------------------------------
  // Fire target selection
  // -----------------------------------------------------------------------
  function chooseBestFireTarget(u, targets, skill) {
    // Build candidate list.
    const candidates = [];
    for (const key of targets) {
      const [tc, tr] = key.split(",").map(Number);
      const tgt = unitAt(tc, tr);
      if (!tgt) continue;
      const tt = tileAt(tc, tr);
      const tDef = tt ? TERRAIN[tt.t].def : 1.0;
      const score = tgt.strength * tDef; // lower = better target
      candidates.push({ tc, tr, score });
    }
    if (!candidates.length) return null;

    // Sort ascending (weakest/least defended first = best target).
    candidates.sort((a, b) => a.score - b.score);

    // With probability=skill, pick the best; otherwise pick randomly.
    if (chance(skill)) {
      return [candidates[0].tc, candidates[0].tr];
    } else {
      const c = pick(candidates);
      return [c.tc, c.tr];
    }
  }

  // -----------------------------------------------------------------------
  // Charge target selection and ratio check
  // -----------------------------------------------------------------------
  function chooseBestChargeTarget(u, targets, agg) {
    const threshold = 1.25 - 0.35 * agg;

    for (const key of targets) {
      const [tc, tr] = key.split(",").map(Number);
      const tgt = unitAt(tc, tr);
      if (!tgt) continue;
      const tt = tileAt(tc, tr);
      const tDef = tt ? TERRAIN[tt.t].def : 1.0;

      const atkPower = u.strength * ARM[u.type].melee * (u.morale / u.maxMor);
      const defPower = tgt.strength * ARM[tgt.type].melee * tDef * (1 + tgt.ent * 0.3);

      const ratio = atkPower / Math.max(1, defPower);
      if (ratio > threshold) {
        return [tc, tr];
      }
    }
    return null;
  }

  // -----------------------------------------------------------------------
  // Defensive hold check
  // -----------------------------------------------------------------------
  function shouldHoldGround(u, agg) {
    // Defenders on objective or fort hexes with no enemies within 2 hexes hold ground.
    const isDefender = B.atkSide !== B.enemySide;
    if (!isDefender) return false;

    const tile = tileAt(u.c, u.r);
    if (!tile) return false;
    const onGoodGround = tile.t === "fort" || tile.t === "ridge" || tile.t === "hills" ||
                         (tile.obj !== null && tile.obj !== undefined);
    if (!onGoodGround) return false;

    // Check if any player unit is within 2 hexes.
    const nearEnemy = B.units.some(e => {
      return e.alive && e.side === B.playerSide && hexDist([u.c, u.r], [e.c, e.r]) <= 2;
    });
    if (nearEnemy) return false;

    return true;
  }

  // -----------------------------------------------------------------------
  // Advance movement
  // -----------------------------------------------------------------------
  function advanceUnit(u, skill) {
    G.reach = reachable(u);

    if (G.reach.size === 0) {
      // Blocked — no reachable hexes. Just mark done and leave.
      G.reach = null;
      u.done = true;
      return;
    }

    const goalHex = computeMoveGoal(u);

    // Find best reachable hex: minimize hexDist to goal, tie-break by terrain def (higher = better).
    let bestKey = null;
    let bestDist = Infinity;
    let bestDef = -1;

    for (const [key] of G.reach) {
      const [hc, hr] = key.split(",").map(Number);
      const d = goalHex ? hexDist([hc, hr], goalHex) : 0;
      const tt = tileAt(hc, hr);
      const tDef = tt ? TERRAIN[tt.t].def : 1.0;
      if (d < bestDist || (d === bestDist && tDef > bestDef)) {
        bestDist = d;
        bestDef = tDef;
        bestKey = key;
      }
    }

    if (bestKey) {
      const [tc, tr] = bestKey.split(",").map(Number);
      doMove(u, tc, tr);
    }

    G.reach = null;

    // After moving, attempt fire if not yet fired.
    if (!u.fired && !u.done) {
      const fTargets = fireTargets(u);
      if (fTargets.size > 0) {
        const tgt = chooseBestFireTarget(u, fTargets, skill);
        if (tgt) {
          resolveFire(u, tgt[0], tgt[1]);
          // resolveFire sets u.done=true internally; B.over may now be true.
          return;
        }
      }
    }

    u.done = true;
  }

  // -----------------------------------------------------------------------
  // Goal hex computation for movement
  // -----------------------------------------------------------------------
  function computeMoveGoal(u) {
    // Attacker mindset: go for unowned objectives.
    if (B.atkSide === B.enemySide) {
      // Find nearest objective not owned by enemy side.
      let bestObj = null;
      let bestObjDist = Infinity;
      for (const obj of B.M.objs) {
        if (obj.owner === B.enemySide) continue; // already own it
        const d = hexDist([u.c, u.r], [obj.c, obj.r]);
        if (d < bestObjDist) { bestObjDist = d; bestObj = obj; }
      }
      if (bestObj) return [bestObj.c, bestObj.r];
    }

    // Defender mindset or no unowned objectives: move toward nearest player unit.
    // AI ignores fog — it can see all player units.
    let nearestPlayer = null;
    let nearestDist = Infinity;
    for (const pu of B.units) {
      if (!pu.alive || pu.side !== B.playerSide) continue;
      const d = hexDist([u.c, u.r], [pu.c, pu.r]);
      if (d < nearestDist) { nearestDist = d; nearestPlayer = pu; }
    }
    if (nearestPlayer) return [nearestPlayer.c, nearestPlayer.r];

    return null; // hold
  }

  // -----------------------------------------------------------------------
  // Kick off the chain.
  // -----------------------------------------------------------------------
  if (queue.length === 0) {
    // No enemy units at all — fire callback after minimal delay.
    setTimeout(() => { done_cb(); }, 200);
    return;
  }

  setTimeout(step, (typeof aiDelay==="function"?aiDelay():150));
}

// ---- openSheet(html) / closeSheet() — shared overlay helpers ----
function openSheet(html) {
  const pad = document.getElementById("sheetPad");
  const overlay = document.getElementById("overlay");
  if (!pad || !overlay) return;
  pad.innerHTML = html;
  overlay.classList.remove("hidden");
}

function closeSheet() {
  const overlay = document.getElementById("overlay");
  if (!overlay) return;
  overlay.classList.add("hidden");
  const pad = document.getElementById("sheetPad");
  if (pad) pad.innerHTML = "";
}

// ---- endBattle(side, type) ----
// side: "US"|"CS"|null (null = draw from resolveByScore)
// type: "decisive"|"win"|"objwin"|"objloss"|"draw"
function endBattle(side, type) {
  const B = G.battle;

  // Iron rule: set over immediately, no matter what.
  B.over = true;
  G.mode = "result";
  clearSelection();
  hideHud();

  const playerSide = B.playerSide;
  const enemySide  = B.enemySide;

  // Determine outcome from the player's perspective.
  // When side===null it is always a draw.
  const win  = (side !== null) && (side === playerSide);
  const draw = (side === null) || (type === "draw");

  // Sound: silence the battle bed/din/wind, then win → bugle, loss → rout, draw → nothing.
  if (typeof _audLeaveBattle === "function") _audLeaveBattle();
  if (!draw) {
    playSfx(win ? "bugle" : "rout");
    if (typeof bugleCall === "function") bugleCall(win ? "to_the_colors" : "taps");
  }

  // ---- Verdict label ----
  const VERDICT_WIN = {
    decisive: "Decisive Victory",
    win:      "Victory",
    objwin:   "Objectives Carried",
    objloss:  null, // can't happen when win===true
    draw:     "Drawn Battle",
  };
  const VERDICT_LOSE = {
    decisive: "Decisive Defeat",
    win:      "Defeat",
    objwin:   null, // can't happen when win===false
    objloss:  "Objectives Lost",
    draw:     "Drawn Battle",
  };

  let verdictText;
  if (draw) {
    verdictText = "Drawn Battle";
  } else if (win) {
    verdictText = VERDICT_WIN[type] || "Victory";
  } else {
    verdictText = VERDICT_LOSE[type] || "Defeat";
  }

  const verdictClass = draw ? "draw" : (win ? "win" : "lose");

  // ---- Casualty columns ----
  // Player side shown first labeled "Your Losses"; enemy second labeled "Enemy Losses".
  const playerCas  = B.casualties[playerSide] || 0;
  const enemyCas   = B.casualties[enemySide]  || 0;
  const playerInfl = B.infl[playerSide] || 0;
  const enemyInfl  = B.infl[enemySide]  || 0;

  // ---- Benchbox comparative line ----
  // Casualty percentages of starting strength (not current — starting).
  const playerStart = startStrength(playerSide);
  const enemyStart  = startStrength(enemySide);

  const playerPct = playerStart > 0 ? Math.round(playerCas / playerStart * 100) : 0;
  const enemyPct  = enemyStart  > 0 ? Math.round(enemyCas  / enemyStart  * 100) : 0;

  let exchangeLine;
  if (draw) {
    exchangeLine = `Field: inflicted ${enemyCas} (${enemyPct}%), suffered ${playerCas} (${playerPct}%) — an even exchange on a bloody day.`;
  } else {
    const better = playerPct <= enemyPct;
    exchangeLine = `Your field: inflicted ${enemyCas} (${enemyPct}%), suffered ${playerCas} (${playerPct}%) — ` +
      (better ? "a better exchange than the day deserved." : "a worse exchange than the day deserved.");
  }

  const resQuote = B.bd.res || "";

  // ---- Button logic ----
  // Iron rule: if campaign + iron + player lost → Continue only; no replay.
  const ironLoss = !!(G.campaign && G.campaign.iron && !win && !draw);
  const isCampaign = !!B.fromCampaign;

  let buttonsHtml;
  if (isCampaign) {
    // Campaign path: single Continue Campaign button.
    buttonsHtml = `
      <div class="btn-row">
        <button id="rbContinue" class="bigbtn">Continue Campaign</button>
      </div>`;
  } else if (ironLoss) {
    // Iron mode loss in a free battle context: Continue only (belt-and-suspenders guard).
    buttonsHtml = `
      <div class="btn-row">
        <button id="rbContinue" class="bigbtn">Continue Campaign</button>
      </div>`;
  } else {
    // Free battle: Replay + Main Menu.
    buttonsHtml = `
      <div class="btn-row">
        <button id="rbReplay" class="bigbtn">Replay Battle</button>
        <button id="rbMenu" class="ghostbtn">Main Menu</button>
      </div>`;
  }

  // ---- Build sheet HTML ----
  const html = `
    <h1 class="title-xl" style="text-align:center">${B.bd.name}</h1>
    <p class="title-sub" style="text-align:center">${B.bd.year} &mdash; ${B.bd.th === "E" ? "Eastern" : B.bd.th === "W" ? "Western" : B.bd.th === "TM" ? "Trans-Mississippi" : "Naval"} Theater</p>
    <div class="verdict ${verdictClass}">${verdictText}</div>
    <hr class="rule">
    <div class="castable">
      <div class="c">
        <div class="big">${playerCas.toLocaleString()}</div>
        <div class="lb">Your Losses</div>
      </div>
      <div class="c">
        <div class="big">${enemyCas.toLocaleString()}</div>
        <div class="lb">Enemy Losses</div>
      </div>
      <div class="c">
        <div class="big">${playerInfl.toLocaleString()}</div>
        <div class="lb">Inflicted</div>
      </div>
    </div>
    <div class="benchbox">
      <p class="lede" style="font-style:italic;margin:0 0 8px">&ldquo;${resQuote}&rdquo;</p>
      <span class="hi">${exchangeLine}</span>
    </div>
    ${buttonsHtml}
    <p class="hint">
      ${playerSide === "US" ? "Union" : "Confederate"} forces &mdash;
      Turn ${B.turn} of ${B.maxTurns}
    </p>
  `;

  openSheet(html);

  // ---- Wire button handlers (addEventListener on dynamically-created elements) ----
  const btnContinue = document.getElementById("rbContinue");
  const btnReplay   = document.getElementById("rbReplay");
  const btnMenu     = document.getElementById("rbMenu");

  if (btnContinue) {
    btnContinue.addEventListener("click", function () {
      if (typeof campaignAdvance === "function") {
        campaignAdvance(side, type);
      } else {
        toast("Campaign system not yet loaded.");
        if (typeof openMainMenu === "function") {
          openMainMenu();
        } else {
          closeSheet();
        }
      }
    });
  }

  if (btnReplay) {
    btnReplay.addEventListener("click", function () {
      const bd        = B.bd;
      const pSide     = B.playerSide;
      closeSheet();
      showHud();
      startBattleRuntime(bd, pSide, false);
    });
  }

  if (btnMenu) {
    btnMenu.addEventListener("click", function () {
      if (typeof openMainMenu === "function") {
        openMainMenu();
      } else {
        closeSheet();
      }
    });
  }
}

// ---- defaultFor(type, year, side) — local helper ----
// Returns the historically appropriate starter weapon key for a roster entry.
function defaultFor(type, year, side) {
  if (type === "inf") return infWeapon(year, side);
  if (type === "art") return artWeapon(year);
  if (type === "cav") return cavWeapon(year, side);
  return null;
}

// ---- startCampaign(side, iron) ----
// Initialises G.campaign and builds the starting 12-unit roster, then launches battle 0.
function startCampaign(side, iron) {
  // Determine the year of the first chain battle for weapon selection.
  const firstId = CHAINS[side][0];
  const firstBd = BATTLES.find(function(b){ return b.id === firstId; });
  const firstYear = firstBd ? firstBd.year : 1861;

  G.campaign = {
    side:      side,
    iron:      !!iron,
    idx:       0,
    funds:     300,
    recovery:  false,
    completed: [],
    roster:    [],
    nextId:    1,
    // Stats tracked for war-won summary.
    stats: { battles: 0, won: 0, infl: 0, suff: 0 },
    // Recovery-loop counter — resets on any win.
    recoveryLossCount: 0,
    // Flags consumed by launchCampaignBattle to flip attacker role on recovery.
    recoveryMode: false,
    flipAtk:    false,
    // Captured enemy arms (loot instances from capture-on-rout). Rides in saves.
    captured:   [],
  };

  const C = G.campaign;

  // Build 8 infantry + 2 artillery + 2 cavalry starter roster entries.
  const types = [
    "inf","inf","inf","inf","inf","inf","inf","inf",
    "art","art",
    "cav","cav",
  ];
  for (let i = 0; i < types.length; i++) {
    const t = types[i];
    C.roster.push({
      id:     "R" + C.nextId++,
      type:   t,
      weapon: defaultFor(t, firstYear, side),
      xp:     0,
      name:   null,
    });
  }

  if (typeof _t1InitAll === "function") _t1InitAll(C);

  launchCampaignBattle();
}

// ---- launchCampaignBattle() ----
// Launches the battle at the current campaign index (recovery-aware).
function launchCampaignBattle() {
  const C = G.campaign;
  if (!C) return;

  const side = C.side;
  const chainId = CHAINS[side][C.idx];
  let bd = BATTLES.find(function(b){ return b.id === chainId; });
  if (!bd) return;

  // If a recovery flip is pending, pass a SHALLOW CLONE with atk reversed.
  // NEVER mutate the BATTLES entry.
  if (C.flipAtk) {
    const flippedAtk = bd.atk === "US" ? "CS" : "US";
    bd = Object.assign({}, bd, { atk: flippedAtk });
    C.flipAtk = false;
  }

  if (typeof closeSheet === "function") {
    closeSheet();
  } else {
    // Inline fallback: hide overlay if closeSheet not yet available.
    const ov = document.getElementById("overlay");
    if (ov) ov.classList.add("hidden");
    const pad = document.getElementById("sheetPad");
    if (pad) pad.innerHTML = "";
  }

  if (typeof showHud === "function") showHud();

  startBattleRuntime(bd, side, true);
}

// ---- campaignAdvance(winnerSide, type) ----
// Called by CHUNK-04's endBattle button; reconciles the roster, awards funds,
// decides advance/recovery, then either opens upgrade or relaunches.
function campaignAdvance(winnerSide, type) {
  const C = G.campaign;
  if (!C) return;

  const B = G.battle;
  const playerSide = B ? B.playerSide : C.side;
  const win = (winnerSide !== null) && (winnerSide === playerSide);

  // ---- Update war stats ----
  C.stats.battles++;
  if (win) C.stats.won++;
  if (B) {
    C.stats.infl += (B.infl[playerSide] || 0);
    C.stats.suff += (B.casualties[playerSide] || 0);
  }

  // ---- Roster reconciliation ----
  // Build a map of surviving player non-hq units keyed by vetId.
  const survivingByVetId = {};
  const survivingNewUnits = [];   // player-side, alive, no vetId, non-hq

  if (B) {
    for (let i = 0; i < B.units.length; i++) {
      const u = B.units[i];
      if (u.side !== playerSide || !u.alive || u.type === "hq") continue;
      if (u.vetId) {
        survivingByVetId[u.vetId] = u;
      } else {
        survivingNewUnits.push(u);
      }
    }
  }

  // Remove dead roster entries (those whose vetId is NOT in survivingByVetId).
  // Update survivors: xp bump + weapon/name carry.
  const newRoster = [];
  for (let i = 0; i < C.roster.length; i++) {
    const entry = C.roster[i];
    const u = survivingByVetId[entry.id];
    if (!u) {
      // Unit with this vetId did not survive — remove from roster.
      continue;
    }
    // Survivor: update xp (capped 5), carry weapon and name.
    const xpGain = 1 + (u.kills >= 2 ? 1 : 0);
    newRoster.push({
      id:     entry.id,
      type:   entry.type,
      weapon: u.weapon || entry.weapon,
      xp:     Math.min(5, entry.xp + xpGain),
      name:   u.name || entry.name,
    });
  }

  // Append surviving player non-hq units that had NO vetId (auto-generated fill).
  for (let i = 0; i < survivingNewUnits.length; i++) {
    const u = survivingNewUnits[i];
    // hq guard (belt-and-suspenders — already filtered above)
    if (u.type === "hq") continue;
    newRoster.push({
      id:     "R" + C.nextId++,
      type:   u.type,
      weapon: u.weapon || defaultFor(u.type, B.bd.year, playerSide),
      xp:     Math.min(5, (u.xp || 0) + 1 + (u.kills >= 2 ? 1 : 0)),
      name:   u.name || null,
    });
  }

  C.roster = newRoster;

  // §24 War Department (v1.5) — political/economy/ledger systems tick on each resolved battle.
  if (typeof _t1Resolve === "function") { try { _t1Resolve(winnerSide, type, B, C, win); } catch (e) {} }

  // ---- Funds award ----
  // Base: decisive 500, win/objwin 350, draw 200, loss/objloss 120
  let base;
  if (type === "decisive") {
    base = win ? 500 : 120;
  } else if (type === "win" || type === "objwin") {
    base = win ? 350 : 120;
  } else if (type === "draw") {
    base = 200;
  } else {
    // objloss or anything else treated as loss
    base = 120;
  }

  const inflBonus = B ? Math.round((B.infl[playerSide] || 0) / 40) : 0;
  C.funds += base + inflBonus;

  // ---- Win / loss branching ----
  const chainLen = CHAINS[C.side].length;

  if (win) {
    // Normal advance.
    const currentId = CHAINS[C.side][C.idx];
    const bd = BATTLES.find(function(b){ return b.id === currentId; });
    if (bd) C.completed.push(bd.id);

    C.recovery        = false;
    C.recoveryMode    = false;
    C.flipAtk         = false;
    C.recoveryLossCount = 0;
    C.idx++;

    // Save checkpoint (CHUNK-07 defines saveLocal; guard with typeof).
    if (typeof saveLocal === "function") saveLocal();

    // End of chain → war won!
    if (C.idx >= chainLen) {
      warWonScreen();
      return;
    }

    // Proceed to upgrade then next battle.
    if (typeof openUpgrade === "function") {
      openUpgrade();
    } else {
      launchCampaignBattle();
    }

  } else {
    // Loss path: enter or continue recovery.
    C.recovery     = true;
    C.recoveryMode = true;
    C.recoveryLossCount++;

    // Determine if player was the attacker in this battle.
    // If so, the recovery attempt flips roles (player defends).
    // We only flip if the original battle has the player as attacker.
    const currentId = CHAINS[C.side][C.idx];
    const currentBd = BATTLES.find(function(b){ return b.id === currentId; });
    if (currentBd && currentBd.atk === C.side) {
      // Player was attacker; flip so player defends in recovery.
      C.flipAtk = true;
    } else {
      C.flipAtk = false;
    }

    // Third+ consecutive recovery loss → relief funds + notification.
    if (C.recoveryLossCount >= 3) {
      const relief = 150;
      C.funds += relief;
      const msg = "Supply relief: +" + relief + " funds (prolonged hardship).";
      if (typeof toast === "function") {
        toast(msg, 3000);
      } else if (typeof logMsg === "function") {
        logMsg(msg, "sys");
      }
    }

    // Save checkpoint.
    if (typeof saveLocal === "function") saveLocal();

    // Proceed to upgrade (player may recruit/upgrade before retrying).
    if (typeof openUpgrade === "function") {
      openUpgrade();
    } else {
      launchCampaignBattle();
    }
  }
}

/* ==== §14 — UPGRADE (CHUNK-06) ==== */

// ---- nextWeaponsFor(type, year) ----
// Returns all weapons for the given arm type that are era-legal (era <= year),
// sorted by pow ascending. Used by openUpgrade's per-row upgrade button logic
// and exposed for CHUNK-10 reuse.
function nextWeaponsFor(type, year) {
  const results = [];
  for (const key in WEAPONS) {
    const w = WEAPONS[key];
    if (w.arm === type && w.era <= year) {
      results.push({ key, w });
    }
  }
  results.sort(function(a, b) { return a.w.pow - b.w.pow; });
  return results;
}

// ---- openUpgrade() ----
// Quartermaster screen shown between campaign battles.
// Sets G.mode="upgrade", hides the HUD, and opens the upgrade sheet.
function openUpgrade() {
  G.mode = "upgrade";
  hideHud();

  const C = G.campaign;
  if (!C) {
    toast("No active campaign.");
    return;
  }

  // Determine the upcoming battle — recovery-aware:
  // recovery does NOT advance idx; we look up the same battle.
  const chainId = CHAINS[C.side][C.idx];
  const bd = BATTLES.find(function(b) { return b.id === chainId; });
  if (!bd) {
    // End of chain — should not normally reach here; fall through to battle.
    launchCampaignBattle();
    return;
  }

  _renderUpgradeSheet(C, bd);
}

// ---- _renderUpgradeSheet(C, bd) — internal; rebuilds the sheet HTML and wires handlers. ----
function _renderUpgradeSheet(C, bd) {
  // Store scroll position before re-render (preserved on re-renders after purchases).
  const pad = document.getElementById("sheetPad");
  const savedScroll = pad ? pad.scrollTop : 0;

  // ---- Build the roster table rows ----
  let rowsHtml = "";
  for (let i = 0; i < C.roster.length; i++) {
    const entry = C.roster[i];
    const armName = (ARM[entry.type] && ARM[entry.type].name) ? ARM[entry.type].name : entry.type;

    // Name: use stored name if available, otherwise "<ord> <ArmName>"
    const displayName = entry.name || (ord(i + 1) + " " + armName);

    // Current weapon display
    const curWeapName = (entry.weapon && WEAPONS[entry.weapon])
      ? WEAPONS[entry.weapon].name
      : (entry.weapon || "—");

    // XP pips: 5 spans, .off for unearned
    let xpHtml = "";
    const xv = entry.xp || 0;
    for (let p = 0; p < 5; p++) {
      xpHtml += '<span class="xp' + (p < xv ? "" : " off") + '"></span>';
    }

    // Upgrade cell: find the single next tier weapon (next higher pow, era-legal)
    const curPow = (entry.weapon && WEAPONS[entry.weapon]) ? WEAPONS[entry.weapon].pow : 0;
    const candidates = nextWeaponsFor(entry.type, bd.year).filter(function(x) {
      return x.w.pow > curPow;
    });
    // candidates is already sorted by pow ascending; take the first (lowest next tier)
    let upgHtml;
    if (candidates.length === 0) {
      // No upgrade available — show nothing in upgrade cell
      upgHtml = '<span style="font-size:11px;color:var(--rule)">Best available</span>';
    } else {
      const next = candidates[0];
      const canAfford = C.funds >= next.w.cost;
      const disabledAttr = canAfford ? "" : " disabled";
      upgHtml = '<button class="upg" id="ugUp_' + entry.id + '"' + disabledAttr + '>'
        + "$" + next.w.cost + " → " + next.w.name
        + "</button>";
    }

    const ratingBadge = (typeof renderRatingsCard === "function")
      ? " " + renderRatingsCard(entry, { compact: true }) : "";

    rowsHtml +=
      "<tr>" +
      "<td>" + displayName + ratingBadge + "</td>" +
      "<td>" + armName + "</td>" +
      "<td>" + xpHtml + "</td>" +
      "<td>" + curWeapName + "</td>" +
      "<td>" + upgHtml + "</td>" +
      "</tr>";
  }

  // ---- Recruit buttons ----
  const rosterFull = C.roster.length >= 16;
  const recDisabled = rosterFull ? " disabled" : "";
  const recruitHtml =
    '<button class="upg" id="ugRecInf"' + recDisabled + ">+Infantry $200</button> " +
    '<button class="upg" id="ugRecCav"' + recDisabled + ">+Cavalry $260</button> " +
    '<button class="upg" id="ugRecArt"' + recDisabled + ">+Battery $300</button>";

  // ---- Captured arms (C10 capture-on-rout): the trophies of broken regiments ----
  let capturedHtml = "";
  const captured = (C.captured && C.captured.length) ? C.captured : null;
  if (captured && typeof renderWeaponCard === "function") {
    let chips = "";
    for (let ci = 0; ci < captured.length; ci++) {
      chips += renderWeaponCard(captured[ci], { compact: true }) + " ";
    }
    capturedHtml =
      '<hr class="rule">' +
      '<p style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:0 0 6px">' +
        'Captured Arms &mdash; ' + captured.length + ' stand' + (captured.length === 1 ? "" : "s") + '</p>' +
      '<div style="margin-bottom:14px">' + chips + '</div>';
  }

  // ---- Full sheet HTML ----
  const html =
    '<h1 class="title-xl">Winter Quarters</h1>' +
    '<p class="title-sub">Quartermaster &amp; Muster &mdash; before ' + bd.name + ", " + bd.year + "</p>" +
    '<hr class="rule">' +
    '<div class="fundbar">' +
      '<span style="font-size:13px;color:var(--rule)">Treasury</span>' +
      '<span class="coin" id="ugFunds">$' + C.funds + "</span>" +
    "</div>" +
    '<table class="regtable">' +
      "<thead><tr>" +
        "<th>Regiment</th>" +
        "<th>Arm</th>" +
        "<th>XP</th>" +
        "<th>Weapon</th>" +
        "<th>Upgrade</th>" +
      "</tr></thead>" +
      "<tbody id=\"ugRosterBody\">" + rowsHtml + "</tbody>" +
    "</table>" +
    '<hr class="rule">' +
    '<div style="margin-bottom:14px">' +
      '<p class="lede" style="margin:0 0 8px">Muster new regiments:</p>' +
      '<div id="ugRecruitRow">' + recruitHtml + "</div>" +
    "</div>" +
    capturedHtml +
    '<div class="btn-row">' +
      '<button class="bigbtn" id="ugTake">Take the Field</button>' +
      '<button class="ghostbtn" id="ugSave">Save &amp; Menu</button>' +
    "</div>" +
    '<p class="hint">Funds cannot go below $0. Roster capped at 16 regiments.</p>';

  openSheet(html);

  // Restore scroll position
  if (pad) {
    pad.scrollTop = savedScroll;
  }

  // ---- Wire upgrade buttons ----
  for (let i = 0; i < C.roster.length; i++) {
    const entry = C.roster[i];
    const curPow = (entry.weapon && WEAPONS[entry.weapon]) ? WEAPONS[entry.weapon].pow : 0;
    const candidates = nextWeaponsFor(entry.type, bd.year).filter(function(x) {
      return x.w.pow > curPow;
    });
    if (candidates.length === 0) continue;
    const next = candidates[0];

    (function(entryRef, nextWeapon) {
      const btn = document.getElementById("ugUp_" + entryRef.id);
      if (!btn) return;
      btn.addEventListener("click", function() {
        if (C.funds < nextWeapon.w.cost) {
          toast("Insufficient funds.");
          return;
        }
        C.funds -= nextWeapon.w.cost;
        // Funds floor: already checked above; cost > 0 by design for upgrades
        if (C.funds < 0) C.funds = 0;
        entryRef.weapon = nextWeapon.key;
        if (typeof saveLocal === "function") saveLocal();
        _renderUpgradeSheet(C, bd);
      });
    })(entry, next);
  }

  // ---- Wire recruit buttons ----
  function wireRecruit(btnId, type, cost) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    btn.addEventListener("click", function() {
      if (C.roster.length >= 16) {
        toast("Roster is full — 16 regiments maximum.");
        return;
      }
      if (C.funds < cost) {
        toast("Insufficient funds to recruit.");
        return;
      }
      C.funds -= cost;
      if (C.funds < 0) C.funds = 0;
      const newEntry = {
        id:     "R" + C.nextId++,
        type:   type,
        weapon: defaultFor(type, bd.year, C.side),
        xp:     0,
        name:   null,
      };
      C.roster.push(newEntry);
      if (typeof saveLocal === "function") saveLocal();
      _renderUpgradeSheet(C, bd);
    });
  }

  wireRecruit("ugRecInf", "inf", 200);
  wireRecruit("ugRecCav", "cav", 260);
  wireRecruit("ugRecArt", "art", 300);

  // ---- Take the Field ----
  const btnTake = document.getElementById("ugTake");
  if (btnTake) {
    btnTake.addEventListener("click", function() {
      closeSheet();
      launchCampaignBattle();
    });
  }

  // ---- Save & Menu ----
  const btnSaveMenu = document.getElementById("ugSave");
  if (btnSaveMenu) {
    btnSaveMenu.addEventListener("click", function() {
      if (typeof saveLocal === "function") saveLocal();
      if (typeof openMainMenu === "function") {
        openMainMenu();
      } else {
        toast("Menu arrives in the next build.");
      }
    });
  }
}

/* ==== §15 — SAVE/LOAD (CHUNK-07) ==== */

// ---- Key and shape constants ----
var _SAVE_KEY = "gor_save";
var _SAVE_VER = 1;

// ---- serializeSave() ----
// Returns a plain object safe to JSON.stringify.
// G.campaign may be null (free-battle mode) — that is valid.
// G.battle is NEVER included (cyclic, volatile, large).
function serializeSave() {
  return {
    ver:      _SAVE_VER,
    when:     Date.now(),
    settings: G.settings,
    campaign: G.campaign
  };
}

// ---- saveLocal() ----
// Writes the save to localStorage["gor_save"].
// Silent on failure — file:// in Safari can permanently block localStorage;
// a silent failure is far less disruptive than repeated toast spam during
// a session where storage is unavailable.
// On SUCCESS: shows a brief, subtle toast ("Progress saved.").
// CHOICE: toast on success, silent on failure.
function saveLocal() {
  try {
    var json = JSON.stringify(serializeSave());
    localStorage.setItem(_SAVE_KEY, json);
    toast("Progress saved.", 1400);
  } catch (e) {
    // Swallow — storage may be blocked on file:// or in private browsing.
  }
}

// ---- loadLocal() ----
// Returns the parsed save object if it passes validation, or null.
// Corrupt JSON, missing key, wrong version, and missing settings all
// return null without throwing — every failure path is explicit.
function loadLocal() {
  try {
    var raw = localStorage.getItem(_SAVE_KEY);
    if (raw === null || raw === undefined) return null;
    var sv;
    try {
      sv = JSON.parse(raw);
    } catch (parseErr) {
      return null;
    }
    // Version gate (strict equality — future versions must bump ver)
    if (!sv || sv.ver !== _SAVE_VER) return null;
    // Shape gate — settings must be an object (not null, not array)
    if (!sv.settings || typeof sv.settings !== "object" || Array.isArray(sv.settings)) return null;
    return sv;
  } catch (e) {
    // localStorage.getItem itself can throw on file:// in Safari
    return null;
  }
}

// ---- applySave(sv) ----
// Merges sv.settings onto the live G.settings so any keys added in later
// engine versions keep their defaults rather than being wiped.
// G.campaign is replaced wholesale (null is valid — means no active campaign).
function applySave(sv) {
  Object.assign(G.settings, sv.settings);
  G.campaign = sv.campaign || null;
}

// ---- exportSave() ----
// Serializes the save and triggers a browser download of a .json file.
// The <a> element is created, used, and discarded — never added to the DOM.
// URL.createObjectURL is revoked after a short delay to allow the download
// to start before the blob URL is invalidated.
function exportSave() {
  try {
    var json = JSON.stringify(serializeSave(), null, 2);
    var blob = new Blob([json], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "generals_of_the_republic_save.json";
    a.click();
    // Revoke after a tick — the download must start before revoke
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  } catch (e) {
    toast("Export failed.", 2200);
  }
}

// ---- importSave(onDone) ----
// Creates a temporary <input type="file"> element (never attached to the DOM),
// clicks it, and reads the chosen file via FileReader.
// onDone(true)  — called when a valid save was successfully applied.
// onDone(false) — called when the user picks an invalid/corrupt file.
//
// NOTE: onDone is NOT called if the user dismisses the file picker without
// choosing a file (focus/cancel detection is unreliable across browsers on
// file:// and on Safari). onDone fires only on the "change" event.
// Callers that need a cancel path should handle it via a timeout or UI cue.
function importSave(onDone) {
  try {
    var input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,application/json";
    input.style.display = "none";

    input.addEventListener("change", function () {
      var file = input.files && input.files[0];
      if (!file) {
        onDone(false);
        return;
      }
      var reader = new FileReader();
      reader.onload = function (evt) {
        try {
          var sv;
          try {
            sv = JSON.parse(evt.target.result);
          } catch (parseErr) {
            onDone(false);
            return;
          }
          // Same validation as loadLocal
          if (!sv || sv.ver !== _SAVE_VER) { onDone(false); return; }
          if (!sv.settings || typeof sv.settings !== "object" || Array.isArray(sv.settings)) {
            onDone(false);
            return;
          }
          applySave(sv);
          onDone(true);
        } catch (e) {
          onDone(false);
        }
      };
      reader.onerror = function () { onDone(false); };
      reader.readAsText(file);
    });

    input.click();
  } catch (e) {
    onDone(false);
  }
}

// ---- hasSave() ----
// Returns true iff localStorage contains a valid, parseable ver-1 save.
// Calls loadLocal() which already does all validation inside try/catch.
function hasSave() {
  return loadLocal() !== null;
}

// Internal: renders the picker with the given theater filter active.

  var tabs = ["All", "E", "W", "TM", "N"];
  var tabLabels = { All: "All", E: "Eastern", W: "Western", TM: "Trans-Miss.", N: "Naval" };

  var tabsHtml = "";
  for (var ti = 0; ti < tabs.length; ti++) {

// ---- init() ----
// Wires all persistent DOM button handlers. Must be the LAST function called.
// Nothing here touches the DOM before init() runs; all wiring is inside init().
function init() {

  // ---- #btnEndTurn ----
  var btnEndTurn = document.getElementById("btnEndTurn");
  if (btnEndTurn) {
    btnEndTurn.addEventListener("click", function () {
      if (G.mode !== "battle") return;
      if (!G.battle) return;
      if (G.battle.over) return;
      endPlayerTurn();
    });
  }

  // ---- #btnMenu (in-battle pause sheet) ----
  var btnMenu = document.getElementById("btnMenu");
  if (btnMenu) {
    btnMenu.addEventListener("click", function () {
      if (G.mode !== "battle" || !G.battle) return;
      _openPauseSheet();
    });
  }

  // ---- Order buttons ----

  // #obMove
  var btnMove = document.getElementById("obMove");
  if (btnMove) {
    btnMove.addEventListener("click", function () {
      if (G.mode !== "battle" || !G.battle) return;
      var u = G.sel;
      if (!u) return;
      if (u.side !== G.battle.playerSide) return;
      setOrder("move");
    });
  }

  // #obFire
  var btnFire = document.getElementById("obFire");
  if (btnFire) {
    btnFire.addEventListener("click", function () {
      if (G.mode !== "battle" || !G.battle) return;
      var u = G.sel;
      if (!u) return;
      if (u.side !== G.battle.playerSide) return;
      setOrder("fire");
    });
  }

  // #obCharge
  var btnCharge = document.getElementById("obCharge");
  if (btnCharge) {
    btnCharge.addEventListener("click", function () {
      if (G.mode !== "battle" || !G.battle) return;
      var u = G.sel;
      if (!u) return;
      if (u.side !== G.battle.playerSide) return;
      setOrder("charge");
    });
  }

  // #obEntrench — guard: sel, playerSide, !done, type not in cav/nav/hq, ent < 3
  var btnEntrench = document.getElementById("obEntrench");
  if (btnEntrench) {
    btnEntrench.addEventListener("click", function () {
      if (G.mode !== "battle" || !G.battle) return;
      var u = G.sel;
      if (!u) return;
      if (u.side !== G.battle.playerSide) return;
      if (u.done) return;
      if (u.type === "cav" || u.type === "nav" || u.type === "hq") return;
      if (u.ent >= 3) return;
      u.ent = Math.min(3, u.ent + 1);
      u.done = true;
      playSfx("march");
      clearSelection();
      refreshUI();
      draw();
    });
  }

  // #obDone — guard: sel, playerSide, mode=battle
  var btnDone = document.getElementById("obDone");
  if (btnDone) {
    btnDone.addEventListener("click", function () {
      if (G.mode !== "battle" || !G.battle) return;
      var u = G.sel;
      if (!u) return;
      if (u.side !== G.battle.playerSide) return;
      u.done = true;
      clearSelection();
      selectNextUnit();
    });
  }

  // ---- Boot sequence ----
  resize();
  // Painted terrain tiles: defer past end-of-script so TILE_SRC (declared later
  // in the file) is out of its temporal dead zone before we touch it.
  if (typeof setTimeout !== "undefined") {
    setTimeout(function () { if (typeof _preloadTiles === "function") _preloadTiles(); }, 0);
  }
  var sv = loadLocal();
  // If a saved profile chose Modern graphics, bring the 3D renderer up after boot.
  if (typeof setTimeout !== "undefined") {
    setTimeout(function () { if (G.settings.gfx === "modern" && typeof _m3dActivate === "function") _m3dActivate(); }, 0);
  }
  if (sv) applySave(sv);
  // Honour the OS "reduce motion" preference on a fresh profile (no prior save).
  // A saved preference always wins — we only default the first run. (WCAG 2.3.3)
  else if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
    G.settings.reduceMotion = true;
  }
  openMainMenu();
}

// In-battle pause: Resume / Settings / Abandon Battle.

  var html =
    '<h1 class="title-xl">Pause</h1>' +
    '<p class="title-sub">' + (G.battle ? G.battle.bd.name : "Battle") + '</p>' +

      '</button>' +
      '<button class="mbtn" id="pauseSettings">' +
        '<span class="ic set">⚙</span>' +
        '<span><div class="t">Settings</div>' +
        '<div class="d">Adjust difficulty, map style, sound</div></span>' +
      '</button>' +
      '<button class="mbtn" id="pauseAbandon">' +
        '<span class="ic load" style="color:var(--blood-lt)">✕</span>' +
        '<span><div class="t">Abandon Battle</div>' +
        '<div class="d">' + (fromCampaign ? "Counts as a defeat in your campaign" : "Return to main menu") + '</div></span>' +

    btnAbandon.addEventListener("click", function () {
      _confirmAbandon(fromCampaign);
    });
  }

// ---- _confirmAbandon(fromCampaign) ----
// Confirm dialog before abandoning. If campaign, calls campaignAdvance(enemySide, "win").
function _confirmAbandon(fromCampaign) {
  var html =
    '<h1 class="title-xl">Abandon Battle?</h1>' +
    '<hr class="rule">' +
    '<p class="lede">' +
      (fromCampaign
        ? 'Abandoning counts as a defeat. Your campaign will enter recovery. Are you sure?'
        : 'You will lose all progress in this engagement. Return to the main menu?') +
    '</p>' +
    '<div class="btn-row">' +
      '<button class="bigbtn" id="abandonConfirm">Abandon</button>' +
      '<button class="ghostbtn" id="abandonCancel">Cancel</button>' +
    '</div>';

  openSheet(html);

  var btnConfirm = document.getElementById("abandonConfirm");
  if (btnConfirm) {
    btnConfirm.addEventListener("click", function () {
      if (fromCampaign && G.battle) {
        // Mark over so AI/event guards stop
        G.battle.over = true;
        var enemySide = G.battle.enemySide;
        hideHud();
        campaignAdvance(enemySide, "win");
      } else {
        hideHud();
        openMainMenu();
      }
    });
  }

  var btnCancel = document.getElementById("abandonCancel");
  if (btnCancel) {
    btnCancel.addEventListener("click", function () {
      // Go back to the pause sheet rather than directly closing
      _openPauseSheet();
    });
  }
}

    clear:  "#d9cf9e",
    field:  "#cfc17f",
    woods:  "#6e8f52",
    hills:  "#d2b97f",
    ridge:  "#c4a76a",
    town:   "#c8b488",
    road:   "#d4c08a",
    river:  "#5d93b8",
    ford:   "#7fb5c4",
    swamp:  "#8d9a6b",

function authoredMap(bd){
  const A = AUTHORED_MAPS[bd && bd.id];
  if (!A) return null;
  RND = mulberry(hashStr(bd.id) ^ 0x5C1B1E); // match genMap's deterministic seed
  const GW = A.GW, GH = A.GH, map = {}, key = (c,r)=>c+","+r;
  for (let r=0; r<GH; r++){
    const row = A.grid[r] || "";
    for (let c=0; c<GW; c++){
      const ch = row[c] || ".";
      const t = A.legend[ch] || "clear";
      map[key(c,r)] = makeTile(c,r,t);
    }
  }
  // objectives — push the actual tile objects so owner updates flow through
  const objs = [];
  (A.objs||[]).forEach(o=>{
    const t = map[key(o.c,o.r)];
    if (t){ t.obj = {val:o.val}; t.owner = 0; objs.push(t); }
  });
  // deployment zones → per-side Sets of "c,r"
  let deploy = null;
  if (A.deploy && A.deploy.length){
    deploy = { US:new Set(), CS:new Set() };
    for (let r=0; r<GH; r++){
      const row = A.deploy[r] || "";
      for (let c=0; c<GW; c++){
        const z = row[c];
        if (z==="U") deploy.US.add(key(c,r));
        else if (z==="C") deploy.CS.add(key(c,r));
      }
    }
  }
  return { GW, GH, map, key, objs, naval:false,
           authored:true, authoredFeatures:(A.features||[]), deploy,
           ground:(A.ground||"") };
}

/* ----------------------------------------------------------------
   OFFSCREEN TERRAIN CACHE  — WORLD-SPACE
   The offscreen canvas is rendered in WORLD coordinates at bucketScale
   (no camera baked in). Pan reuses the canvas; only a zoom-bucket
   change, fog change, or ownership change triggers a re-render.

   Key: battleId | skin | zoomBucket | fogSig | objOwnerSig
   (screen size is intentionally excluded — camera-independent)

   zoomBucket: Math.floor(zoom * 4)
   fogSig: count of visible hexes (changes when visibility changes)
   objOwnerSig: join of obj owners (changes when objectives are captured)

   bucketScale: representative zoom for the bucket, clamped [0.5, 1.6]
   and further capped so the offscreen never exceeds ~3000 px on a side.
   ---------------------------------------------------------------- */
const _terrainCache = new Map(); // key → canvas (world-space)
const _CACHE_MAX = 12; // evict oldest when over limit

function _makeCacheKey(B, skin) {
  const zb = Math.floor(G.cam.z * 4);
  // fog signature: count of visible hexes (fast, good enough)
  const fogSig = B.vis ? B.vis.size : 0;
  // obj owner signature
  const objSig = B.M.objs.map(o => o.owner || "0").join("");
  // NOTE: NO screen-size dependency — camera-position-independent key
  return B.bd.id + "|" + skin + "|" + zb + "|" + fogSig + "|" + objSig;
}

/* Compute world extents of the map (unscaled, world coords).
   Returns { worldW, worldH, marginW, marginH } where:
   - marginW / marginH = one hex radius of padding on each side
   - worldW / worldH = total offscreen canvas size in WORLD units
     (i.e. the full tiled extent including the margin on both sides) */
function _worldExtents(M) {
  const marginW = HEX;          // one radius padding left and right
  const marginH = HEX;          // one radius padding top and bottom
  const corner  = colrowToPixel(M.GW - 1, M.GH - 1);
  // rightmost hex center.x  + half-hex-width  + margin right
  // (hexW()/2 accounts for the hex body beyond the center on the right)
  const worldW = corner.x + hexW() / 2 + marginW + marginW;
  // bottommost hex center.y + one hex-height below  + margin top (already 0)
  const worldH = corner.y + HEX + marginH + marginH;
  return { worldW, worldH, marginW, marginH };
}

/* Derive bucketScale from the zoom bucket (same bucket that keys the cache),
   clamped to [0.5, 1.6] then hard-capped so no side exceeds 3000 px. */
function _bucketScale(zb, M) {
  const { worldW, worldH } = _worldExtents(M);
  let bs = Math.max(0.5, Math.min(1.6, zb / 4));
  const CAP = 3000;
  if (worldW * bs > CAP) bs = CAP / worldW;
  if (worldH * bs > CAP) bs = CAP / worldH;
  // Always at least 0.25 so tiny maps still render
  return Math.max(0.25, bs);
}

function _evictCache() {
  if (_terrainCache.size > _CACHE_MAX) {
    // evict oldest (first inserted)
    const first = _terrainCache.keys().next().value;
    _terrainCache.delete(first);
  }
}

/* ----------------------------------------------------------------
   PRE-RENDERED GRAIN PATTERN TILE
   Built once per skin change; seeded via hashStr.
   Used as a repeating pattern over hex fills.
   ---------------------------------------------------------------- */
const _grainPatterns = {}; // skin → CanvasPattern

function _buildGrainPattern(skin, mainCtx) {
  const sz = 64;
  const off = document.createElement("canvas");
  off.width = sz; off.height = sz;
  const octx = off.getContext("2d");
  // clear
  octx.clearRect(0, 0, sz, sz);
  // seed based on skin
  const rng = mulberry(hashStr("grain_" + skin));
  const imageData = octx.createImageData(sz, sz);
  const d = imageData.data;
  for (let i = 0; i < sz * sz; i++) {
    const val = rng() < 0.18 ? (rng() * 28) | 0 : 0;
    const alpha = rng() < 0.15 ? (val * 1.4) | 0 : 0;
    d[i * 4]     = skin === 0 ? 60 : skin === 1 ? 40 : 80;
    d[i * 4 + 1] = skin === 0 ? 50 : skin === 1 ? 35 : 70;
    d[i * 4 + 2] = skin === 0 ? 30 : skin === 1 ? 20 : 60;
    d[i * 4 + 3] = alpha;
  }
  octx.putImageData(imageData, 0, 0);
  const pat = mainCtx.createPattern(off, "repeat");
  _grainPatterns[skin] = pat;
  return pat;
}

function _getGrainPattern(skin) {
  if (_grainPatterns[skin]) return _grainPatterns[skin];
  return _buildGrainPattern(skin, ctx);
}

/* ----------------------------------------------------------------
   HEX CLIP PATH helper (for clipping decorations inside a hex)
   ---------------------------------------------------------------- */
function _hexClipPath(offCtx, px, py, rad) {
  offCtx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 180 * (60 * i - 90);
    const x = px + rad * Math.cos(a);
    const y = py + rad * Math.sin(a);
    i ? offCtx.lineTo(x, y) : offCtx.moveTo(x, y);
  }
  offCtx.closePath();
}

/* ----------------------------------------------------------------
   TILT CONSTANTS
   Paint-only vertical squash and elevation y-offset.
   DO NOT touch pixelToColrow or colrowToPixel.
   ---------------------------------------------------------------- */
const TILT_SQUASH = 0.86;          // vertical squash factor
const TILT_ELEV_PX = 7;            // y-offset per elevation unit (at zoom 1)

function _tiledY(screenY, elev, zoom) {
  // elev: -1 (ford/river), 0 (flat), 1 (hills/ridge)
  return screenY + elev * (-TILT_ELEV_PX) * zoom;
}

/* ----------------------------------------------------------------
   DRAW HELPERS — terrain features
   All accept (octx, sx, sy, rad, rng, skin) or subset.
   ---------------------------------------------------------------- */

function _drawWoodsCanopy(octx, sx, sy, rad, rng, skin) {
  const count = 3 + ((rng() * 4) | 0); // 3-6 blobs
  const col0 = skin === 0 ? "#5a7f42" : skin === 1 ? "#4a6830" : "#76906c";
  const col1 = skin === 0 ? "#4a6b35" : skin === 1 ? "#3c5426" : "#667c5c";
  const rimCol = skin === 0 ? "#2e4a20" : "#233818";
  for (let k = 0; k < count; k++) {
    const bx = sx + (rng() - 0.5) * rad * 1.1;
    const by = sy + (rng() - 0.5) * rad * 0.7;
    const br = rad * (0.22 + rng() * 0.18);
    // dark rim first
    octx.beginPath();
    octx.arc(bx, by, br + 1.5, 0, 6.283);
    octx.fillStyle = rimCol;
    octx.fill();
    // canopy body
    const g = octx.createRadialGradient(bx - br * 0.2, by - br * 0.3, 0, bx, by, br);
    g.addColorStop(0, col0);
    g.addColorStop(1, col1);
    octx.beginPath();
    octx.arc(bx, by, br, 0, 6.283);
    octx.fillStyle = g;
    octx.fill();
  }
}

function _drawRiver(octx, sx, sy, rad, rng, skin) {
  // banded water
  const w1 = skin === 0 ? "#5d93b8" : skin === 1 ? "#3f6f93" : "#7fa8c4";
  const w2 = skin === 0 ? "#7ab0cc" : skin === 1 ? "#5a8aac" : "#9fc0d4";
  const bank = skin === 0 ? "#c4a05a" : skin === 1 ? "#a07a3a" : "#c8b888";
  // bank lip (sandy strip around hex edge)
  _hexClipPath(octx, sx, sy, rad);
  octx.fillStyle = bank;
  octx.fill();
  // inner water with bands
  _hexClipPath(octx, sx, sy, rad * 0.85);
  const gw = octx.createLinearGradient(sx - rad, sy, sx + rad, sy);
  gw.addColorStop(0, w2);
  gw.addColorStop(0.35, w1);
  gw.addColorStop(0.65, w1);
  gw.addColorStop(1, w2);
  octx.fillStyle = gw;
  octx.fill();
  // ripple lines
  octx.strokeStyle = "rgba(200,230,255,0.22)";
  octx.lineWidth = 1;
  for (let k = 0; k < 3; k++) {
    const ry = sy + (k - 1) * rad * 0.22;
    octx.beginPath();
    octx.moveTo(sx - rad * 0.6, ry);
    octx.quadraticCurveTo(sx, ry + 3, sx + rad * 0.6, ry);
    octx.stroke();
  }
}

function _drawFord(octx, sx, sy, rad, rng, skin) {
  // lighter ford with visible stones
  const w = skin === 0 ? "#90cad6" : skin === 1 ? "#6fa0b8" : "#aacfdc";
  const stone = skin === 0 ? "#a89878" : "#8a7860";
  _hexClipPath(octx, sx, sy, rad * 0.9);
  octx.fillStyle = w;
  octx.fill();
  // 4-6 stones
  const sc = 3 + ((rng() * 4) | 0);
  octx.fillStyle = stone;
  for (let k = 0; k < sc; k++) {
    const stx = sx + (rng() - 0.5) * rad * 1.0;
    const sty = sy + (rng() - 0.5) * rad * 0.5;
    const sr = rad * (0.06 + rng() * 0.06);
    octx.beginPath();
    octx.ellipse(stx, sty, sr * 1.4, sr, rng() * 1.5, 0, 6.283);
    octx.fill();
  }
}

function _drawTown(octx, sx, sy, rad, rng, skin) {
  // 2-4 gabled buildings — roof face visible per tilt
  const count = 2 + ((rng() * 3) | 0);
  const wallCol = skin === 0 ? "#c4a870" : skin === 1 ? "#a08050" : "#c8b888";
  const roofCol = skin === 0 ? "#7a4030" : skin === 1 ? "#5e2e1e" : "#8a5040";
  const roofFace = skin === 0 ? "#603020" : skin === 1 ? "#4a201a" : "#6a3a2a";
  for (let k = 0; k < count; k++) {
    const bx = sx + (rng() - 0.5) * rad * 0.8;
    const by = sy + (rng() - 0.5) * rad * 0.4;
    const bw = rad * (0.18 + rng() * 0.14);
    const bh = rad * (0.22 + rng() * 0.12);
    // wall
    octx.fillStyle = wallCol;
    octx.fillRect(bx - bw, by, bw * 2, bh * 0.8);
    // tilt: show gable face on south side (per axonometric view)
    octx.fillStyle = roofFace;
    octx.beginPath();
    octx.moveTo(bx - bw, by + bh * 0.8);
    octx.lineTo(bx + bw, by + bh * 0.8);
    octx.lineTo(bx + bw, by + bh * 1.0);
    octx.lineTo(bx - bw, by + bh * 1.0);
    octx.closePath();
    octx.fill();
    // roof triangle (gabled)
    octx.fillStyle = roofCol;
    octx.beginPath();
    octx.moveTo(bx - bw, by);
    octx.lineTo(bx + bw, by);
    octx.lineTo(bx, by - bh * 0.5);
    octx.closePath();
    octx.fill();
  }
}

function _drawFort(octx, sx, sy, rad, rng, skin) {
  const earth = skin === 0 ? "#96743a" : skin === 1 ? "#7a5828" : "#a08448";
  const dark  = skin === 0 ? "#6a4e24" : "#503c18";
  // earthwork ridge shapes
  const pts = 4 + ((rng() * 2) | 0);
  octx.fillStyle = earth;
  octx.beginPath();
  for (let k = 0; k < pts; k++) {
    const a = (k / pts) * 6.283;
    const r2 = rad * (0.4 + rng() * 0.25);
    const px = sx + Math.cos(a) * r2;
    const py = sy + Math.sin(a) * r2;
    k ? octx.lineTo(px, py) : octx.moveTo(px, py);
  }
  octx.closePath();
  octx.fill();
  // hatch lines
  octx.save();
  octx.clip();
  octx.strokeStyle = "rgba(40,28,16,0.45)";
  octx.lineWidth = 1;
  for (let i = -rad; i < rad; i += 4) {
    octx.beginPath();
    octx.moveTo(sx + i, sy - rad);
    octx.lineTo(sx + i + rad, sy + rad);
    octx.stroke();
  }
  octx.restore();
  // parapet ridge highlight (SE light)
  octx.strokeStyle = "rgba(200,170,100,0.35)";
  octx.lineWidth = 2;
  octx.beginPath();
  octx.arc(sx - rad * 0.15, sy - rad * 0.2, rad * 0.38, 3.8, 5.8);
  octx.stroke();
}

function _drawRoad(octx, sx, sy, rad, rng, skin) {
  // double wheel-ruts
  const dustCol = skin === 0 ? "#c8a860" : skin === 1 ? "#aa8840" : "#cec4a0";
  const rutCol  = "rgba(40,28,16,0.28)";
  const ew = rad * 0.12;
  // determine road orientation (use map tile neighbors via the same hex center)
  // paint horizontal band of dust
  octx.fillStyle = dustCol;
  octx.fillRect(sx - rad, sy - ew * 1.5, rad * 2, ew * 3);
  // two ruts
  octx.strokeStyle = rutCol;
  octx.lineWidth = ew * 0.6;
  octx.beginPath();
  octx.moveTo(sx - rad, sy - ew * 0.5);
  octx.lineTo(sx + rad, sy - ew * 0.5);
  octx.moveTo(sx - rad, sy + ew * 0.5);
  octx.lineTo(sx + rad, sy + ew * 0.5);
  octx.stroke();
}

function _drawSwamp(octx, sx, sy, rad, rng, skin) {
  // reed ticks
  const base  = skin === 0 ? "#8d9a6b" : skin === 1 ? "#6f7a45" : "#94a070";
  const water = skin === 0 ? "#6a8878" : skin === 1 ? "#507060" : "#7a9888";
  // base color already set; add dark puddles
  const pCount = 3 + ((rng() * 3) | 0);
  octx.fillStyle = water;
  for (let k = 0; k < pCount; k++) {
    const px = sx + (rng() - 0.5) * rad * 0.9;
    const py = sy + (rng() - 0.5) * rad * 0.5;
    const pr = rad * (0.08 + rng() * 0.08);
    octx.beginPath();
    octx.ellipse(px, py, pr * 1.6, pr, rng() * 1.2, 0, 6.283);
    octx.fill();
  }
  // reed strokes
  octx.strokeStyle = "rgba(40,55,20,0.55)";
  octx.lineWidth = 1;
  const rCount = 6 + ((rng() * 6) | 0);
  for (let k = 0; k < rCount; k++) {
    const rx = sx + (rng() - 0.5) * rad * 0.8;
    const ry = sy + (rng() - 0.5) * rad * 0.5;
    const rh = rad * (0.12 + rng() * 0.10);
    octx.beginPath();
    octx.moveTo(rx, ry + rh);
