/* Per-turn tick — runs AFTER prodOnResolve so it can repair the rail prod just decayed.
   The Construction Corps adds rail integrity back; for the South this SLOWS the
   irreversible decay (additive vs multiplicative loss → the net trend still declines). */
function engOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  try {
    engInit(C);
    if (!C.production || typeof C.production.railIntegrity !== "number") return;
    var lvl = engBranchLevel(C, "construction");
    if (lvl <= 0) return;
    // Claw back only a FRACTION of the rail JUST lost (never the whole loss), so the South's decay
    // is SLOWED but never stopped or reversed — there is no iron to truly rebuild. D43 / the A2
    // bug-hunt: a constant additive repair created a stable equilibrium and even PINNED rail at 100
    // once the rail War-Room node was funded; tying recovery to a sub-1.0 fraction of the actual
    // loss keeps the net trend strictly negative for every decay/level combination.
    var loss = (typeof C.production.railLossLast === "number") ? C.production.railLossLast : 0;
    if (loss <= 0) return;   // US (rail repairs to full in prod) or already at the floor
    var D = _engData();
    var fpl = (D && typeof D.railClawbackFractionPerLevel === "number") ? D.railClawbackFractionPerLevel : 0.24;
    var cap = (D && typeof D.railClawbackCap === "number") ? D.railClawbackCap : 0.70;
    var frac = Math.min(cap, Math.max(0, lvl * fpl));   // < 1 always -> net rail loss remains positive
    C.production.railIntegrity = Math.min(100, C.production.railIntegrity + loss * frac);
  } catch (e) {}
}

/* ===== module: 58-terrain-cover.js ===== */
/* ===========================================================================
   A3 · 58-terrain-cover.js — the terrain COVER hierarchy.

   Aaron's directive (backlog A3): "add named cover — stone wall (strong),
   forest (strong), wood fence (less strong), trenches, boulders, sunken road —
   slotted into the EXISTING TERRAIN def/cover model."

   How it works (investigated against build/base.html):
     · Combat reduces fire damage by dividing by TERRAIN[tile.t].def (resolveFire
       ~1038, return fire ~1051, charge ~1068). The `cover` field on TERRAIN was
       defined but NEVER read. So we ADD six named cover types as new TERRAIN keys
       with real `def` values — combat picks them up automatically through the
       existing .def path. NO fire-function override (lowest engine risk).
     · TERRAIN / TCOL / PALETTE are frozen `const`s, but ADDING keys to a const
       object/array element is legal. We mutate them at module load (this code
       runs after the base defs, before any battle). Unknown terrain keys already
       fall back to gray in the renderer (TCOL[skin][t]||"#bbb"); we add real
       colors so the new tiles paint in period tone.
     · We OVERRIDE authoredMap (frozen-engine override, §8.2) — verbatim base body
       + a decoration pass that stamps the cover types onto the historical features
       the authored maps already label (Antietam's Sunken Road, Devil's Den, the
       Vicksburg redans, the woods …). Gated by diag-classic; revert on regression.

   Adds NO campaign state. New fns: _tcData / _tcTypes / _tcApplyDefs (load-time
   mutation) / _tcCoverFor / tcDecorateMap. Overrides: authoredMap (manifest).
   Bare-name globals (TERRAIN, TCOL, PALETTE, AUTHORED_MAPS, mulberry, hashStr,
   makeTile); _tc* helpers; decoration never weakens a tile or touches water.
   =========================================================================== */

function _tcData() {
  // build keys data by filename: data/terrain-cover.json -> GAME_DATA["terrain-cover"] (hyphenated, like manpower-teaching)
  return (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA["terrain-cover"]) ? GAME_DATA["terrain-cover"] : null;
}
function _tcTypes() { var D = _tcData(); return (D && D.types && D.types.length) ? D.types : []; }

/* Install the cover types into the frozen engine consts (idempotent). */
function _tcApplyDefs() {
  if (typeof TERRAIN === "undefined") return false;
  var types = _tcTypes();
  for (var i = 0; i < types.length; i++) {
    var t = types[i]; if (!t || !t.id || !t.terrain) continue;
    if (!TERRAIN[t.id]) TERRAIN[t.id] = t.terrain;   // add the new cover terrain (def picked up by combat)
    var cols = t.colors || [];
    if (typeof TCOL !== "undefined" && TCOL.length) {
      for (var s = 0; s < TCOL.length; s++) { var c = cols[s] || cols[cols.length - 1] || "#9a9088"; if (TCOL[s] && !TCOL[s][t.id]) TCOL[s][t.id] = c; }
    }
    if (typeof PALETTE !== "undefined" && PALETTE && PALETTE.length) {
      for (var p = 0; p < PALETTE.length; p++) { var pc = cols[p] || cols[cols.length - 1] || "#9a9088"; if (PALETTE[p] && !PALETTE[p][t.id]) PALETTE[p][t.id] = pc; }
    }
  }
  return true;
}
_tcApplyDefs();   // run at module load (after base defs, before any battle)

/* Map an authored feature label -> the strongest matching cover terrain id (or null).
   The strongest (highest-def) matching type wins, so "Sunken Road redoubt" -> the harder of the two. */
function _tcCoverFor(label) {
  if (!label || typeof TERRAIN === "undefined") return null;
  var s = String(label).toLowerCase(), types = _tcTypes(), best = null, bestDef = -1;
  for (var i = 0; i < types.length; i++) {
    var t = types[i], m = t.match || [];
    var hit = false;
    for (var j = 0; j < m.length; j++) { if (m[j] && s.indexOf(String(m[j]).toLowerCase()) >= 0) { hit = true; break; } }
    if (!hit) continue;
    var def = (TERRAIN[t.id] && typeof TERRAIN[t.id].def === "number") ? TERRAIN[t.id].def : 0;
    if (def > bestDef) { bestDef = def; best = t.id; }
  }
  return best;
}

/* Stamp cover terrain onto an authored map's labelled features. This is a TERRAIN
   SWAP (def + move-cost + color come from the cover type), applied conservatively:
   only when it STRENGTHENS defense (cover.def > current.def) AND never makes the tile
   FASTER to traverse (cover.cost >= current.cost — so high ground / works never become
   cheaper to cross); never on water/river/ford/shoal; objectives/owner/elev untouched
   (only the terrain key changes). Idempotent. */
function tcDecorateMap(M) {
  if (!M || !M.map || !M.key || typeof TERRAIN === "undefined") return 0;
  var feats = M.authoredFeatures || [], stamped = 0, skip = { water: 1, river: 1, ford: 1, shoal: 1 };
  for (var i = 0; i < feats.length; i++) {
    var f = feats[i]; if (!f || typeof f.c !== "number" || typeof f.r !== "number") continue;
    var cover = _tcCoverFor(f.label); if (!cover || !TERRAIN[cover]) continue;
    var tile = M.map[M.key(f.c, f.r)]; if (!tile) continue;
    if (skip[tile.t]) continue;                                   // never wall off a river
    var curT = TERRAIN[tile.t] || {};
    var curDef = (typeof curT.def === "number") ? curT.def : 1;
    var curCost = (typeof curT.cost === "number") ? curT.cost : 1;
    if (TERRAIN[cover].def <= curDef) continue;                   // never weaken an authored position
    var covCost = (typeof TERRAIN[cover].cost === "number") ? TERRAIN[cover].cost : 1;
    if (covCost < curCost) continue;                              // never make a position FASTER to cross (no-speedup guard)
    tile.t = cover; tile.cover = cover; stamped++;                // tag for any future cover-aware code
  }
  return stamped;

/* ---- authoredMap OVERRIDE (frozen-engine §8.2): the VERBATIM base body
   (build/base.html 4987-5022) + a decoration pass before the return. ---- */
function authoredMap(bd) {
  const A = AUTHORED_MAPS[bd && bd.id];
  if (!A) return null;
  RND = mulberry(hashStr(bd.id) ^ 0x5C1B1E); // match genMap's deterministic seed
  const GW = A.GW, GH = A.GH, map = {}, key = (c, r) => c + "," + r;
  for (let r = 0; r < GH; r++) {
    const row = A.grid[r] || "";
    for (let c = 0; c < GW; c++) {
      const ch = row[c] || ".";
      const t = A.legend[ch] || "clear";
      map[key(c, r)] = makeTile(c, r, t);
    }
  }
  // objectives — push the actual tile objects so owner updates flow through
  const objs = [];
  (A.objs || []).forEach(o => {
    const t = map[key(o.c, o.r)];
    if (t) { t.obj = { val: o.val }; t.owner = 0; objs.push(t); }
  });
  // deployment zones → per-side Sets of "c,r"
  let deploy = null;
  if (A.deploy && A.deploy.length) {
    deploy = { US: new Set(), CS: new Set() };
    for (let r = 0; r < GH; r++) {
      const row = A.deploy[r] || "";
      for (let c = 0; c < GW; c++) {
        const z = row[c];
        if (z === "U") deploy.US.add(key(c, r));
        else if (z === "C") deploy.CS.add(key(c, r));
      }
    }
  }
  const __M = {
    GW, GH, map, key, objs, naval: false,
    authored: true, authoredFeatures: (A.features || []), deploy,
    ground: (A.ground || "")
  };
  // A3: stamp the named cover hierarchy onto the labelled historical features.
  if (typeof tcDecorateMap === "function") { try { tcDecorateMap(__M); } catch (e) {} }
  return __M;
}


/* ===== module: 59-armory-field.js ===== */
/* ===========================================================================
   A4 · 59-armory-field.js — wire The Armory to the battlefield.

   Aaron's directive (backlog A4): "the weapons bought in C.armory.loadout become
   what the player's brigades carry + fire — connect data/weapons.json quality to
   the base WEAPONS table / genForce unit weapon assignment. Probe that Spencers
   bought -> higher unit firepower in battle." (Frozen-engine override, §8.2.)

   How it works (investigated against build/base.html):
     · A battle unit carries u.weapon = a STRING KEY into the engine's WEAPONS
       table (line 322). resolveFire (line 1037) computes power *= WEAPONS[u.weapon].pow.
       So a unit's firepower is decided ENTIRELY by which WEAPONS key it holds.
     · genForce (line 685) builds each side's units via mkUnit, which picks a random,
       era-appropriate weapon (infWeapon). We OVERRIDE genForce (verbatim base body +
       a post-pass) so that, for the PLAYER side in a campaign, a fraction of the
       fresh infantry are RE-ARMED with the weapons the player actually bought
       (C.armory.loadout), mapped from the strategic armory ids to engine WEAPONS keys.
     · The armory catalog ids (data/weapons.json: smoothbore/lorenz/springfield/…)
       differ from the engine keys (smooth/rifled/spring/…), so _AF_ENGINE_KEY binds
       them — quality-monotonically, so a better bought weapon is never a worse field
       weapon. (Data may override per-weapon via an optional `engineKey` field.)

   Result: buy Spencers -> a slice of your line carries "spencer" (pow 2.05 vs the
   smoothbore's 1.00) -> measurably heavier fire on the day. The unbought remainder
   keeps its standard-issue arm; veterans keep their earned weapon; the enemy is
   untouched (they don't draw on your arsenal).

   New fns: _afData / _afEngineKey / _afWireUnits. Override: genForce (manifest).
   Bare-name globals (WEAPONS, G, unitsFor, mkUnit, attachLeader, deployForce,
   clamp); _af* helpers; no campaign state added; guarded for non-campaign battles.
   =========================================================================== */

function _afData() {
  return (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.weapons) ? GAME_DATA.weapons : null;
}

/* Bind strategic armory ids -> engine WEAPONS keys, quality-monotonically
   (a higher-quality purchase always maps to >= field power). */
var _AF_ENGINE_KEY = {
  smoothbore: "smooth",   // q22 -> pow 1.00
  lorenz:     "rifled",   // q48 -> pow 1.25
  richmond:   "rifled",   // q57 -> pow 1.25 (CS Springfield-pattern rifled musket)
  enfield:    "enfield",  // q61 -> pow 1.42
  springfield:"spring",   // q62 -> pow 1.45 (engine key "spring")
  colt:       "sharps",   // q70 -> pow 1.70 (revolving rifle ~ breechloader rate)
  sharps:     "sharps",   // q80 -> pow 1.70
  spencer:    "spencer",  // q92 -> pow 2.05
  henry:      "henry"     // q94 -> pow 2.20
};
function _afEngineKey(id) {
  if (id == null) return null;
  var D = _afData();   // optional data override (future-proof): a weapon may carry its own engineKey
  if (D && D.weapons && D.weapons.length) {
    for (var i = 0; i < D.weapons.length; i++) { if (D.weapons[i] && D.weapons[i].id === id && D.weapons[i].engineKey) return D.weapons[i].engineKey; }
  }
  return _AF_ENGINE_KEY[id] || null;
}

/* Re-arm a fraction of the PLAYER's fresh infantry with the bought weapons.
   Mutates units[].weapon. Returns the count re-armed. Safe + no-op off-campaign. */
function _afWireUnits(units, side, C, year) {
  if (!units || !units.length || !C || !C.armory || !C.armory.loadout) return 0;
  if (side !== ((C.side === "CS") ? "CS" : "US")) return 0;   // player side only — the enemy doesn't draw on your arsenal
  if (typeof WEAPONS === "undefined") return 0;
  var lo = C.armory.loadout, by = (typeof year === "number" && isFinite(year)) ? year : null;
  // fresh (non-veteran, non-leader) infantry are the ones issued procured arms
  var inf = [];
  for (var i = 0; i < units.length; i++) { var u = units[i]; if (u && u.type === "inf" && !u.vetId && !u.leader) inf.push(u); }
  if (!inf.length) return 0;
  // plan: each bought weapon claims floor(inf * its fraction) muskets, mapped to an engine key
  var plan = [];
  for (var id in lo) if (lo.hasOwnProperty(id)) {
    var frac = Number(lo[id]); if (!isFinite(frac) || frac <= 0) continue;
    var ek = _afEngineKey(id); if (!ek || !WEAPONS[ek]) continue;
    if (by != null && WEAPONS[ek].era && WEAPONS[ek].era > by) continue;   // honor the engine's own era gate — don't field arms it wouldn't issue this year (fair vs the era-locked AI)
    var fr = Math.min(1, frac); if (fr > 0.9995) fr = 1;                   // absorb 0.1*10 float drift so a "100%-armed" line arms every brigade
    var cnt = Math.floor(inf.length * fr + 1e-9);
    for (var k = 0; k < cnt; k++) plan.push(ek);
  }
  var assigned = 0;
  for (var j = 0; j < inf.length && j < plan.length; j++) { inf[j].weapon = plan[j]; assigned++; }   // remainder keeps its standard-issue arm
  return assigned;

/* ---- genForce OVERRIDE (frozen-engine §8.2): the VERBATIM base body
   (build/base.html 685-716) + a player-armory re-arm pass before the return. ---- */
function genForce(bd, side, isAttacker, M, campaignCore){
  const men = side==="US"? bd.us : bd.cs;
  let n=unitsFor(men);
  const naval=M.naval;
  const units=[];
  if(naval){
    // warships for attacker; defender gets forts + some ships
    const ships = isAttacker? n : Math.max(2,Math.round(n*0.5));
    for(let i=0;i<ships;i++) units.push(mkUnit(side,"nav",bd));
    if(!isAttacker){ const forts=Math.max(1,Math.round(n*0.4)); for(let i=0;i<forts;i++) units.push(mkUnit(side,"fort",bd)); }
  } else {
    let inf=Math.round(n*0.66), art=Math.max(1,Math.round(n*0.18)), cav=Math.max(0,n-inf-art);
    if(n>=6 && cav===0) cav=1;
    // campaign carry: reuse veteran roster units for the player core
    let made=0;
    if(campaignCore && campaignCore.length){
      for(const rc of campaignCore){ if(made>=inf+art+cav) break;
        const u=mkUnit(side, rc.type, bd); u.weapon=rc.weapon||u.weapon; u.xp=rc.xp||0; u.vetId=rc.id; u.vetName=rc.name;
        u.morale=clamp(u.morale + (u.xp*3),0,98); units.push(u); made++; }
    }
    for(let i=units.length;i<inf;i++) units.push(mkUnit(side,"inf",bd));
    for(let i=0;i<art;i++) units.push(mkUnit(side,"art",bd));
    for(let i=0;i<cav;i++) units.push(mkUnit(side,"cav",bd));
  }
  // leaders: army commander + 1 subordinate
  const cmd=mkUnit(side,"inf",bd); attachLeader(cmd,side,bd,true); units.push(cmd);
  const sub=mkUnit(side,"inf",bd); attachLeader(sub,side,bd,false); units.push(sub);

  // A4: re-arm the player's fresh infantry with the weapons bought in The Armory — but ONLY in a genuine
  // campaign battle. campaignCore is non-null only for the PLAYER force when startBattleRuntime ran with
  // fromCampaign=true (build/base.html 777-779: the enemy force AND both Free-Battle forces get null), so
  // it is the exact discriminator — Classic/Free Battle stays independent of campaign save state and the
  // AI is never armed from the player's arsenal.
  try { if (campaignCore && campaignCore.length && typeof _afWireUnits === "function") _afWireUnits(units, side, (typeof G !== "undefined" && G.campaign) ? G.campaign : null, bd && bd.year); } catch(e){}

  // deploy: attacker bottom band, defender top band (+ objectives/forts)
  deployForce(units, side, isAttacker, M);
  return units;
}


/* ===== module: 60-blockade.js ===== */
/* ===========================================================================
   S1c · 60-blockade.js — cotton, the blockade, and foreign recognition.

   The Confederacy's asymmetric special subsystem (data/economy.json ->
   GAME_DATA.economy.cottonBlockade). Models the three intertwined traps that
   strangled the Southern war economy:

     1) KING COTTON / the 1861 SELF-EMBARGO TRAP — withholding cotton to coerce
        European recognition forfeited the South's one blockade-free export year
        and earned NO recognition (Britain sat on a ~1M-bale glut). A lever that
        LOOKS coercive and is in fact self-sabotage.
     2) THE BLOCKADE STRANGLEHOLD — per-voyage runner success stayed high (~5 in
        6 early) yet AGGREGATE exports collapsed to ~11% of peacetime; capture
        risk climbs 0.10 (1861) -> 0.33 (1864); runner ports fall (Wilmington,
        Jan 1865) until the ocean lifeline is severed. This gates the CS small-
        arms importFactor that 50-production.js reads (the S1b placeholder wired).
     3) FOREIGN RECOGNITION FORECLOSED — recognition pressure rises with the
        Lancashire famine + early battlefield wins but is capped by Indian/
        Egyptian substitution and slavery politics, and becomes UNREACHABLE after
        Antietam + the Emancipation Proclamation (Sep 1862). Feeds clock.intervention.

   Adds C.blockade (sibling state). Four-function contract:
     blockadeInit / blockadeOnResolve (tick — runs BEFORE prod so importFactor is
     fresh) / blockadeRenderDiplomacy (the Diplomacy desk tab) / blockadeWireDiplomacy.
   Blockade DEPTH is a realism TOGGLE (full / flat / off, R14). The Diplomacy
   desk is delegated to the Secretary of State by default (balance principle 27).

   Bare-name globals (G, GAME_DATA); _blk* unique helpers; render never mutates
   or saves; the tick mutates C.blockade + C.funds + (interlink) C.clock.intervention.
   =========================================================================== */

var _blkEXPORT_CAP_K = 350;     // per-turn export capacity, thousand-bales (peacetime-ish ceiling)
var _blkFUNDS_PER_KBALE = 0.45; // game-funds earned per thousand bales delivered to Europe

/* Capture probability per voyage by year (full-blockade schedule). Verified
   (Wise): risk ~1-in-10 (1861) climbing to ~1-in-3 (1864). */
function _blkCaptureProb(year) {
  if (year <= 1861) return 0.10;
  if (year === 1862) return 0.18;
  if (year === 1863) return 0.25;
  if (year === 1864) return 0.33;
  return 0.40;                  // 1865 — the noose closes
}

/* Per-voyage runner success by year (full schedule). Verified-derived. */
function _blkRunnerSuccess(year) {
  if (year <= 1861) return 0.90;
  if (year === 1862) return 0.82;
  if (year === 1863) return 0.75;
  if (year === 1864) return 0.67;
  return 0.55;
}

/* Runner ports still open by year (full-schedule baseline). Wilmington (the last)
   falls with Fort Fisher, Jan 1865 -> the ocean lifeline is cut. But that is only
   what befalls a LOSING South: a winning or fortified South holds its ports (§5). */
function _blkPortsByYear(year, mom, fortified) {
  var base = (year >= 1865) ? 0 : (year === 1864) ? 2 : 4;   // Wilmington/Charleston/Mobile/Galveston
  if ((typeof mom === "number" && mom >= 0.6) || fortified) base = Math.max(base, (year >= 1865) ? 2 : 4);
  return base;
}

function _blkPush(C, line) {
  try {
    if (!C.blockade.log) C.blockade.log = [];
    C.blockade.log.unshift(line);
    if (C.blockade.log.length > 6) C.blockade.log.length = 6;
  } catch (e) {}
}

/* ---- blockadeInit: idempotent; seeds C.blockade. CS carries the cotton model;
   the US side carries the blockade-as-weapon framing (no cotton, full imports). ---- */
function blockadeInit(C) {
  if (!C) return;
  var side = (C.side === "CS") ? "CS" : "US";
  if (!C.blockade) {
    C.blockade = {
      selfEmbargo: (side === "CS"),     // the 1861 King-Cotton embargo — on by default for CS (historical)
      embargoLifted: false,
      depth: "full",                     // 'full' | 'flat' | 'off' (realism toggle, R14)
      delegated: true,                   // Sec. of State auto-manages diplomacy by default
      cottonStockK: (side === "CS") ? 4000 : 0,   // thousand-bales on hand (4,000k = 4M)
      cottonExportedK: 0,
      cottonRevenueTotal: 0,
      importFactor: (side === "CS") ? 0.85 : 1.0, // small-arms import success (read by prodOnResolve)
      portsOpen: (side === "CS") ? 4 : 0,
      recognition: 0,                    // foreign-recognition pressure mirror (0..100)
      recognitionForeclosed: false,
      lastTurn: null,
      log: []
    };
  }
  var BL = C.blockade;
  if (typeof BL.selfEmbargo !== "boolean") BL.selfEmbargo = (side === "CS");
  if (typeof BL.embargoLifted !== "boolean") BL.embargoLifted = false;
  if (BL.depth !== "full" && BL.depth !== "flat" && BL.depth !== "off") BL.depth = "full";
  if (typeof BL.delegated !== "boolean") BL.delegated = true;
  if (typeof BL.cottonStockK !== "number") BL.cottonStockK = (side === "CS") ? 4000 : 0;
  if (typeof BL.cottonExportedK !== "number") BL.cottonExportedK = 0;
  if (typeof BL.cottonRevenueTotal !== "number") BL.cottonRevenueTotal = 0;
  if (typeof BL.importFactor !== "number") BL.importFactor = (side === "CS") ? 0.85 : 1.0;
  if (typeof BL.portsOpen !== "number") BL.portsOpen = (side === "CS") ? 4 : 0;
  if (typeof BL.recognition !== "number") BL.recognition = 0;
  if (typeof BL.recognitionForeclosed !== "boolean") BL.recognitionForeclosed = false;
  if (!BL.log) BL.log = [];
}

/* ---- blockadeOnResolve: the per-turn cotton/blockade/diplomacy tick.
   Runs AFTER clk/econ/wr and BEFORE prodOnResolve (so the fresh importFactor
   gates CS arms this same turn). Mutates C.blockade, C.funds, C.clock.intervention. ---- */
function blockadeOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  blockadeInit(C);
  try {
    var side = (C.side === "CS") ? "CS" : "US";
    var BL = C.blockade;
    var year = (B && B.bd && typeof B.bd.year === "number") ? B.bd.year
             : (C.clock && typeof C.clock.year === "number") ? C.clock.year
             : (C.president && C.president.date && typeof C.president.date.year === "number") ? C.president.date.year
             : 1861;
    var depth = BL.depth;

    // --- US side: the blockade is a WEAPON, not a cotton lever. No cotton revenue;
    //     full imports; naval dominance + "King Wheat" grain diplomacy suppress the
    //     risk of foreign intervention against the Union over time. ---
    if (side === "US") {
      BL.importFactor = 1.0;
      BL.portsOpen = 0;
      if (depth !== "off" && C.clock && typeof C.clock.intervention === "number" && year >= 1862) {
        C.clock.intervention = Math.max(0, C.clock.intervention - 1.5);  // Anaconda + King Wheat
      }
      BL.lastTurn = { year: year, shippedK: 0, revenue: 0, importFactor: 1.0,
                      capturePct: 0, runnerPct: 100, portsOpen: 0, recognition: 0 };
      return;
    }

    // ===================== Confederate cotton/blockade model =====================
    // Performance + the player's counter-levers (design law §5): a winning or
    // well-prepared South is NOT bound to the historical blockade schedule.
    var mom = (typeof vicMomentum === "function") ? vicMomentum(C) : 0.5;
    var S = C.strategy || {};

    // Resolve the per-voyage odds + open ports under the depth toggle.
    var cp, rs, ports;
    if (depth === "off") { cp = 0.0; rs = 1.0; ports = 4; }
    else if (depth === "flat") { cp = 0.25; rs = 0.75; ports = (year >= 1865 ? 2 : 4); }
    else { cp = _blkCaptureProb(year); rs = _blkRunnerSuccess(year); ports = _blkPortsByYear(year, mom, S.fortifyPorts); }
    if (S.runnerInvestment) rs = Math.min(0.96, rs + 0.15);   // invest in faster, surer runners
    BL.portsOpen = ports;
    var pf = ports / 4;          // port factor (lifeline narrows as ports fall)

    // The 1861 embargo expires by 1862 — the Confederacy's hunger for hard
    // currency overrode "King Cotton" coercion. Auto-lift if the player didn't.
    if (BL.selfEmbargo && !BL.embargoLifted && year >= 1862) {
      BL.embargoLifted = true;
      _blkPush(C, "The cotton embargo collapses — Richmond needs hard currency more than leverage.");
    }
    var embargoActive = BL.selfEmbargo && !BL.embargoLifted;

    // --- Cotton exports + revenue. The embargo throttles exports to ~nothing
    //     (the TRAP: a full treasury of cotton, no cash). Otherwise runner success
    //     x port factor x stock sets what gets through. ---
    var throttle = embargoActive ? 0.03 : 1.0;
    var capacityK = _blkEXPORT_CAP_K * (depth === "off" ? pf : rs * pf) * throttle;
    var shippedK = Math.min(BL.cottonStockK, Math.max(0, capacityK));
    BL.cottonStockK = Math.max(0, BL.cottonStockK - shippedK);
    BL.cottonExportedK += shippedK;
    var revenue = Math.round(shippedK * _blkFUNDS_PER_KBALE);
    BL.cottonRevenueTotal += revenue;
    if (typeof C.funds === "number") C.funds += revenue;

    // --- Small-arms importFactor (the lifeline that 50-production.js reads). The
    //     South imported the majority of its shoulder arms through the runners, so
    //     arms supply tracks the blockade, NOT domestic factories. ---
    var impF;
    if (depth === "off") impF = 1.05;
    else impF = 0.85 * rs * pf;
    BL.importFactor = Math.max(0.2, Math.min(1.1, impF));

    // --- Foreign-recognition pressure (King Cotton diplomacy). Rises with the
    //     Lancashire famine + early battlefield wins; capped by substitution; the
    //     embargo earns NOTHING (Britain resented coercion); FORECLOSED after
    //     Antietam + Emancipation (treat 1863+ as the closed door). ---
    var boost = 0;
    if (!BL.recognitionForeclosed) {
      if (year === 1862) boost += 6;          // Lancashire famine bites (peak winter 1862-63)
      else if (year === 1863) boost += 3;
      else boost += 1;
      if (win && (type === "decisive" || type === "win")) boost += 5;   // battlefield success keeps Europe interested
      if (S.pursueRecognition) boost += 5;                              // active courting of London & Paris
      if (S.commerceRaiders) boost += 1;                               // raiders demonstrate reach
      if (embargoActive) boost = 0;           // the embargo trap: coercion yields no recognition
    }
    var decay = 0.9;                          // Indian/Egyptian/Brazilian substitution erodes leverage
    // Foreclosure after Antietam is the DEFAULT fate — but only of a Confederacy that
    // is losing and not courting Europe. Win, or press the cause, and the window the
    // real CSA lost stays open (§5 alt-history; the 1862 crisis really was that close).
    if (year >= 1863 && !BL.recognitionForeclosed && mom < 0.6 && !S.pursueRecognition) {
      BL.recognitionForeclosed = true;
      _blkPush(C, "Antietam and the Emancipation Proclamation slam the door on recognition.");
    }
    if (BL.recognitionForeclosed) { decay = 0.5; boost = 0; }
    BL.recognition = Math.max(0, Math.min(100, BL.recognition * decay + boost));

    // Interlink: the cotton-diplomacy channel pulls clock.intervention toward the
    // (low, declining) recognition reality — so even CS battlefield wins cannot
    // conjure the intervention King Cotton promised. The teaching trap, mechanized.
    if (C.clock && typeof C.clock.intervention === "number") {
      C.clock.intervention = Math.max(0, Math.min(100,
        C.clock.intervention + (BL.recognition - C.clock.intervention) * 0.30));
    }

    BL.lastTurn = { year: year, shippedK: Math.round(shippedK), revenue: revenue,
                    importFactor: Math.round(BL.importFactor * 100) / 100,
                    capturePct: Math.round(cp * 100), runnerPct: Math.round(rs * 100),
                    portsOpen: ports, recognition: Math.round(BL.recognition) };

    if (embargoActive && year <= 1861) _blkPush(C, "King Cotton withheld — the wharves sit full, the treasury empty.");
    else if (ports === 0) _blkPush(C, "Wilmington falls — the last runner port is closed; the South is sealed.");
    else if (revenue > 0 && shippedK > 0) _blkPush(C, "Runners slip " + Math.round(shippedK) + "k bales past the blockade (+" + revenue + " funds).");
  } catch (e) {}
}

/* Status word + colour for the recognition meter. */
function _blkRecogStatus(BL) {
  if (BL.recognitionForeclosed) return ["Foreclosed", "#7a241b"];
  if (BL.recognition >= 45) return ["Courted", "#4a6b3a"];
  if (BL.recognition >= 20) return ["Wavering", "#b8863b"];
  return ["Distant", "#9c3b2e"];
}

/* Status word for the blockade tightness (capture %). */
function _blkTightStatus(pct) {
  if (pct <= 0) return ["Open seas", "#4a6b3a"];
  if (pct < 18) return ["Porous", "#b8863b"];
  if (pct < 30) return ["Tightening", "#c9712e"];
  return ["Strangling", "#9c3b2e"];
}

/* Pull a teaching card (multi-voice) from GAME_DATA.diplomacy when present. */
function _blkCard(id) {
  try {
    var D = (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.diplomacy) ? GAME_DATA.diplomacy : null;
    if (D && D.teachingCards) {
      for (var i = 0; i < D.teachingCards.length; i++) if (D.teachingCards[i].id === id) return D.teachingCards[i];
    }
  } catch (e) {}
  return null;
}

/* The teaching expander text (R7/R26 — multi-voice when research is on disk; a
   grounded fallback otherwise). */
function _blkWhyText(C) {
  var side = (C && C.side === "CS") ? "CS" : "US";
  var card = _blkCard(side === "CS" ? "cotton-king-chance" : "cotton-blockade-decisive");
  if (card) {
    var sc = function (o) {
      if (!o || !o.scholars || !o.scholars.length) return '';
      var names = o.scholars.slice(0, 2).map(function (s) { return String(s).replace(/\*/g, '').split(/[—(]/)[0].trim(); });
      return ' <span style="opacity:.7">(' + names.join("; ") + ')</span>';
    };
    var out = '<b>' + card.title + '</b><br>';
    if (card.consensus) out += '<b>Consensus:</b> ' + card.consensus.claim + sc(card.consensus) + '<br>';
    if (card.dissent) out += '<b>But some argue:</b> ' + card.dissent.claim + sc(card.dissent) + '<br>';
    if (card.fringe) out += '<span style="opacity:.7"><b>' + (card.fringe.label || 'Fringe') + ':</b> ' + card.fringe.claim + '</span><br>';
    if (card.takeaway) out += '<span style="opacity:.85">' + card.takeaway + '</span> ';
    out += '<span style="opacity:.7">' + (card.provenance || 'Verified') + '.</span>';
    return out;
  }
  if (side === "CS") {
    return '<b>King Cotton was a bluff the South could not back.</b> The Confederacy gambled that cutting off cotton would starve British mills into recognition. '
      + 'But Britain entered 1861 on a record glut (~1M+ surplus bales), India and Egypt ramped supply, and the North\'s grain ("King Wheat") gave London a reason to stay neutral. '
      + 'Frank Owsley framed King Cotton diplomacy as a central Confederate strategy; later scholars (Surdam, Howard Jones) judge it doomed — coercion bred resentment, and Antietam plus Emancipation foreclosed recognition for good. <span style="opacity:.7">Verified.</span>';
  }
  return '<b>The blockade strangled in aggregate.</b> Individual runners usually got through (~5 in 6 early), which long fed a myth that the blockade was a paper one. '
    + 'But David Surdam showed the decisive metric was AGGREGATE: under ~2M bales reached Europe across the whole war versus ~10M+ in peacetime — the Southern export economy collapsed even as ships slipped past. '
    + 'The blockade also deterred big merchantmen and forced cargo into small, low-volume runners. <span style="opacity:.7">Verified.</span>';
}

/* ---- blockadeRenderDiplomacy: the Diplomacy & the Blockade desk tab. ---- */
function blockadeRenderDiplomacy(C) {
  if (!C) return '';
  blockadeInit(C);
  var side = (C.side === "CS") ? "CS" : "US";
  var BL = C.blockade;
  var sec = (side === "CS") ? "Benjamin" : "Seward";
  var lt = BL.lastTurn;

  var depthLabel = { full: "Full strangulation", flat: "Flat modifier", off: "Off" }[BL.depth] || "Full";
  var depthHint = { full: "Year-by-year capture odds, port losses, runner economics (most historical).",
                    flat: "A single steady blockade penalty — less micro.",
                    off: "No blockade — cotton flows freely (sandbox)." }[BL.depth] || "";

  var meter = function (label, v, status) {
    v = Math.max(0, Math.min(100, Math.round(v || 0)));
    return '<div style="margin:5px 0"><div style="display:flex;justify-content:space-between;font-size:12px;opacity:.85"><span>' + label
      + '</span><span style="color:' + status[1] + ';font-weight:bold">' + status[0] + '</span></div>'
      + '<div style="height:8px;background:rgba(0,0,0,.25);border:1px solid var(--rule);border-radius:3px;overflow:hidden">'
      + '<div style="height:100%;width:' + v + '%;background:' + status[1] + '"></div></div></div>';
  };

  var head = ''
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap">'
    +   '<div><div style="font-size:17px;font-weight:bold">Diplomacy &amp; the Blockade</div>'
    +     '<div style="opacity:.75;font-size:12px">Secretary of State ' + sec + (BL.delegated ? ' &mdash; managing foreign affairs' : ' &mdash; awaiting your instruction') + '</div></div>'
    + '</div><hr class="rule">';

  var body;
  if (side === "CS") {
    var tight = _blkTightStatus(lt ? lt.capturePct : Math.round(_blkCaptureProb(C.clock ? C.clock.year : 1861) * 100));
    var recog = _blkRecogStatus(BL);
    body = ''
      + '<div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:2px 0 4px">King Cotton</div>'
      + '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:13px;margin-bottom:6px">'
      +   '<span>Cotton on hand: <b>' + Math.round(BL.cottonStockK) + 'k</b> bales</span><span style="opacity:.5">&middot;</span>'
      +   '<span>Exported: <b>' + Math.round(BL.cottonExportedK) + 'k</b></span><span style="opacity:.5">&middot;</span>'
      +   '<span>Cotton revenue: <b>' + Math.round(BL.cottonRevenueTotal) + '</b></span></div>'
      // self-embargo lever
      + '<div style="margin:8px 0;padding:9px;border:1px solid var(--rule);border-radius:5px;background:rgba(0,0,0,.12)">'
      +   '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">'
      +     '<div><b>The 1861 Cotton Embargo</b><div style="font-size:11px;opacity:.7">Withhold cotton to coerce European recognition.</div></div>'
      +     '<button id="blkEmbargo" type="button" class="upg">' + ((BL.selfEmbargo && !BL.embargoLifted) ? 'Embargo ON' : 'Embargo lifted') + '</button>'
      +   '</div>'
      +   '<div style="font-size:11px;opacity:.7;margin-top:5px;color:' + ((BL.selfEmbargo && !BL.embargoLifted) ? '#c9712e' : 'inherit') + '">'
      +     ((BL.selfEmbargo && !BL.embargoLifted)
            ? 'Warning: Britain holds a cotton glut. The embargo forfeits hard currency and wins no recognition &mdash; a trap.'
            : 'Cotton flows to the runners; the embargo experiment is over.') + '</div>'
      + '</div>'
      + meter('Blockade pressure', lt ? lt.capturePct : 10, tight)
      + meter('Foreign-recognition pressure', BL.recognition, recog)
      + '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;opacity:.85;margin-top:4px">'
      +   '<span>Runner ports open: <b>' + BL.portsOpen + '</b>/4</span><span style="opacity:.5">&middot;</span>'
      +   '<span>Runner success: <b>' + (lt ? lt.runnerPct : 90) + '%</b></span><span style="opacity:.5">&middot;</span>'
      +   '<span>Arms import reliance: <b>' + Math.round(BL.importFactor * 100) + '%</b></span></div>';
    if (lt && lt.shippedK > 0) body += '<div style="font-size:12px;opacity:.8;margin-top:4px">Last quarter: <b>' + lt.shippedK + 'k</b> bales run out, <b>+' + lt.revenue + '</b> funds earned.</div>';
    else if (lt) body += '<div style="font-size:12px;opacity:.8;margin-top:4px">Last quarter: no cotton reached Europe.</div>';
  } else {
    body = ''
      + '<div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:2px 0 4px">The Anaconda</div>'
      + '<p class="lede" style="font-size:13px">The Union\'s strategy is strangulation: blockade every Southern port, deny the Confederacy its cotton revenue and imported arms, '
      + 'and use Northern grain (&ldquo;King Wheat&rdquo;) to keep Britain neutral. Each season the noose tightens and the chance of foreign intervention falls.</p>'
      + meter('Foreign-intervention risk', (C.clock ? C.clock.intervention : 8), _blkTightStatus(C.clock ? C.clock.intervention : 8))
      + '<p class="lede" style="font-size:12px;opacity:.7;margin-top:6px">Capturing Southern ports (Wilmington, Charleston, Mobile) severs blockade-runner lifelines outright.</p>';
  }

  var depthRow = ''
    + '<hr class="rule"><div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:2px 0 4px">Blockade model (realism)</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">'
    +   '<div><b>' + depthLabel + '</b><div style="font-size:11px;opacity:.7">' + depthHint + '</div></div>'
    +   '<button id="blkDepth" type="button" class="upg">Change</button>'
    + '</div>';

  var btns = ''
    + '<div class="btn-row" style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">'
    +   '<button id="blkDelegate" type="button" class="upg">' + (BL.delegated ? 'Take personal control' : 'Delegate to Sec. ' + sec) + '</button>'
    +   '<button id="blkWhy" type="button" class="upg">Why it mattered</button>'
    + '</div>'
    + '<div id="blkWhyBox" style="display:none;margin-top:10px;padding:10px;border:1px solid var(--rule);border-radius:5px;background:rgba(0,0,0,.12);font-size:12px;line-height:1.5"></div>';

  return head + body + depthRow + btns;
}

/* ---- blockadeWireDiplomacy: embargo toggle, depth cycle, delegate, teaching. ---- */
function blockadeWireDiplomacy(C) {
  if (!C || !C.blockade) return;
  var BL = C.blockade;
  var emb = document.getElementById("blkEmbargo");
  if (emb) emb.addEventListener("click", function () {
    if (BL.selfEmbargo && !BL.embargoLifted) { BL.embargoLifted = true; }
    else { BL.selfEmbargo = true; BL.embargoLifted = false; }
    if (typeof saveLocal === "function") saveLocal();
    if (typeof _wdRefresh === "function") _wdRefresh();
  });
  var dep = document.getElementById("blkDepth");
  if (dep) dep.addEventListener("click", function () {
    BL.depth = (BL.depth === "full") ? "flat" : (BL.depth === "flat") ? "off" : "full";
    if (typeof saveLocal === "function") saveLocal();
    if (typeof _wdRefresh === "function") _wdRefresh();
  });
  var del = document.getElementById("blkDelegate");
  if (del) del.addEventListener("click", function () {
    BL.delegated = !BL.delegated;
    if (typeof saveLocal === "function") saveLocal();
    if (typeof _wdRefresh === "function") _wdRefresh();
  });
  var why = document.getElementById("blkWhy");
  if (why) why.addEventListener("click", function () {
    var box = document.getElementById("blkWhyBox");
    if (!box) return;
    if (box.style.display === "none") { box.innerHTML = _blkWhyText(C); box.style.display = "block"; }
    else box.style.display = "none";
  });
}


/* ===== module: 70-manpower.js ===== */
/* ===========================================================================
   S1d · 70-manpower.js — manpower, conscription & the replacement-ratio collapse.

   The lever that ENDS the war (data/economy.json -> GAME_DATA.economy.manpower).
   Models the decisive demographic asymmetry: the Union draws on a deep, refillable
   pool (4M mobilizable + ~25% foreign-born immigration + the ~180k USCT pool the
   Emancipation Proclamation unlocks from the South's OWN labor base) and REPLACES
   its casualties to the end; the Confederacy (1M white military pop, no immigrant
   inflow, and unable to arm the 3.5M enslaved without dissolving its own war aim)
   sees its REPLACEMENT RATIO collapse from ~0.9 early to ~0.1 by 1865 — its armies
   melt away while the Union's stay full. Emergent from the real pools, not scripted.

   The Union draft (Enrollment Act 1863) is modeled as a COERCIVE STIMULUS to
   volunteering/bounties (only ~6% of Union soldiers were direct draftees), NOT a
   direct manpower source; CS conscription (Apr 1862, a year earlier) is structurally
   load-bearing, its widening age band (18-35 -> 17-50) a visible crisis 'tell'.

   Adds C.manpower (sibling state). manpowerInit / manpowerOnResolve (tick — reads
   B.casualties + the year; runs after prod) / presManpowerBlock (overview fragment,
   "The Ranks", rendered in the War Effort tab beside production). C.manpower.strength
   (0-100) is the army-strength index the S5 pre-battle bridge will read.

   Bare-name globals (G, GAME_DATA); _mp* unique helpers; render never mutates/saves;
   the tick mutates C.manpower + (interlink) C.clock.weariness when the ranks thin.
   =========================================================================== */

var _mpATTR_COEFF = 3.5;   // strength-points lost per thousand casualties
var _mpATTR_MAX   = 14;    // per-turn attrition clamp

function _mpCfg(side) {
  var M = (typeof GAME_DATA !== "undefined" && GAME_DATA && GAME_DATA.economy && GAME_DATA.economy.manpower) ? GAME_DATA.economy.manpower : null;
  var d = {
    US: { pool: 4000, ceiling: 2129, immigrant: 350, usct: 180 },
    CS: { pool: 1000, ceiling: 850,  immigrant: 0,   usct: 0 }
  };
  var base = d[side] || d.US;
  if (M) {
    try {
      var sm = M.startingManpoolThousands;
      if (sm) { if (side === "US" && typeof sm.US === "number") base.pool = sm.US; else if (side === "CS" && typeof sm.CS_white === "number") base.pool = sm.CS_white; }
      var ce = M.cumulativeEnlistmentCeilingThousands;
      if (ce && typeof ce[side] === "number") base.ceiling = ce[side];
      var us = M.levers && M.levers.usctUnlock && M.levers.usctUnlock.US;
      if (side === "US" && us && typeof us.newManpoolThousands === "number") base.usct = us.newManpoolThousands;
      var im = M.immigrantPool && M.immigrantPool.US;
      if (side === "US" && im) { var g = im.germanBornThousands || 0, ir = im.irishBornThousands || 0; if (g + ir > 0) base.immigrant = g + ir; }
    } catch (e) {}
  }
  return base;
}

/* Replacement ratio (replacements per casualty) by side. The US replaces fully.
   The CS curve is PERFORMANCE-DRIVEN, not scripted (design law §5): the year sets a
   "if you are losing" FLOOR (the historical doom of a Confederacy that loses), and
   war momentum lifts it toward full replacement — a WINNING South keeps its armies
   filled. Arming the enslaved (Cleburne's path) raises it further. */
function _mpReplacementRatio(side, year, mom, armed) {
  if (side === "US") return 1.0;
  var floor = (year <= 1862) ? 0.9 : (year === 1863) ? 0.55 : (year === 1864) ? 0.35 : 0.18;
  var m = (typeof mom === "number") ? mom : 0.5;
  var eff = floor + (0.95 - floor) * m;     // momentum lifts the floor toward near-full replacement
  if (armed) eff = Math.min(0.95, eff + 0.30);
  return Math.max(0, Math.min(0.95, eff));
}

function _mpPush(C, line) {
  try {
    if (!C.manpower.log) C.manpower.log = [];
    C.manpower.log.unshift(line);
    if (C.manpower.log.length > 6) C.manpower.log.length = 6;
  } catch (e) {}
}

function manpowerInit(C) {
  if (!C) return;
  var side = (C.side === "CS") ? "CS" : "US";
  var cfg = _mpCfg(side);
  if (!C.manpower) {
    C.manpower = {
      pool: cfg.pool,               // thousand-men mobilizable reserve remaining
      enlisted: 0,                  // cumulative enlisted (thousand-men)
      strength: 100,                // army-strength index (the S5 bridge input)
      draftActive: false,           // conscription enacted
      usctUnlocked: false,          // US: Emancipation unlocks the USCT pool
      immigrantPool: cfg.immigrant, // foreign-born inflow remaining (US)
      replacementRatio: (side === "CS") ? 0.9 : 1.0,
      desertionTotal: 0,            // thousand-men deserted (CS rising)
      ageBand: (side === "CS") ? "18-35" : "20-45",
      delegated: true,              // Sec. of War manages recruitment by default
      armedApplied: false,          // one-time flag: the arm-the-enslaved pool surge
      lastTurn: null,
      log: []
    };
  }
  var P = C.manpower;
  if (typeof P.pool !== "number") P.pool = cfg.pool;
  if (typeof P.enlisted !== "number") P.enlisted = 0;
  if (typeof P.strength !== "number") P.strength = 100;
  if (typeof P.draftActive !== "boolean") P.draftActive = false;
  if (typeof P.usctUnlocked !== "boolean") P.usctUnlocked = false;
  if (typeof P.immigrantPool !== "number") P.immigrantPool = cfg.immigrant;
  if (typeof P.replacementRatio !== "number") P.replacementRatio = (side === "CS") ? 0.9 : 1.0;
  if (typeof P.desertionTotal !== "number") P.desertionTotal = 0;
  if (typeof P.ageBand !== "string") P.ageBand = (side === "CS") ? "18-35" : "20-45";
  if (typeof P.delegated !== "boolean") P.delegated = true;
  if (typeof P.armedApplied !== "boolean") P.armedApplied = false;
  if (!P.log) P.log = [];
}

/* ---- manpowerOnResolve: the per-turn recruitment + attrition tick. Reads
   B.casualties + the year; mutates C.manpower + (interlink) C.clock.weariness. ---- */
function manpowerOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  manpowerInit(C);
  try {
    var side = (C.side === "CS") ? "CS" : "US";
    var cfg = _mpCfg(side);
    var P = C.manpower;
    var year = (B && B.bd && typeof B.bd.year === "number") ? B.bd.year
             : (C.clock && typeof C.clock.year === "number") ? C.clock.year
             : (C.president && C.president.date && typeof C.president.date.year === "number") ? C.president.date.year
             : 1861;

    // Conscription events (historical timing). US 1863 = a stimulus; CS 1862 = load-bearing.
    if (!P.draftActive) {
      if (side === "US" && year >= 1863) { P.draftActive = true; P.ageBand = "20-45"; _mpPush(C, "The Enrollment Act takes effect — the draft spurs volunteering and bounties."); }
      else if (side === "CS" && year >= 1862) { P.draftActive = true; _mpPush(C, "Conscription begins — the first national draft in American history stems the bleed."); }
    }
    if (side === "CS") P.ageBand = (year >= 1864) ? "17-50" : (year >= 1862 ? "18-35" : "18-35");

    // USCT unlock (US, Emancipation 1863): a NEW pool from the South's own labor base.
    if (side === "US" && !P.usctUnlocked && year >= 1863) {
      P.usctUnlocked = true;
      P.pool += cfg.usct;           // ~180k added
      _mpPush(C, "Emancipation organizes the USCT — ~180,000 men join from the South's labor base.");
    }

    // Confederate emancipation (the player's Cleburne lever, C.strategy.armEnslaved):
    // a vast new pool from the South's OWN people — the boldest divergence.
    if (side === "CS" && C.strategy && C.strategy.armEnslaved && !P.armedApplied) {
      P.armedApplied = true;
      P.pool += 600;
      _mpPush(C, "Black Confederate regiments form — the ranks swell from an unthinkable source.");
    }

    // --- Recruitment inflow this turn (thousand-men), drawn from the pool ---
    var volunteer;
    if (side === "US") {
      volunteer = 70;                                  // deep + sustainable
      if (P.draftActive) volunteer *= 1.2;             // draft-as-stimulus
      var imm = Math.min(22, P.immigrantPool); P.immigrantPool = Math.max(0, P.immigrantPool - imm);
      volunteer += imm;                                // ~25% foreign-born
      if (P.usctUnlocked) volunteer += 15;             // USCT inflow
    } else {
      volunteer = (year <= 1861) ? 85 : (P.draftActive ? 38 : 16);   // CS curve falls first
    }
    var recruitsK = Math.min(P.pool, Math.max(0, volunteer));
    P.pool = Math.max(0, P.pool - recruitsK);
    P.enlisted += recruitsK;

    // --- Attrition + replacement (the decisive asymmetry — now PERFORMANCE-driven) ---
    var mom = (typeof vicMomentum === "function") ? vicMomentum(C) : 0.5;
    var armed = !!(C.strategy && C.strategy.armEnslaved);
    var casK = (B && B.casualties && side) ? (B.casualties[side] || 0) / 1000 : 0;
    var attr = Math.min(_mpATTR_MAX, casK * _mpATTR_COEFF);
    var ratio = _mpReplacementRatio(side, year, mom, armed);
    P.replacementRatio = ratio;
    var poolFactor = (P.pool > 50) ? 1 : (P.pool / 50) * 0.6 + 0.1;   // an empty reserve cannot replace
    var replenish = attr * ratio * poolFactor;
    P.strength = Math.max(5, Math.min(100, P.strength - attr + replenish));

    // Desertion (CS) is PERFORMANCE-driven: a WINNING South does not bleed deserters
    // (design law §5 / Aaron). Losing + a weary home front drives men from the ranks;
    // a deserter amnesty (C.strategy.amnesty) stems it.
    if (side === "CS") {
      var amnesty = (C.strategy && C.strategy.amnesty) ? 0.45 : 1;
      var desert = Math.max(0, Math.round(Math.pow(1 - mom, 1.6) * 16 * amnesty));
      P.desertionTotal += desert;
      P.pool = Math.max(0, P.pool - desert * 0.5);
    }

    // Interlink: thinning ranks depress the home front (additive to inflation/hunger).
    if (side === "CS" && C.clock && typeof C.clock.weariness === "number" && P.strength < 45) {
      C.clock.weariness = Math.min(100, C.clock.weariness + (45 - P.strength) * 0.06);
    }

    P.lastTurn = { year: year, strength: Math.round(P.strength), pool: Math.round(P.pool),
                   ratio: Math.round(ratio * 100) / 100, recruits: Math.round(recruitsK),
                   enlisted: Math.round(P.enlisted), draft: P.draftActive, usct: P.usctUnlocked,
                   ageBand: P.ageBand, desertion: Math.round(P.desertionTotal) };

    if (side === "CS" && P.strength < 40) _mpPush(C, "The ranks thin — casualties outrun every replacement the South can find.");
    else if (side === "US" && P.usctUnlocked && P.strength >= 80) _mpPush(C, "The armies refill from a deep well — volunteers, immigrants, and freedmen.");
  } catch (e) {}
}

/* Status word for the army-strength index. */
function _mpStrengthStatus(v) {
  if (v >= 85) return ["At full strength", "#4a6b3a"];
  if (v >= 60) return ["Holding", "#b8863b"];
  if (v >= 35) return ["Thinning", "#c9712e"];
  return ["Melting away", "#9c3b2e"];
}

/* Pull a teaching card from GAME_DATA["manpower-teaching"] when present. */
function _mpCard(id) {
  try {
    var D = (typeof GAME_DATA !== "undefined" && GAME_DATA) ? GAME_DATA["manpower-teaching"] : null;
    if (D && D.teachingCards) {
      for (var i = 0; i < D.teachingCards.length; i++) if (D.teachingCards[i].id === id) return D.teachingCards[i];
    }
  } catch (e) {}
  return null;
}

/* Ambient one-line teaching note (R26), card-aware when research is on disk. */
function _mpWhyText(C) {
  var side = (C && C.side === "CS") ? "CS" : "US";
  var card = _mpCard(side === "CS" ? "mp-arm-the-enslaved" : "mp-demographic-superiority");
  if (card && card.takeaway) return card.takeaway;
  if (side === "CS") return "The South could not replace its dead. With no immigration and 3.5M enslaved it would not arm, every casualty was permanent — the replacement ratio fell toward 0.1 by 1865.";
  return "The Union out-manned the South ~4:1 in free population, refilled its armies from immigration and the ~180,000 USCT, and replaced casualties the Confederacy never could.";
}

/* ---- presManpowerBlock: "The Ranks" — overview fragment for the War Effort tab. ---- */
function presManpowerBlock(C) {
  if (!C || !C.manpower) return '';
  var side = (C.side === "CS") ? "CS" : "US";
  var P = C.manpower, ss = _mpStrengthStatus(P.strength);
  var lt = P.lastTurn;
  var bar = function (label, v, col) {
    v = Math.max(0, Math.min(100, Math.round(v)));
    return '<div style="margin:4px 0"><div style="display:flex;justify-content:space-between;font-size:12px;opacity:.8"><span>' + label + '</span><span>' + v + '</span></div>'
      + '<div style="height:7px;background:rgba(0,0,0,.25);border:1px solid var(--rule);border-radius:3px;overflow:hidden"><div style="height:100%;width:' + v + '%;background:' + col + '"></div></div></div>';
  };
  var ratioPct = Math.round(P.replacementRatio * 100);
  var out = '<hr class="rule"><div class="gn-col-head" style="font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--rule);margin:2px 0 4px">The Ranks &mdash; Manpower &amp; Conscription</div>'
    + '<div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:13px">Army strength</span>'
    + '<span style="font-weight:bold;color:' + ss[1] + '">' + Math.round(P.strength) + ' &middot; ' + ss[0] + '</span></div>'
    + bar('Casualty replacement', ratioPct, ratioPct > 70 ? '#4a6b3a' : ratioPct > 35 ? '#b8863b' : '#9c3b2e')
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12px;opacity:.85;margin-top:3px">'
    +   '<span>Manpool: <b>' + Math.round(P.pool) + 'k</b></span><span style="opacity:.5">&middot;</span>'
    +   '<span>Enlisted: <b>' + Math.round(P.enlisted) + 'k</b></span><span style="opacity:.5">&middot;</span>'
    +   '<span>Draft: <b>' + (P.draftActive ? 'Active (' + P.ageBand + ')' : 'Volunteers only') + '</b></span>'
    +   (side === "US" ? ('<span style="opacity:.5">&middot;</span><span>USCT: <b>' + (P.usctUnlocked ? 'Organized' : 'Not yet') + '</b></span>')
                       : ('<span style="opacity:.5">&middot;</span><span>Desertion: <b>' + Math.round(P.desertionTotal) + 'k</b></span>'))
    + '</div>';
  if (lt) out += '<div style="font-size:12px;opacity:.8;margin-top:3px">Last quarter: <b>' + lt.recruits + 'k</b> recruited; ' + (P.replacementRatio < 0.5 ? '<span style="color:#9c3b2e">losses outrun replacements.</span>' : 'the ranks hold.') + '</div>';
  out += '<div style="font-size:11px;opacity:.62;margin-top:4px;font-style:italic">' + _mpWhyText(C) + '</div>';
  return out;
}


/* ===== module: 80-victory.js ===== */
/* ===========================================================================
   S1e · 80-victory.js — Paths to Victory + war momentum (the "you can win" layer).

   THE DESIGN-LAW CORRECTION (Aaron, run i): the asymmetric pressures S1c/S1d built
   were keyed to the CALENDAR (replacement ratio by year, recognition foreclosed at
   1863, ports fall on schedule) — which made Southern defeat feel SCRIPTED. The law
   is the opposite: §5 outcomes are DETERMINISTIC BY PLAYER PERFORMANCE (history is
   the favored "par", not a rail); §8 the South wins by NOT LOSING; §29 a fair
   sandbox. So this module computes a WAR-MOMENTUM signal and the S1c/S1d ticks now
   read it: WIN and the death spiral does not happen (desertion stops, the ranks
   refill, the ports hold, recognition stays open). History is only what you get if
   you play like the doomed Confederacy.

   It also gives the player EXECUTABLE avenues to victory — a Paths-to-Victory desk
   tab with live progress + Southern counter-levers (counter the blockade with
   raiders/runners/fortified ports; arm the enslaved — Cleburne's path; pursue
   recognition; deserter amnesty) and ahistorical WILD CARDS (provoke the Trent
   crisis) — so a Southern player can win, the alt-history way (§5 tiered divergence).

   Adds C.strategy (sibling state) + vicMomentum(C) (read by blockade/manpower).
   vicInit / vicOnResolve (tracks the enemy's WILL — break it → negotiated-peace
   victory — applies lever upkeep, detects victoryReady) / vicRenderPaths / vicWirePaths.

   Bare-name globals (G); vic-prefixed helpers; render never mutates or saves; the
   tick mutates C.strategy + C.funds and clock (lever costs) only.
   =========================================================================== */

/* ---- vicMomentum: the player side's WAR FORTUNES, 0 (losing) .. 1 (winning).
   The single performance signal the S1c/S1d pressures key off. Blends cumulative
   win-rate, home-front will (inverse weariness), and political capital. ---- */
function vicMomentum(C) {
  try {
    if (!C) return 0.5;
    var st = C.stats || {};
    var battles = st.battles || 0, won = st.won || 0;
    var winRate = battles > 0 ? (won / battles) : 0.5;
    var clk = C.clock || {};
    var weary = (typeof clk.weariness === "number") ? clk.weariness : 30;
    var cap = (typeof clk.capital === "number") ? clk.capital : 0;
    var willHold = 1 - Math.max(0, Math.min(1, weary / 100));
    var capF = Math.max(0, Math.min(1, cap / 120));
    return Math.max(0, Math.min(1, 0.55 * winRate + 0.30 * willHold + 0.15 * capF));
  } catch (e) { return 0.5; }
}

function _vicPush(C, line) {
  try {
    if (!C.strategy.log) C.strategy.log = [];
    C.strategy.log.unshift(line);
    if (C.strategy.log.length > 6) C.strategy.log.length = 6;
  } catch (e) {}
}

/* ---- vicInit: idempotent; seeds C.strategy (levers + the enemy-will tracker). ---- */
function vicInit(C) {
  if (!C) return;
  var side = (C.side === "CS") ? "CS" : "US";
  if (!C.strategy) {
    C.strategy = {
      enemyWill: (side === "CS") ? 72 : 70,   // the OPPONENT's resolve (0..100). Break it → negotiated peace.
      // executable levers (mostly the Southern counter-game; the US gets the mirror):
      runnerInvestment: false,   // counter the blockade (funds upkeep → +importFactor, slower port loss)
      commerceRaiders: false,    // CSS Alabama — pressure enemy shipping/will (funds upkeep)
      pursueRecognition: false,  // spend political capital to keep the recognition window open
      fortifyPorts: false,       // hold the runner ports past their historical fall
      armEnslaved: false,        // Cleburne's path — a manpool surge at the cost of the war aim (1863+)
      amnesty: false,            // deserter amnesty (reduce desertion)
      trentAvailable: false,     // (legacy) — Trent is now in the wild-card catalog
      trentProvoked: false,
      armEnslavedShock: false,   // one-time legitimacy shock applied flag
      wildsPlayed: [],           // ids of alternate-history wild cards already engaged
      victoryReady: null,        // a path that has reached its win threshold (display + S5 hook)
      log: []
    };
  }
  var S = C.strategy;
  if (typeof S.enemyWill !== "number") S.enemyWill = (side === "CS") ? 72 : 70;
  var bools = ["runnerInvestment", "commerceRaiders", "pursueRecognition", "fortifyPorts", "armEnslaved", "amnesty", "trentAvailable", "trentProvoked", "armEnslavedShock"];
  for (var i = 0; i < bools.length; i++) if (typeof S[bools[i]] !== "boolean") S[bools[i]] = false;
  if (!Array.isArray(S.wildsPlayed)) S.wildsPlayed = [];
  if (typeof S.victoryReady === "undefined") S.victoryReady = null;
  if (!S.log) S.log = [];
}

/* ---- vicOnResolve: runs LAST in the tick. Updates the enemy's will from the
   battle result + raiders + slow war-weariness, charges lever upkeep, and detects
   a reachable victory path. Mutates C.strategy + C.funds/clock only. ---- */
function vicOnResolve(winnerSide, type, B, C, win) {
  if (!C) return;
  vicInit(C);
  try {
    var side = (C.side === "CS") ? "CS" : "US";
    var S = C.strategy;
    var year = (B && B.bd && typeof B.bd.year === "number") ? B.bd.year : (C.clock && C.clock.year) || 1861;

    // Lever upkeep — real trade-offs (paid each turn the lever is active).
    if (typeof C.funds === "number") {
      if (S.runnerInvestment) C.funds = Math.max(0, C.funds - 40);
      if (S.commerceRaiders) C.funds = Math.max(0, C.funds - 30);
    }
    if (S.pursueRecognition && C.clock && typeof C.clock.capital === "number") {
      C.clock.capital = Math.max(0, C.clock.capital - 6);
    }

    // The enemy's WILL to keep fighting. WINNING the war breaks it (the primary
    // Southern path); losing restores it; the long war erodes it slowly; raiders
    // and home-front pressure chip at it. This is performance-driven, not scripted.
    var d = 0;
    if (win) d -= (type === "decisive") ? 8 : 5;
    else if (type === "draw") d += 1;
    else d += 3;                                  // a Union win stiffens Northern resolve
    d -= 0.6;                                      // attrition: every season of war wearies the enemy a little
    if (S.commerceRaiders) d -= 1.2;               // commerce raiding bites the enemy's commerce + patience
    var cas = (B && B.casualties && B.enemySide) ? (B.casualties[B.enemySide] || 0) : 0;
    d -= Math.min(3, cas / 1500);                  // inflicting casualties wears the enemy down
    S.enemyWill = Math.max(0, Math.min(100, S.enemyWill + d));

    // One-time legitimacy shock when the South arms the enslaved (the contradiction).
    if (S.armEnslaved && !S.armEnslavedShock) {
      S.armEnslavedShock = true;
      if (C.clock && typeof C.clock.weariness === "number") C.clock.weariness = Math.min(100, C.clock.weariness + 6);
      _vicPush(C, "The Confederacy arms the enslaved — a new army at the price of its founding creed.");
    }

    // Wild card: the Trent crisis is provokable only early (1861-62), before it defused.
    S.trentAvailable = (side === "CS" && year <= 1862 && !S.trentProvoked);

    // Detect a reachable victory path (display + the S5 win hook).
    var mom = vicMomentum(C);
    var recog = (C.blockade && typeof C.blockade.recognition === "number") ? C.blockade.recognition : 0;
    var prevReady = S.victoryReady;
    S.victoryReady = null;
    if (S.enemyWill <= 30 && year >= 1864) S.victoryReady = "will";        // negotiated peace
    else if (recog >= 60) S.victoryReady = "recognition";
    else if (S.enemyWill <= 18) S.victoryReady = "will";                   // total collapse of enemy resolve, any year
    if (S.victoryReady && S.victoryReady !== prevReady) {
      _vicPush(C, S.victoryReady === "recognition"
        ? "Europe moves toward recognition — independence is within reach."
        : "Northern resolve is breaking — a negotiated peace is within reach.");
    }
  } catch (e) {}
}

/* Status word for a 0..1 momentum. */
function _vicMomWord(m) {
  if (m >= 0.66) return ["Winning the war", "#4a6b3a"];
  if (m >= 0.45) return ["Holding on", "#b8863b"];
  if (m >= 0.28) return ["Losing ground", "#c9712e"];
  return ["On the brink", "#9c3b2e"];
}

/* ---- The WILD-CARD CATALOG (R32/§5 alternate history) — ahistorical gambits for

/* Apply a wild card's mechanical effect. The single place effects live. */
function _vicApplyWild(C, id) {
  var S = C.strategy, BL = C.blockade || {}, M = C.manpower || {}, clk = C.clock || {};
  var mom = vicMomentum(C);
  var bump = function (k, v, cap) { if (typeof M[k] === "number") M[k] = Math.min(cap || 100, M[k] + v); };
  switch (id) {
    // Confederate
    case "cs-trent": BL.recognition = Math.min(100, (BL.recognition || 0) + 35); BL.recognitionForeclosed = false; S.enemyWill = Math.max(0, S.enemyWill - 12); break;
    case "cs-invade-north": S.enemyWill = Math.max(0, S.enemyWill - 15); if (typeof clk.weariness === "number") clk.weariness = Math.min(100, clk.weariness + 5); break;
    case "cs-cotton-inferno": BL.recognition = Math.min(100, (BL.recognition || 0) + 18); if (typeof BL.cottonStockK === "number") BL.cottonStockK = Math.round(BL.cottonStockK * 0.3); break;
    case "cs-cleburne": S.armEnslaved = true; break;
    case "cs-repeaters": bump("strength", 12); if (typeof BL.importFactor === "number") BL.importFactor = Math.min(1.1, BL.importFactor + 0.1); break;
    case "cs-copperhead": S.enemyWill = Math.max(0, S.enemyWill - 22); break;
    case "cs-hunley": S.fortifyPorts = true; if (typeof BL.importFactor === "number") BL.importFactor = Math.min(1.1, BL.importFactor + 0.15); break;
    case "cs-maximilian": S.enemyWill = Math.max(0, S.enemyWill - 25); BL.recognition = 85; BL.recognitionForeclosed = false; break;
    case "cs-stonewall": bump("strength", 15); S.enemyWill = Math.max(0, S.enemyWill - 10); break;
    case "cs-decapitation":
      if (mom >= 0.5) { S.enemyWill = Math.max(0, S.enemyWill - 30); _vicPush(C, "The decapitation strike lands — the Union government reels into chaos."); }
      else { S.enemyWill = Math.min(100, S.enemyWill + 12); if (typeof clk.weariness === "number") clk.weariness = Math.min(100, clk.weariness + 10); _vicPush(C, "The plot is exposed — the North rallies in fury."); }
      break;
    case "cs-gold": if (typeof C.funds === "number") C.funds += 4000; break;
    // Union
    case "us-hardwar": S.enemyWill = Math.max(0, S.enemyWill - 18); break;
    case "us-radical-emanc": M.usctUnlocked = true; if (typeof M.pool === "number") M.pool += 200; S.enemyWill = Math.max(0, S.enemyWill - 8); break;
    case "us-anaconda": S.enemyWill = Math.max(0, S.enemyWill - 12); break;
    case "us-repeaters": bump("strength", 14); break;
    case "us-grant": S.enemyWill = Math.max(0, S.enemyWill - 14); bump("strength", 6); break;
    case "us-greenback": if (typeof C.funds === "number") C.funds += 4000; break;
    case "us-gatling": bump("strength", 16); break;
    case "us-russian": S.enemyWill = Math.max(0, S.enemyWill - 15); break;
    case "us-railart": bump("strength", 12); S.enemyWill = Math.max(0, S.enemyWill - 8); break;
    case "us-genstrike": S.enemyWill = Math.max(0, S.enemyWill - 25); if (typeof M.pool === "number") M.pool += 250; M.usctUnlocked = true; break;
  }
}

/* Render the side's available wild cards, grouped by plausibility tier. */

  var year = (C.clock && C.clock.year) || (C.president && C.president.date && C.president.date.year) || 1861;
  var tiers = [["plausible", "Plausible — actively debated", "#4a6b3a"], ["longshot", "Long shot — documented but improbable", "#b8863b"], ["fantastical", "Fantastical — video-game wild", "#9c3b2e"]];

    + '<div style="font-size:11px;opacity:.65;margin-bottom:2px">Ahistorical gambits. Some plausible, some preposterous &mdash; the war is yours to bend.</div>';
