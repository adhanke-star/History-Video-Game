// ---- Derive dateline year from campaign state ----
// Returns the year (as string) of the NEXT upcoming chain battle,
// or "1861" if no campaign is active.
function _gorDatelineYear() {
  try {
    var C = G.campaign;
    if (!C) return "1861";
    var chain = CHAINS[C.side];
    if (!chain) return "1861";
    var idx = typeof C.idx === "number" ? C.idx : 0;
    // Clamp to chain bounds
    if (idx >= chain.length) {
      // Campaign complete — use year of final battle
      idx = chain.length - 1;
    }
    var battleId = chain[idx];
    var bd = BATTLES.find(function (b) { return b.id === battleId; });
    return bd ? String(bd.year) : "1861";
  } catch (e) {
    return "1861";
  }
}

/* ==== §22 — PORTRAIT ENGRAVINGS (G6) ==== */

(function () {
  // ---- Internal seeded-RNG from mulberry + hashStr (engine-defined) ----
  // mulberry(seed) and hashStr(s) are guaranteed present at integration time.
  // We call them directly — no fallback needed (G-wave rule: splice before __ENGINE_END__).

  // ---- Portrait cache (Map, cap 96, LRU-eviction via insertion order) ----
  const _CACHE = new Map(); // key → dataURL
  const _CACHE_MAX = 96;

  function _cacheGet(key) {
    if (!_CACHE.has(key)) return null;
    // Refresh insertion order for LRU
    const v = _CACHE.get(key);
    _CACHE.delete(key);
    _CACHE.set(key, v);
    return v;
  }

  function _cacheSet(key, val) {
    if (_CACHE.size >= _CACHE_MAX) {
      // Evict oldest (first inserted key)
      _CACHE.delete(_CACHE.keys().next().value);
    }
    _CACHE.set(key, val);
  }

  // ---- Colour constants: sepia ink on parchment ----
  // Parchment ground
  const PARCH_LIGHT  = "#f2e8ce";
  const PARCH_BASE   = "#e8dcc0";
  const PARCH_DARK   = "#d8c9a4";
  // Ink family (#3a2c1c)
  const INK_DARK     = "#1e1510";
  const INK_BASE     = "#3a2c1c";
  const INK_MID      = "#5a4030";
  const INK_LIGHT    = "#7a5a40";
  // Brass border
  const BRASS        = "#9c7a3c";
  const BRASS_LT     = "#c9a85f";
  // Tintype plate
  const TINT_DARK    = "#1a1410";
  const TINT_MID     = "#2e2416";

  // ---- Canvas dimensions ----
  const W = 96, H = 120;
  // Portrait oval centre and radii
  const OX = W / 2, OY = 56;
  const ORX = 40, ORY = 50;

  // ===== PD-PHOTO LAYER (run-h item 2) — real public-domain portraits override the engraving =====
  // PHOTO_MANIFEST = keys for which assets/portraits/<key>.jpg exists (downloaded PD Brady/LoC
  // photos + period engravings, Commons-license-gated to public domain). _warmPhotos() loads each,
  // frames it in a period brass mount, and caches the dataURL so portraitFor() can return it
  // SYNCHRONOUSLY. Same-origin files keep the canvas untainted. Lookup tries "<lastname>_<side>"
  // then "<lastname>" (only Anderson/Gregg differ by side). Late loads swap into visible badges.
  const PHOTO_MANIFEST = [
    "anderson_cs","anderson_us","ayres","banks","barlow","barrett","beauregard","birney",
    "blunt","bowen","bragg","breckinridge","buchanan","buell","buford","burnside",
    "canby","churchill","corse","crawford","crittenden","curtis","custer","devens",
    "dhhill","doubleday","dowling","early","evans","ewell","farragut","finegan",
    "fitzhughlee","floyd","ford","forrest","fremont","french","gardner","geary",
    "getty","gibbon","gordon","grant","gregg_cs","gregg_us","hampton","hancock",
    "hardee","hays","heth","hill","hindman","hood","hooker","howard",
    "humphreys","hunter","imboden","jackson","johnson","johnston","jones","kenly",
    "kershaw","kilpatrick","lamb","law","lee","longstreet","lyon","mackall",
    "magruder","mahone","mcclellan","mcclernand","mcculloch","mcdowell","mclaws","mcpherson",
    "meade","merritt","miles","milroy","newton","parke","pemberton","pender",
    "pickett","pleasonton","pope","porter","price","ramseur","reynolds","ricketts",
    "rodes","rosecrans","schofield","schurz","scurry","sedgwick","seymour","sheridan",
    "sherman","shields","sibley","sickles","sigel","slocum","slough","stevens",
    "stone","stuart","sturgis","sykes","taylor","terry","thomas","tilghman",
    "trimble","tyler","vandorn","wade","wallace","warren","wheeler","wilcox",
    "williams","worden","wright"
  ];
  const PHOTO_SET   = new Set(PHOTO_MANIFEST);
  const PHOTO_CACHE = {};                 // key -> framed dataURL (ready)
  let _photoWarmStarted = false;

  function _photoNorm(s) { return String(s == null ? "" : s).toLowerCase().replace(/[^a-z0-9]/g, ""); }
  function _photoKeys(name, side) {
    const base = _photoNorm(name);
    const sd = (side === "US" || side === "CS") ? side.toLowerCase() : "";
    const ks = []; if (sd) ks.push(base + "_" + sd); ks.push(base); return ks;
  }
  function _photoLookup(name, side) {
    const ks = _photoKeys(name, side);
    for (let i = 0; i < ks.length; i++) { if (PHOTO_CACHE[ks[i]]) return PHOTO_CACHE[ks[i]]; }
    return null;
  }

  // Frame a loaded photo into the W×H period mount: parchment ground, photo cover-cropped into the
  // portrait oval, brass double-ring + corner pins, soft vignette. Minimal processing — recognizable.
  function _framePhoto(img) {
    const oc = document.createElement("canvas"); oc.width = W; oc.height = H;
    const ctx = oc.getContext("2d");
    ctx.fillStyle = PARCH_BASE; ctx.fillRect(0, 0, W, H);
    const pg = ctx.createRadialGradient(W * 0.4, H * 0.33, 2, W * 0.5, H * 0.5, W * 0.72);
    pg.addColorStop(0, PARCH_LIGHT); pg.addColorStop(1, PARCH_DARK);
    ctx.fillStyle = pg; ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.beginPath(); ctx.ellipse(OX, OY, ORX, ORY, 0, 0, Math.PI * 2); ctx.clip();
    const dw = ORX * 2 + 8, dh = ORY * 2 + 12, dx = OX - dw / 2, dy = OY - dh / 2 - 3;
    const dr = dw / dh; let sw, sh, sx, sy;
    if (img.width / img.height > dr) { sh = img.height; sw = sh * dr; sx = (img.width - sw) / 2; sy = 0; }
    else { sw = img.width; sh = sw / dr; sx = 0; sy = (img.height - sh) * 0.12; }   // bias toward the head
    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
    ctx.fillStyle = "rgba(120,92,44,0.10)"; ctx.fillRect(dx, dy, dw, dh);            // gentle period unify
    const vg = ctx.createRadialGradient(OX, OY, ORY * 0.55, OX, OY, ORY * 1.05);
    vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(18,11,4,0.45)");
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
    ctx.restore();
    _photoMount(ctx);
    return oc.toDataURL("image/jpeg", 0.85);
  }
  function _photoMount(ctx) {
    // repaint parchment OUTSIDE the oval so the photo reads as an inset, then the brass mount
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.ellipse(OX, OY, ORX, ORY, 0, 0, Math.PI * 2);
    ctx.clip("evenodd");
    ctx.fillStyle = PARCH_BASE; ctx.fillRect(0, 0, W, H);
    const pg = ctx.createRadialGradient(W * 0.4, H * 0.33, 2, W * 0.5, H * 0.5, W * 0.72);
    pg.addColorStop(0, PARCH_LIGHT); pg.addColorStop(1, PARCH_DARK);
    ctx.fillStyle = pg; ctx.fillRect(0, 0, W, H);
    ctx.restore();
    ctx.strokeStyle = BRASS; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.ellipse(OX, OY, ORX, ORY, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = BRASS_LT; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.ellipse(OX, OY, ORX - 2.2, ORY - 2.2, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = "rgba(120,92,44,0.4)"; ctx.lineWidth = 0.6;
    ctx.beginPath(); ctx.ellipse(OX, OY, ORX + 2.4, ORY + 2.4, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = BRASS_LT;
    const pins = [[8, 10], [W - 8, 10], [8, H - 10], [W - 8, H - 10]];
    for (let i = 0; i < pins.length; i++) { ctx.beginPath(); ctx.arc(pins[i][0], pins[i][1], 1.5, 0, Math.PI * 2); ctx.fill(); }
  }
  function _warmPhotos() {
    if (_photoWarmStarted || typeof document === "undefined" || typeof Image === "undefined") return;
    _photoWarmStarted = true;
    for (let i = 0; i < PHOTO_MANIFEST.length; i++) {
      (function (key) {
        const im = new Image();
        im.onload = function () { try { PHOTO_CACHE[key] = _framePhoto(im); _upgradeVisiblePortraits(); } catch (e) {} };
        im.onerror = function () { /* missing/blocked -> engraving stays */ };
        im.src = "assets/portraits/" + key + ".jpg";
      })(PHOTO_MANIFEST[i]);
    }
  }
  // when a photo finishes loading after a badge already rendered the engraving, swap it in
  function _upgradeVisiblePortraits() {
    if (typeof document === "undefined") return;
    const badges = document.querySelectorAll(".lead-badge[data-portrait-done]");
    for (let b = 0; b < badges.length; b++) {
      const badge = badges[b];
      const img = badge.querySelector("img");
      if (!img || badge.getAttribute("data-portrait-photo") === "1") continue;
      const lnmEl = badge.querySelector(".lnm"); if (!lnmEl) continue;
      const nm = (lnmEl.textContent || "").replace(/\s*★\s*$/, "").trim();
      let side = "US";
      if (typeof G !== "undefined" && G.sel && G.sel.side) side = G.sel.side;
      const ph = _photoLookup(nm, side);
      if (ph) { img.src = ph; badge.setAttribute("data-portrait-photo", "1"); }
    }
  }

  // ---- Feature tables (seeded selection, not Math.random) ----

  // Face oval shapes: [widthFrac, heightFrac, chinShift]
  const FACE_SHAPES = [
    [0.38, 0.44, 0],        // oval
    [0.40, 0.42, 3],        // round
    [0.34, 0.46, -2],       // narrow long
    [0.41, 0.40, 2],        // broad short
    [0.36, 0.45, 1],        // slightly narrow
  ];

  // Hair styles: functions receiving (ctx, rng, fx, fy, fw, fh, inkCol)
  // fx,fy = face oval center, fw,fh = face oval half-widths
  const HAIR_STYLES = [
    // 0: side-parted swept back
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      // top mass
      ctx.beginPath();
      ctx.ellipse(fx, fy - fh * 0.82, fw * 0.82, fh * 0.28, 0, Math.PI, 0);
      ctx.fill();
      // side temples
      ctx.beginPath();
      ctx.ellipse(fx - fw * 0.78, fy - fh * 0.3, fw * 0.22, fh * 0.38, -0.3, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(fx + fw * 0.78, fy - fh * 0.3, fw * 0.22, fh * 0.38, 0.3, 0, Math.PI);
      ctx.fill();
    },
    // 1: short cropped
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      ctx.beginPath();
      ctx.ellipse(fx, fy - fh * 0.88, fw * 0.88, fh * 0.22, 0, Math.PI, 0);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(fx - fw * 0.72, fy - fh * 0.55, fw * 0.18, fh * 0.24, -0.2, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(fx + fw * 0.72, fy - fh * 0.55, fw * 0.18, fh * 0.24, 0.2, 0, Math.PI);
      ctx.fill();
    },
    // 2: wavy medium length
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      ctx.beginPath();
      ctx.ellipse(fx, fy - fh * 0.78, fw * 0.90, fh * 0.34, 0, Math.PI, 0);
      ctx.fill();
      // wave strokes at sides
      for (let s = 0; s < 2; s++) {
        const sx = s === 0 ? fx - fw * 0.88 : fx + fw * 0.88;
        const dir = s === 0 ? -1 : 1;
        ctx.beginPath();
        ctx.moveTo(sx, fy - fh * 0.5);
        ctx.bezierCurveTo(sx + dir * 6, fy - fh * 0.25, sx, fy, sx + dir * 4, fy + fh * 0.2);

        ctx.strokeStyle = ink;
        ctx.stroke();
      }
    },
    // 3: high pompadour
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      ctx.beginPath();
      ctx.ellipse(fx, fy - fh * 0.96, fw * 0.80, fh * 0.36, 0, Math.PI, 0);
      ctx.fill();
      // raised front
      ctx.beginPath();
      ctx.ellipse(fx, fy - fh * 1.04, fw * 0.50, fh * 0.22, 0, Math.PI, 0);
      ctx.fill();
    },
    // 4: receding / thin on top
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      // thin band at crown
      ctx.beginPath();
      ctx.ellipse(fx, fy - fh * 0.86, fw * 0.65, fh * 0.14, 0, Math.PI, 0);
      ctx.fill();
      // side puffs
      ctx.beginPath();
      ctx.ellipse(fx - fw * 0.70, fy - fh * 0.55, fw * 0.28, fh * 0.30, -0.3, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(fx + fw * 0.70, fy - fh * 0.55, fw * 0.28, fh * 0.30, 0.3, 0, Math.PI);
      ctx.fill();
    },
  ];

  // Beard styles (6 including none)
  // returns true if brow gap needed (moustache covers upper lip)
  const BEARD_STYLES = [
    // 0: clean shaven (none)
    function (ctx, rng, fx, fy, fw, fh, ink) { /* no beard */ },
    // 1: full bushy beard
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      ctx.beginPath();
      ctx.ellipse(fx, fy + fh * 0.44, fw * 0.80, fh * 0.44, 0, 0, Math.PI);
      ctx.fill();

      ctx.fillRect(fx - fw * 0.36, fy + fh * 0.02, fw * 0.72, fh * 0.12);
    },
    // 2: neat moustache only
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      ctx.beginPath();
      ctx.ellipse(fx, fy + fh * 0.06, fw * 0.32, fh * 0.09, 0, 0, Math.PI);
      ctx.fill();
    },
    // 3: chinstrap + moustache
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.strokeStyle = ink;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(fx, fy + fh * 0.15, fw * 0.76, 0.15, Math.PI - 0.15);
      ctx.stroke();
      // moustache
      ctx.fillStyle = ink;
      ctx.beginPath();
      ctx.ellipse(fx, fy + fh * 0.06, fw * 0.30, fh * 0.08, 0, 0, Math.PI);
      ctx.fill();
    },
    // 4: short trimmed beard
    function (ctx, rng, fx, fy, fw, fh, ink) {
      ctx.fillStyle = ink;
      ctx.beginPath();
      ctx.ellipse(fx, fy + fh * 0.38, fw * 0.58, fh * 0.30, 0, 0, Math.PI);

      ctx.fillRect(fx - fw * 0.30, fy + fh * 0.04, fw * 0.60, fh * 0.10);

    // 5: goatee + moustache (Van Dyke)
    function (ctx, rng, fx, fy, fw, fh, ink) {

  // ---- Core rendering function ----
  function _renderPortrait(name, side, opts) {
    const isTintype = !!(opts && opts.tintype);
    const isNamed   = !!(opts && opts.named);
    const isCmd     = !!(opts && opts.cmd);

    // Seed: name+side, same as contract spec — deterministic forever
    const seed = hashStr(name + side);
    const rng  = mulberry(seed);

    // Offscreen canvas
    const oc  = document.createElement("canvas");
    oc.width  = W;
    oc.height = H;
    const ctx = oc.getContext("2d");

    // ---- Background: parchment or tintype plate ----
    if (isTintype) {
      // Darker collodion plate
      ctx.fillStyle = TINT_DARK;
      ctx.fillRect(0, 0, W, H);
      // subtle warm gradient
      const platGrad = ctx.createRadialGradient(W * 0.45, H * 0.35, 4, W * 0.5, H * 0.5, W * 0.7);
      platGrad.addColorStop(0, "rgba(80,60,30,0.55)");
      platGrad.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = platGrad;
      ctx.fillRect(0, 0, W, H);
    } else {
      // Parchment ground
      ctx.fillStyle = PARCH_BASE;
      ctx.fillRect(0, 0, W, H);

      const pgGrad = ctx.createRadialGradient(W * 0.4, H * 0.3, 2, W * 0.5, H * 0.5, W * 0.72);
      pgGrad.addColorStop(0, PARCH_LIGHT);
      pgGrad.addColorStop(1, PARCH_DARK);
      ctx.fillStyle = pgGrad;
      ctx.fillRect(0, 0, W, H);

    // Use deterministic offsets baked from seed, not per-frame Math.random
    const bgRng = mulberry(seed ^ 0xBAC6001);
    ctx.save();
    ctx.globalAlpha = isTintype ? 0.28 : 0.14;
    const hatchInk = isTintype ? "#5a4828" : INK_MID;
    ctx.strokeStyle = hatchInk;
    ctx.lineWidth   = 0.4;
    // Horizontal fine lines
    for (let y = 0; y < H; y += 3 + Math.floor(bgRng() * 2)) {
      const jx = (bgRng() - 0.5) * 1.2;
      ctx.beginPath();
      ctx.moveTo(jx, y);
      ctx.lineTo(W + jx, y);
      ctx.stroke();
    }
    // Vertical fine lines (cross-hatch)
    for (let x = 0; x < W; x += 4 + Math.floor(bgRng() * 2)) {
      const jy = (bgRng() - 0.5) * 1.0;
      ctx.beginPath();
      ctx.moveTo(x, jy);
      ctx.lineTo(x, H + jy);
      ctx.stroke();
    }
    ctx.restore();

    // ---- Oval vignette mask setup ----
    // We'll apply the oval clip for the portrait area and render the bust inside it.
    // Then we'll draw the oval border separately.

    // ---- Determine face features from seed ----
    const faceIdx   = Math.floor(rng() * FACE_SHAPES.length);
    const hairIdx   = Math.floor(rng() * HAIR_STYLES.length);
    const beardIdx  = Math.floor(rng() * BEARD_STYLES.length);
    // Brow variant: 0=flat, 1=arched, 2=heavy
    const browVar   = Math.floor(rng() * 3);
    // Nose variant: 0=straight, 1=aquiline, 2=button
    const noseVar   = Math.floor(rng() * 3);
    // Jaw variant: 0=square, 1=rounded, 2=pointed
    const jawVar    = Math.floor(rng() * 3);
    // Ear prominence
    const earProm   = 0.5 + rng() * 0.5;
    // Eye spacing
    const eyeSpace  = 0.24 + rng() * 0.10;
    // Age lines intensity (0..1)
    const ageLine   = rng();

    const [fwF, fhF, chinShift] = FACE_SHAPES[faceIdx];

    // Face centre — placed slightly above canvas mid
    const fx = OX;
    const fy = OY - 8;
    const fw = W * fwF;
    const fh = H * fhF;

    const ink      = isTintype ? "#c8b08a" : INK_BASE;
    const inkLight = isTintype ? "#a09070" : INK_MID;
    const inkDark  = isTintype ? "#2a1e10" : INK_DARK;

    // ---- Save and clip to portrait oval for all bust content ----
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(OX, OY, ORX - 1, ORY - 1, 0, 0, Math.PI * 2);
    ctx.clip();

    // ---- Uniform collar by side (inside oval clip) ----
    _drawCollar(ctx, rng, fx, fy, fw, fh, side, isCmd, ink, inkDark, isTintype);

    // ---- Shoulder boards by side ----
    _drawShoulderBoards(ctx, rng, fx, fy, fw, fh, side, isCmd, ink, inkLight, inkDark, isTintype);

    // ---- Neck ----
    const neckW = fw * 0.30;
    const neckTop = fy + fh * 0.40;
    const neckBot = fy + fh * 0.68;
    ctx.fillStyle = isTintype ? "#a08060" : "#c8a87a";
    ctx.beginPath();
    ctx.ellipse(fx, (neckTop + neckBot) / 2, neckW / 2, (neckBot - neckTop) / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // ---- Face oval ----
    ctx.fillStyle = isTintype ? "#a88c68" : "#d4a870";
    ctx.beginPath();
    ctx.ellipse(fx, fy + chinShift * 0.5, fw, fh, 0, 0, Math.PI * 2);
    ctx.fill();

    // ---- Face shading: 3-direction hatch passes ----
    // Pass 1: general side lighting (vertical strokes on shadow side, left)
    _hatchOval(ctx, fx, fy + chinShift * 0.5, fw, fh,
      "vertical", 0, fw * 0.25, 3.5, isTintype ? 0.40 : 0.22, ink, rng);

    // Pass 2: contour shading (diagonal NE, right face edge)
    _hatchOval(ctx, fx, fy + chinShift * 0.5, fw, fh,
      "diag_ne", fw * 0.28, fw, 4.0, isTintype ? 0.30 : 0.16, ink, rng);

    // Pass 3: chin/jaw cross-hatch
    _hatchOval(ctx, fx, fy + chinShift * 0.5 + fh * 0.3, fw * 0.80, fh * 0.35,
      "cross", -fw, fw, 3.5, isTintype ? 0.28 : 0.13, ink, rng);

    // ---- Age / character lines ----
    if (ageLine > 0.3) {
      ctx.save();
      ctx.strokeStyle = ink;
      ctx.globalAlpha = ageLine * (isTintype ? 0.50 : 0.30);
      ctx.lineWidth = 0.6;
      // Forehead lines
      const lcount = Math.floor(ageLine * 3) + 1;
      for (let li = 0; li < lcount; li++) {
        const ly = fy - fh * 0.44 + li * 5;
        ctx.beginPath();
        ctx.moveTo(fx - fw * 0.55 + li * 2, ly);
        ctx.bezierCurveTo(fx - fw * 0.15, ly - 2, fx + fw * 0.15, ly - 2, fx + fw * 0.55 - li * 2, ly);
        ctx.stroke();
      }
      // Nasolabial fold
      ctx.globalAlpha = ageLine * (isTintype ? 0.40 : 0.22);
      for (let s = 0; s < 2; s++) {
        const sx = s === 0 ? fx - fw * 0.32 : fx + fw * 0.32;
        ctx.beginPath();
        ctx.moveTo(sx, fy + fh * 0.02);
        ctx.bezierCurveTo(sx - (s === 0 ? 4 : -4), fy + fh * 0.20, sx, fy + fh * 0.30, sx + (s === 0 ? 2 : -2), fy + fh * 0.38);
        ctx.stroke();
      }
      ctx.restore();
    }

    // ---- Ear ----
    for (let s = 0; s < 2; s++) {
      const ex = s === 0 ? fx - fw - 2 : fx + fw + 2;
      const dir = s === 0 ? -1 : 1;
      ctx.fillStyle = isTintype ? "#9a7854" : "#c8a060";
      ctx.beginPath();
      ctx.ellipse(ex, fy - fh * 0.05, fw * 0.12 * earProm, fh * 0.18, dir * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = ink;
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.ellipse(ex, fy - fh * 0.05, fw * 0.07 * earProm, fh * 0.12, dir * 0.3, 0, Math.PI * 2);
      ctx.stroke();
    }

    // ---- Hair ----
    HAIR_STYLES[hairIdx](ctx, rng, fx, fy, fw, fh, ink);

    // ---- Brow variant ----
    ctx.strokeStyle = inkDark;
    ctx.lineWidth = 1.6;
    ctx.lineCap = "round";
    for (let s = 0; s < 2; s++) {
      const bx = s === 0 ? fx - fw * eyeSpace - fw * 0.08 : fx + fw * eyeSpace + fw * 0.08;
      const dir = s === 0 ? 1 : -1;
      ctx.beginPath();
      if (browVar === 0) {
        // flat
        ctx.moveTo(bx - fw * 0.16, fy - fh * 0.42);
        ctx.lineTo(bx + fw * 0.16, fy - fh * 0.42);
      } else if (browVar === 1) {
        // arched
        ctx.moveTo(bx - fw * 0.16, fy - fh * 0.40);
        ctx.quadraticCurveTo(bx, fy - fh * 0.50, bx + fw * 0.16, fy - fh * 0.40);
      } else {
        // heavy — double stroke
        ctx.moveTo(bx - fw * 0.18, fy - fh * 0.41);
        ctx.lineTo(bx + fw * 0.18, fy - fh * 0.43);
        ctx.lineWidth = 2.4;
      }
      ctx.stroke();
      ctx.lineWidth = 1.6;
    }

    // ---- Eyes ----
    for (let s = 0; s < 2; s++) {
      const ex = s === 0 ? fx - fw * eyeSpace : fx + fw * eyeSpace;
      const ey = fy - fh * 0.25;
      // eye white
      ctx.fillStyle = isTintype ? "#d0c4a8" : "#f0e8d4";
      ctx.beginPath();
      ctx.ellipse(ex, ey, fw * 0.12, fh * 0.07, 0, 0, Math.PI * 2);
      ctx.fill();
      // iris
      ctx.fillStyle = inkDark;
      ctx.beginPath();
      ctx.arc(ex, ey, fw * 0.07, 0, Math.PI * 2);
      ctx.fill();
      // highlight
      ctx.fillStyle = "rgba(255,240,220,0.7)";
      ctx.beginPath();
      ctx.arc(ex - fw * 0.025, ey - fh * 0.025, fw * 0.022, 0, Math.PI * 2);
      ctx.fill();
      // eyelid lines
      ctx.strokeStyle = inkDark;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(ex - fw * 0.14, ey);
      ctx.bezierCurveTo(ex - fw * 0.05, ey - fh * 0.085, ex + fw * 0.05, ey - fh * 0.085, ex + fw * 0.14, ey);
      ctx.stroke();
    }

    // ---- Nose ----
    ctx.strokeStyle = ink;
    ctx.lineWidth = 1.1;
    ctx.lineCap = "round";
    const nx = fx, ny = fy - fh * 0.04;
    if (noseVar === 0) {
      // straight
      ctx.beginPath();
      ctx.moveTo(nx, ny - fh * 0.14);
      ctx.lineTo(nx, ny + fh * 0.02);
      ctx.moveTo(nx - fw * 0.10, ny + fh * 0.02);
      ctx.bezierCurveTo(nx - fw * 0.14, ny + fh * 0.08, nx + fw * 0.14, ny + fh * 0.08, nx + fw * 0.10, ny + fh * 0.02);
      ctx.stroke();
    } else if (noseVar === 1) {
      // aquiline
      ctx.beginPath();
      ctx.moveTo(nx - fw * 0.04, ny - fh * 0.15);
      ctx.bezierCurveTo(nx - fw * 0.02, ny - fh * 0.04, nx + fw * 0.06, ny + fh * 0.00, nx + fw * 0.04, ny + fh * 0.04);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(nx - fw * 0.10, ny + fh * 0.04);
      ctx.bezierCurveTo(nx - fw * 0.12, ny + fh * 0.09, nx + fw * 0.12, ny + fh * 0.09, nx + fw * 0.08, ny + fh * 0.03);
      ctx.stroke();
    } else {
      // button (rounder)
      ctx.beginPath();
      ctx.arc(nx, ny + fh * 0.02, fw * 0.10, 0, Math.PI * 2);
      ctx.stroke();
    }

    // ---- Mouth ----
    ctx.strokeStyle = inkDark;
    ctx.lineWidth = 1.2;
    const mouthY = fy + fh * 0.16;
    ctx.beginPath();
    ctx.moveTo(fx - fw * 0.20, mouthY);
    ctx.bezierCurveTo(fx - fw * 0.06, mouthY + fh * 0.03, fx + fw * 0.06, mouthY + fh * 0.03, fx + fw * 0.20, mouthY);
    ctx.stroke();
    // lower lip hint
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.moveTo(fx - fw * 0.14, mouthY + fh * 0.05);
    ctx.bezierCurveTo(fx - fw * 0.04, mouthY + fh * 0.09, fx + fw * 0.04, mouthY + fh * 0.09, fx + fw * 0.14, mouthY + fh * 0.05);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // ---- Jaw variant lines ----
    ctx.strokeStyle = ink;
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = isTintype ? 0.55 : 0.35;
    if (jawVar === 0) {
      // square — straight jaw line hints
      ctx.beginPath();
      ctx.moveTo(fx - fw * 0.80, fy + fh * 0.28);
      ctx.lineTo(fx - fw * 0.80, fy + fh * 0.56);
      ctx.moveTo(fx + fw * 0.80, fy + fh * 0.28);
      ctx.lineTo(fx + fw * 0.80, fy + fh * 0.56);
      ctx.stroke();
    } else if (jawVar === 2) {
      // pointed — V hint at chin
      ctx.beginPath();
      ctx.moveTo(fx - fw * 0.22, fy + fh * 0.56);
      ctx.lineTo(fx, fy + fh * 0.72);
      ctx.lineTo(fx + fw * 0.22, fy + fh * 0.56);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // ---- Beard (drawn on top of skin/shading) ----
    BEARD_STYLES[beardIdx](ctx, rng, fx, fy, fw, fh, ink);

    // ---- Restore clip ----
    ctx.restore();

    // ---- Oval vignette ----
    if (isTintype) {
      // Heavy vignette for tintype
      const vig = ctx.createRadialGradient(OX, OY, ORX * 0.35, OX, OY, Math.max(ORX, ORY) * 1.35);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(0.72, "rgba(0,0,0,0.22)");
      vig.addColorStop(1, "rgba(0,0,0,0.78)");
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(OX, OY, ORX + 6, ORY + 6, 0, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);
      // 1px soft edge blur simulation — darkened thin ring
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.ellipse(OX, OY, ORX - 0.5, ORY - 0.5, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    } else {
      // Standard vignette
      const vig = ctx.createRadialGradient(OX, OY, ORX * 0.5, OX, OY, Math.max(ORX, ORY) * 1.28);
      vig.addColorStop(0, "rgba(0,0,0,0)");
      vig.addColorStop(0.68, "rgba(26,18,10,0.10)");
      vig.addColorStop(1, "rgba(26,18,10,0.68)");
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(OX, OY, ORX + 4, ORY + 4, 0, 0, Math.PI * 2);
      ctx.clip();
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // ---- Oval mask: clip outside oval to parchment/plate background ----
    // Punch out everything outside the oval
    ctx.save();
    ctx.globalCompositeOperation = "destination-in";
    // oval + full canvas alpha keep: draw white rect then oval white
    // Better: use "destination-out" to erase outside
    ctx.restore();
    // Draw background outside oval directly (simpler than compositing)
    ctx.save();
    ctx.fillStyle = isTintype ? TINT_DARK : PARCH_BASE;
    // Fill corners not inside oval using evenodd rule
    ctx.beginPath();
    ctx.rect(0, 0, W, H);
    ctx.ellipse(OX, OY, ORX, ORY, 0, 0, Math.PI * 2, true); // counter-clockwise = hole
    ctx.fillStyle = isTintype ? TINT_DARK : PARCH_DARK;
    ctx.fill("evenodd");
    ctx.restore();

    // ---- Brass-line border ----
    // Outer rectangle border
    ctx.strokeStyle = BRASS;
    ctx.lineWidth = 2;
    ctx.strokeRect(1.5, 1.5, W - 3, H - 3);
    // Inner fine line
    ctx.strokeStyle = BRASS_LT;
    ctx.lineWidth = 0.7;
    ctx.strokeRect(4, 4, W - 8, H - 8);

    // ---- Oval portrait border (brass ring) ----
    ctx.strokeStyle = BRASS;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.ellipse(OX, OY, ORX, ORY, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = "rgba(201,168,95,0.35)";
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.ellipse(OX, OY, ORX + 2, ORY + 2, 0, 0, Math.PI * 2);
    ctx.stroke();

    // ---- Engraved spandrel frame (run-h: richer engraving fallback) ----
    // fine cross-hatch in the four corners OUTSIDE the oval + outer keyline + brass corner pins,
    // so the procedural fallback reads as a finished oval-in-rectangle period print, not a sketch.
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, H);
    ctx.ellipse(OX, OY, ORX + 3, ORY + 3, 0, 0, Math.PI * 2);
    ctx.clip("evenodd");
    ctx.strokeStyle = isTintype ? "#6a5530" : INK_MID;
    ctx.lineWidth = 0.4;
    ctx.globalAlpha = isTintype ? 0.16 : 0.12;
    for (let dd = -H; dd < W; dd += 3) { ctx.beginPath(); ctx.moveTo(dd, 0); ctx.lineTo(dd + H, H); ctx.stroke(); }
    ctx.globalAlpha = isTintype ? 0.10 : 0.07;
    for (let de = 0; de < W + H; de += 3) { ctx.beginPath(); ctx.moveTo(de, 0); ctx.lineTo(de - H, H); ctx.stroke(); }
    ctx.restore();
    ctx.strokeStyle = "rgba(156,122,60,0.5)";
    ctx.lineWidth = 1;
    ctx.strokeRect(1.5, 1.5, W - 3, H - 3);
    ctx.fillStyle = BRASS_LT;
    const _sp = [[6, 6], [W - 6, 6], [6, H - 6], [W - 6, H - 6]];
    for (let pi = 0; pi < _sp.length; pi++) { ctx.beginPath(); ctx.arc(_sp[pi][0], _sp[pi][1], 1.4, 0, Math.PI * 2); ctx.fill(); }

    // ---- Nameplate ----
    if (isNamed) {
      const npH = 17;
      const npY = H - npH - 2;
      // Plate background
      ctx.fillStyle = isTintype ? "#2a1e0e" : PARCH_DARK;
      ctx.fillRect(4, npY, W - 8, npH);
      ctx.strokeStyle = BRASS;
      ctx.lineWidth = 0.8;
      ctx.strokeRect(4, npY, W - 8, npH);
      // Name text — truncate if necessary
      ctx.fillStyle = isTintype ? BRASS_LT : INK_DARK;
      ctx.font = "bold 8px 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      // Trim name to fit (~20 chars at 8px)
      let displayName = name;
      if (displayName.length > 20) displayName = displayName.slice(0, 18) + "…";
      ctx.fillText(displayName, W / 2, npY + npH / 2);
    }

    return oc.toDataURL("image/png");
  }

  // ---- Helper: directional hatch lines over an elliptical region ----
  // direction: "vertical" | "diag_ne" | "cross"
  // xMin, xMax: relative to fx — x range for hatch coverage
  function _hatchOval(ctx, fx, fy, fw, fh, direction, xMin, xMax, spacing, alpha, ink, rng) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = ink;
    ctx.lineWidth = 0.55;
    ctx.lineCap = "butt";

    // Clip to ellipse
    ctx.beginPath();
    ctx.ellipse(fx, fy, fw, fh, 0, 0, Math.PI * 2);
    ctx.clip();

    if (direction === "vertical") {
      const startX = fx + xMin;
      const endX   = fx + xMax;
      for (let x = startX; x < endX; x += spacing) {
        // tiny jitter baked via rng to avoid grid artifacting
        const jx = (rng() - 0.5) * 0.7;
        ctx.beginPath();
        ctx.moveTo(x + jx, fy - fh - 2);
        ctx.lineTo(x + jx, fy + fh + 2);
        ctx.stroke();
      }
    } else if (direction === "diag_ne") {
      const startX = fx + xMin;
      const endX   = fx + xMax;
      for (let x = startX; x < endX; x += spacing) {
        const jx = (rng() - 0.5) * 0.6;
        ctx.beginPath();
        ctx.moveTo(x + jx, fy - fh - 2);
        ctx.lineTo(x + jx + fh * 0.6, fy + fh + 2);
        ctx.stroke();
      }
    } else if (direction === "cross") {
      // Horizontal strokes
      for (let y = fy - fh; y < fy + fh; y += spacing) {
        const jy = (rng() - 0.5) * 0.5;
        ctx.beginPath();
        ctx.moveTo(fx - fw - 2, y + jy);
        ctx.lineTo(fx + fw + 2, y + jy);
        ctx.stroke();
      }
      // Diagonal cross
      for (let x = fx - fw; x < fx + fw; x += spacing * 1.2) {
        const jx = (rng() - 0.5) * 0.6;
        ctx.beginPath();
        ctx.moveTo(x + jx, fy - fh - 2);
        ctx.lineTo(x + jx + fh * 0.5, fy + fh + 2);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // ---- Collar: Union = dark blue standing collar, CS = grey/butternut ----
  function _drawCollar(ctx, rng, fx, fy, fw, fh, side, isCmd, ink, inkDark, isTintype) {
    const collarY  = fy + fh * 0.50;
    const collarW  = fw * 1.40;
    const collarH  = fh * 0.60;
    const baseCol  = isTintype
      ? (side === "US" ? "#1a2c44" : "#3a3020")
      : (side === "US" ? "#1f3a5f" : "#6b5444");
    const trimCol  = isTintype ? "#4a6080" : (side === "US" ? "#3d6098" : "#9a7d62");

    // Coat body (trapezoid shape)
    ctx.fillStyle = baseCol;
    ctx.beginPath();
    ctx.moveTo(fx - collarW * 0.5, collarY);
    ctx.lineTo(fx + collarW * 0.5, collarY);
    ctx.lineTo(fx + collarW * 0.55, collarY + collarH);
    ctx.lineTo(fx - collarW * 0.55, collarY + collarH);
    ctx.closePath();
    ctx.fill();

    // Collar facings / revers
    ctx.fillStyle = trimCol;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.moveTo(fx - fw * 0.10, collarY + 2);
    ctx.lineTo(fx - fw * 0.38, collarY + fh * 0.30);
    ctx.lineTo(fx - fw * 0.18, collarY + fh * 0.30);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(fx + fw * 0.10, collarY + 2);
    ctx.lineTo(fx + fw * 0.38, collarY + fh * 0.30);
    ctx.lineTo(fx + fw * 0.18, collarY + fh * 0.30);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    // Standing collar top edge
    ctx.strokeStyle = trimCol;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(fx - fw * 0.28, collarY);
    ctx.lineTo(fx - fw * 0.08, collarY - fh * 0.04);
    ctx.lineTo(fx + fw * 0.08, collarY - fh * 0.04);
    ctx.lineTo(fx + fw * 0.28, collarY);
    ctx.stroke();

    // Buttons (centre line)
    ctx.fillStyle = isTintype ? "#a0843c" : BRASS_LT;
    const btnCount = 3;
    for (let b = 0; b < btnCount; b++) {
      const by = collarY + fh * (0.06 + b * 0.12);
      ctx.beginPath();
      ctx.arc(fx, by, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // Hatch lines on coat (engraving texture)
    ctx.save();
    ctx.strokeStyle = inkDark;
    ctx.lineWidth = 0.45;
    ctx.globalAlpha = isTintype ? 0.55 : 0.38;
    ctx.beginPath();
    ctx.moveTo(fx - collarW * 0.5, collarY);
    ctx.lineTo(fx + collarW * 0.5, collarY);
    ctx.lineTo(fx + collarW * 0.55, collarY + collarH);
    ctx.lineTo(fx - collarW * 0.55, collarY + collarH);
    ctx.closePath();
    ctx.clip();
    for (let lx = fx - collarW; lx < fx + collarW; lx += 4) {
      ctx.beginPath();
      ctx.moveTo(lx, collarY);
      ctx.lineTo(lx + collarH * 0.4, collarY + collarH);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ---- Shoulder boards ----
  function _drawShoulderBoards(ctx, rng, fx, fy, fw, fh, side, isCmd, ink, inkLight, inkDark, isTintype) {
    const boardY   = fy + fh * 0.55;
    const boardCol = isTintype ? "#8a7230" : BRASS;
    const boardLt  = isTintype ? "#b09040" : BRASS_LT;
    const boardW   = fw * 0.32;
    const boardH   = fh * 0.10;

    for (let s = 0; s < 2; s++) {
      const bx = s === 0 ? fx - fw * 0.80 : fx + fw * 0.80;

      // Board rectangle
      ctx.fillStyle = boardCol;
      ctx.fillRect(bx - boardW / 2, boardY, boardW, boardH);
      ctx.strokeStyle = boardLt;
      ctx.lineWidth = 0.8;
      ctx.strokeRect(bx - boardW / 2, boardY, boardW, boardH);

      // Stars when cmd
      if (isCmd) {
        const starCount = side === "US" ? 2 : 2; // 2 stars for general
        const starSpacing = boardW / (starCount + 1);
        ctx.fillStyle = boardLt;
        for (let st = 0; st < starCount; st++) {
          const sx = bx - boardW / 2 + starSpacing * (st + 1);
          const sy = boardY + boardH / 2;
          _miniStar(ctx, sx, sy, 2.2);
        }
      } else {
        // Single bar for officer
        ctx.fillStyle = boardLt;
        ctx.fillRect(bx - boardW * 0.35, boardY + boardH * 0.3, boardW * 0.70, boardH * 0.40);
      }
    }
  }

  function _miniStar(ctx, cx, cy, r) {
    ctx.save();
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const ang = (Math.PI / 180) * (36 * i - 90);
      const rv  = i % 2 === 0 ? r : r * 0.42;
      const x   = cx + rv * Math.cos(ang);
      const y   = cy + rv * Math.sin(ang);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ---- Public API ----

  /**
   * portraitFor(name, side, opts) → cached dataURL
   * Deterministic: same name+side always produces identical output.
   * opts: { cmd: bool, named: bool, tintype: bool }
   */
  function portraitFor(name, side, opts) {
    opts = opts || {};
    // PD-photo layer (run-h item 2): a real public-domain portrait wins over the engraving.
    const _photo = _photoLookup(name, side);
    if (_photo) return _photo;
    const key = name + "|" + side + "|" + (opts.cmd ? "1" : "0")
              + "|" + (opts.named ? "1" : "0") + "|" + (opts.tintype ? "1" : "0");
    const cached = _cacheGet(key);
    if (cached) return cached;
    const url = _renderPortrait(name, side, opts);
    _cacheSet(key, url);
    return url;
  }

  // Expose globally
  window.portraitFor = portraitFor;
  _warmPhotos();   // begin loading the PD photos into the framed cache (run-h item 2)

  // ---- MutationObserver: insert portrait into .lead-badge when leader shown ----
  // #ufBody is the container. refreshUI() sets its innerHTML to include .lead-badge
  // with .lnm containing the leader name (possibly with " ★" suffix).
  // We must NOT self-trigger: inserting an <img> mutates the DOM, so we guard with
  // a data-flag attribute ("data-portrait-done") on the .lead-badge element.

  function _installObserver() {
    const ufBody = document.getElementById("ufBody");
    if (!ufBody) return; // not ready — caller ensures DOM is present

    // Observe subtree for added nodes (refreshUI replaces innerHTML entirely)
    const observer = new MutationObserver(function (mutations) {
      // Collect added nodes across all mutations this batch
      const toProcess = [];
      for (const mutation of mutations) {
        for (const node of mutation.addedNodes) {
          if (node.nodeType !== 1) continue; // elements only
          // Direct .lead-badge?
          if (node.classList && node.classList.contains("lead-badge")) {
            toProcess.push(node);
          }
          // .lead-badge inside a larger subtree added at once
          if (node.querySelectorAll) {
            for (const lb of node.querySelectorAll(".lead-badge")) {
              toProcess.push(lb);
            }
          }
        }
      }

      for (const badge of toProcess) {
        // Guard: already processed
        if (badge.hasAttribute("data-portrait-done")) continue;
        // Guard: already has a portrait img as first child
        if (badge.firstChild && badge.firstChild.tagName === "IMG") continue;

        // Get name from .lnm — text may have " ★" suffix, strip it
        const lnmEl = badge.querySelector(".lnm");
        if (!lnmEl) continue;
        const rawName = lnmEl.textContent || "";
        const leaderName = rawName.replace(/\s*★\s*$/, "").trim();
        if (!leaderName) continue;

        // Determine side and cmd from G.sel if available
        let side = "US";
        let isCmd = false;
        let isTintype = false;
        if (typeof G !== "undefined" && G.sel && G.sel.leader) {
          side     = G.sel.side || "US";
          isCmd    = !!(G.sel.leader.cmd);
          // Tintype variant for the player's own line (their side in the active battle).
          if (typeof G !== "undefined" && G.battle) {
            isTintype = (G.sel.side === G.battle.playerSide);
          }
        }

        // Mark as processed BEFORE DOM insertion to prevent re-entry
        badge.setAttribute("data-portrait-done", "1");

        // Generate portrait
        let dataURL;
        try {
          dataURL = portraitFor(leaderName, side, { cmd: isCmd, named: false, tintype: isTintype });
        } catch (e) {
          // Portrait generation must never crash the game
          continue;
        }

        // Build img element
        const img = document.createElement("img");
        img.src    = dataURL;
        img.width  = 48;
        img.height = 60;
        img.style.cssText = [
          "display:block",
          "float:left",
          "margin:0 7px 4px 0",
          "border:1px solid #9c7a3c",
          "border-radius:2px",
          "flex:none",
          "image-rendering:pixelated",
        ].join(";");
        img.alt    = leaderName;

        // Insert as first child of badge (before .lnm)
        badge.insertBefore(img, badge.firstChild);
      }
    });

    observer.observe(ufBody, {
      childList: true,
      subtree:   true,
    });
  }

  // Start observer only after DOM is ready
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", _installObserver);
  } else {
    _installObserver();
  }

})();

// ---------------------------------------------------------------------------
// Internal helpers
// ---------------------------------------------------------------------------

// Weighted random pick from LOOT_TIERS using the engine PRNG.
function _pickTier() {
  const total = LOOT_TIERS.reduce(function(s, t){ return s + t.weight; }, 0);
  let r = RND() * total; // RND() is the engine Mulberry32 PRNG (no Math.random)
  for (let i = 0; i < LOOT_TIERS.length; i++) {
    r -= LOOT_TIERS[i].weight;
    if (r <= 0) return i;
  }
  return LOOT_TIERS.length - 1;
}

// Filter MANUFACTURERS to those that can supply a given arm code.
function _mfrsForArm(arm) {
  return Object.keys(MANUFACTURERS).filter(function(k) {
    const m = MANUFACTURERS[k];
    return !m.arm || m.arm.indexOf(arm) !== -1;
  });
}

// Filter MANUFACTURERS to those compatible with a given side ("US"|"CS").
function _mfrsForSide(arm, side) {
  const keys = _mfrsForArm(arm);
  return keys.filter(function(k) {
    const m = MANUFACTURERS[k];
    return !m.side || m.side === side;
  });
}

// Era-legal weapon keys for a given arm and year.
function _weaponKeysForArm(arm, year) {
  return Object.keys(WEAPONS).filter(function(k) {
    const w = WEAPONS[k];
    return w.arm === arm && w.era <= year;
  });
}

// Condition factor: maps a 0-100 condition int to a [0.72, 1.00] multiplier.
function _conditionFactor(cond) {
  return 0.72 + (cond / 100) * 0.28;
}

// ---------------------------------------------------------------------------
// rollLoot(weaponKey, year, side) → loot instance
//
// weaponKey  : WEAPONS key of the base weapon being looted
// year       : battle year (1861-1865), used for era-gate and unique eligibility
// side       : "US" | "CS" — the CAPTURING side (determines manufacturer pool)
//
// Returns an object suitable for storage in G.campaign.captured:
//   { baseKey, baseName, tierIdx, tier{name,color,label,powMod},
//     mfrKey, mfr{name,blurb,quirk,...},
//     quirk{label,desc}, condition, pow, displayName,
//     unique?:{id,blurb,powBonus} }
// ---------------------------------------------------------------------------
function rollLoot(weaponKey, year, side) {
  const baseW = WEAPONS[weaponKey];
  if (!baseW) return null;

  const arm = baseW.arm;
  const tierIdx = _pickTier();
  const tier = LOOT_TIERS[tierIdx];

  // Manufacturer pool: prefer side-compatible, fall back to all for that arm.
  let mfrPool = _mfrsForSide(arm, side);
  if (mfrPool.length === 0) mfrPool = _mfrsForArm(arm);
  if (mfrPool.length === 0) mfrPool = Object.keys(MANUFACTURERS);
  const mfrKey = pick(mfrPool);
  const mfr = MANUFACTURERS[mfrKey];

  // Condition: Surplus skews low, Legendary skews high.
  const condBase = [40, 55, 68, 80, 90][tierIdx];
  const condJitter = rint(-12, 12);
  const condition = clamp(condBase + condJitter, 0, 100);

  // Named unique: only at Legendary (tierIdx === 4), year >= 1862, ~25% chance.
  let unique = null;
  if (tierIdx === 4 && year >= 1862 && chance(0.25)) {
    // Filter uniques whose baseKey is era-legal for this arm and year.
    const eligible = NAMED_UNIQUES.filter(function(u) {
      const uw = WEAPONS[u.baseKey];
      return uw && uw.arm === arm && uw.era <= year;
    });
    if (eligible.length > 0) unique = pick(eligible);
  }

  // Effective power.
  const condF = _conditionFactor(condition);
  let pow = baseW.pow * tier.powMod * condF;
  if (unique) pow *= unique.powBonus;
  // Round to 2 decimal places to avoid float noise in display.
  pow = Math.round(pow * 100) / 100;

  // Display name.
  let displayName;
  if (unique) {
    displayName = unique.displayName;
  } else {
    displayName = tier.label + " " + baseW.name + " (" + mfr.name + ")";
  }

  return {
    baseKey:     weaponKey,
    baseName:    baseW.name,
    tierIdx:     tierIdx,
    tier:        tier,
    mfrKey:      mfrKey,
    mfr:         mfr,
    quirk:       mfr.quirk,
    condition:   condition,
    pow:         pow,
    displayName: displayName,
    unique:      unique || null,
    // Carry weapon metadata for card rendering without re-lookup.
    rng:         baseW.rng,
    arm:         arm,
  };
}

// ---------------------------------------------------------------------------
// captureLootFromRout(routedUnit, capturingSide) → loot | null
//
// routedUnit    : a live roster/unit object with at minimum {weapon, side}
// capturingSide : "US" | "CS"
//
// Returns a loot instance if capturingSide is the PLAYER side (G.campaign?.side)
// and the routed unit has a valid weapon, else null.
//
// CONTRACT FOR FABLE:
//   Call this function from inside killUnit() on the rout/death path, after
//   confirming the unit is defeated. Recommended call site (one line):
//
//     const _lc = captureLootFromRout(u, by && by.side ? by.side : null);
//     if (_lc && G.campaign) { G.campaign.captured = G.campaign.captured || []; G.campaign.captured.push(_lc); }
//
//   Storage shape assumed:
//     G.campaign.captured — Array of loot instance objects (as returned by rollLoot).
//     Initialise to [] in startCampaign alongside the other fields.
//     Fable is responsible for persisting this through applySave/saveState.
// ---------------------------------------------------------------------------
function captureLootFromRout(routedUnit, capturingSide) {
  // Guard: no campaign, no player side resolution.
  if (!capturingSide) return null;
  // Only reward the player's own side.
  if (!G.campaign || capturingSide !== G.campaign.side) return null;
  // Must have a weapon key.
  if (!routedUnit || !routedUnit.weapon || !WEAPONS[routedUnit.weapon]) return null;

  // Determine year from current battle if available.
  const year = (G.battle && G.battle.bd && G.battle.bd.year) ? G.battle.bd.year : 1861;

  return rollLoot(routedUnit.weapon, year, capturingSide);
}

// ---------------------------------------------------------------------------
// renderWeaponCard(loot, opts) → HTML string
//
// loot : object returned by rollLoot()
// opts : { compact:bool }  — compact=true returns a one-line chip for table cells
// ---------------------------------------------------------------------------
function renderWeaponCard(loot, opts) {
  ensureLootStyle();
  if (!loot) return '<span style="color:var(--rule);font-size:11px;">No loot</span>';
  opts = opts || {};

  const tier = loot.tier || LOOT_TIERS[loot.tierIdx] || LOOT_TIERS[1];
  const tColor = tier.color;

  // ---- Compact chip mode ----
  if (opts.compact) {
    return '<span class="lc-chip" style="color:' + tColor + ';border-color:' + tColor + ';">'
      + _esc(loot.displayName)
      + ' &mdash; <span style="font-size:9px;opacity:.8;">'
      + tier.label
      + '</span></span>';
  }

  // ---- Full card ----
  const mfr = loot.mfr || MANUFACTURERS[loot.mfrKey] || {};
  const quirk = loot.quirk || (mfr && mfr.quirk) || null;
  const unique = loot.unique || null;

  // Power bar: scale against max weapon pow in WEAPONS (≈3.4 for fortgun).
  const maxPow = 3.4;
  const powPct = Math.round(clamp(loot.pow / maxPow, 0, 1) * 100);
  const powLow = loot.pow < 1.0;

  // Range bar: max rng is 5.
  const maxRng = 5;
  const rngPct = Math.round(clamp((loot.rng || 1) / maxRng, 0, 1) * 100);

  // Condition bar.
  const condPct = loot.condition;
  const condLow = condPct < 30;

  // Blurb: unique overrides mfr blurb.
  const blurb = (unique && unique.blurb) ? unique.blurb : (mfr.blurb || "");

  let html = '<div class="lc-card" style="color:' + tColor + ';">';

  // Ribbon.
  html += '<span class="lc-ribbon" style="color:' + tColor + ';">' + _esc(tier.label) + '</span>';

  // Unique badge.
  if (unique) {
    html += '<div class="lc-unique">&#9733; Named Piece &#9733;</div>';
  }

  // Weapon name.
  html += '<div class="lc-name" style="color:' + tColor + ';">' + _esc(loot.displayName) + '</div>';

  // Manufacturer.
  html += '<div class="lc-mfr">' + _esc(mfr.name || loot.mfrKey || "") + '</div>';

  // Blurb.
  if (blurb) {
    html += '<div class="lc-blurb">&ldquo;' + _esc(blurb) + '&rdquo;</div>';
  }

  html += '<hr class="lc-rule">';

  // Stats row.
  html += '<div class="lc-stats">';

  // Power.
  html += '<div class="lc-stat">'
    + '<div class="lc-stat-lbl">Power</div>'
    + '<div class="lc-bar"><div class="lc-fill ' + (powLow ? 'lc-fill-low' : 'lc-fill-pow') + '" style="width:' + powPct + '%;"></div></div>'
    + '<div class="lc-stat-val">' + loot.pow.toFixed(2) + '</div>'
    + '</div>';

  // Range.
  html += '<div class="lc-stat">'
    + '<div class="lc-stat-lbl">Range</div>'
    + '<div class="lc-bar"><div class="lc-fill lc-fill-rng" style="width:' + rngPct + '%;"></div></div>'
    + '<div class="lc-stat-val">' + (loot.rng || '—') + ' hex</div>'
    + '</div>';

  // Condition.
  html += '<div class="lc-stat">'
    + '<div class="lc-stat-lbl">Condition</div>'
    + '<div class="lc-bar"><div class="lc-fill ' + (condLow ? 'lc-fill-low' : 'lc-fill-cond') + '" style="width:' + condPct + '%;"></div></div>'
    + '<div class="lc-stat-val">' + condPct + ' / 100</div>'
    + '</div>';

  html += '</div>'; // .lc-stats

  // Quirk.
  if (quirk) {
    html += '<div class="lc-quirk"><b>' + _esc(quirk.label) + ':</b> ' + _esc(quirk.desc) + '</div>';
  }

  html += '</div>'; // .lc-card
  return html;
}

// Internal HTML escaper — avoids XSS in display strings.
function _esc(s) {
  if (!s) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
/* ==== END C10 ==== */

/* ==== §18 — REGIMENT RATINGS CARDS (C11) ==== */
"use strict";

// ---------------------------------------------------------------------------
// RATING MATH NOTES
//
// All five component ratings are ints in [40, 99].
// Inputs come from either a live unit `u` or a campaign roster entry `{type,weapon,xp,name}`.
//
// POW normalization: each arm bracket has its own min/max pow spread.
//   inf:  1.00 – 2.20  → norm = (pow - 1.00) / 1.20
//   cav:  1.30 – 1.95  → norm = (pow - 1.30) / 0.65
//   art:  1.60 – 2.70  → norm = (pow - 1.60) / 1.10
//   nav:  2.20 – 3.40  → norm = (pow - 2.20) / 1.20
//   fort: 3.40 fixed   → norm = 1.0
//   hq/null:            → norm = 0
//
// xp scale: 0–5; morale baseline (roster entries): 72 (midpoint of rint(66,82)).
// ---------------------------------------------------------------------------

// ---- POW normalization ranges per arm ----
const _POW_RANGE = {
  inf:  { min: 1.00, span: 1.20 },
  cav:  { min: 1.30, span: 0.65 },
  art:  { min: 1.60, span: 1.10 },
  nav:  { min: 2.20, span: 1.20 },
  fort: { min: 3.40, span: 0.01 },  // always top
};

// ---- ARM-appropriate OVR weights {fire,disc,mob,elan,stam} ----
// Must sum to 1.0.
const _OVR_WEIGHTS = {
  inf:  { fire: 0.30, disc: 0.25, mob: 0.15, elan: 0.15, stam: 0.15 },
  cav:  { fire: 0.20, disc: 0.15, mob: 0.35, elan: 0.20, stam: 0.10 },
  art:  { fire: 0.45, disc: 0.20, mob: 0.10, elan: 0.10, stam: 0.15 },
  nav:  { fire: 0.45, disc: 0.20, mob: 0.10, elan: 0.10, stam: 0.15 },
  fort: { fire: 0.50, disc: 0.20, mob: 0.00, elan: 0.10, stam: 0.20 },
  hq:   { fire: 0.05, disc: 0.25, mob: 0.20, elan: 0.35, stam: 0.15 },
};

// Morale baseline for roster entries that have no live morale field (midpoint of mkUnit range).
const _MOR_BASELINE = 74;

// ---- ratingsFor(src) ----
// Accepts a live unit u OR a campaign roster entry {type,weapon,xp,name}.
// Returns {OVR, fire, disc, mob, elan, stam, dev, devLabel, xfactor}.
function ratingsFor(src) {
  const type   = src.type   || "inf";
  const weapon = src.weapon || null;
  const xp     = clamp(src.xp || 0, 0, 5);
  const dev    = typeof src.dev === "number" ? clamp(src.dev, 0, 3) : (xp >= 5 ? 3 : xp >= 4 ? 2 : xp >= 2 ? 1 : 0);

  // Resolve live morale ratio (0–1); roster entries use baseline.
  let morRatio;
  if (typeof src.morale === "number" && typeof src.maxMor === "number" && src.maxMor > 0) {
    morRatio = clamp(src.morale / src.maxMor, 0, 1);
  } else {
    morRatio = clamp((_MOR_BASELINE + xp * 3) / 98, 0, 1);
  }

  // Resolve weapon power and normalize [0,1] within arm bracket.
  let powNorm = 0;
  if (weapon && typeof WEAPONS !== "undefined" && WEAPONS[weapon]) {
    const pow = WEAPONS[weapon].pow;
    const rng = _POW_RANGE[type] || _POW_RANGE["inf"];
    powNorm = clamp((pow - rng.min) / rng.span, 0, 1);
  }

  // --- Leader trait bonus for élan (only present on live units) ---
  let elanBonus = 0;
  if (src.leader && src.leader.alive) {
    const tr = src.leader.trait;
    if (tr === "brilliant")   elanBonus = 0.18;
    else if (tr === "aggressive") elanBonus = 0.12;
    else if (tr === "inspiring")  elanBonus = 0.10;
    else if (tr === "dashing")    elanBonus = 0.08;
    else if (tr === "steady")     elanBonus = 0.06;
  }

  // --- ARM mobility baseline [0,1] ---
  // ARM.move: fort=0, art=3, inf=4, nav=4, hq=6, cav=7
  const moveMax = 7;
  const moveVal = (typeof ARM !== "undefined" && ARM[type]) ? ARM[type].move : 4;
  const mobNorm = clamp(moveVal / moveMax, 0, 1);

  // ---- Five component ratings ----
  // Each is: base + xp contribution + quality contribution → scaled to [40,99]
  const scale = function(norm) { return clamp(Math.round(40 + norm * 59), 40, 99); };

  // FIRE: weapon pow (60%) + xp (30%) + kills-bonus if live (10%)
  const killsBoost = (typeof src.kills === "number" && src.kills > 0) ? clamp(src.kills / 8, 0, 0.15) : 0;
  const fireNorm   = powNorm * 0.60 + (xp / 5) * 0.30 + killsBoost * 0.10;
  const fire       = scale(fireNorm);

  // DISC: morale ratio (50%) + xp (40%) + entrench bonus if live (10%)
  const entBoost  = (typeof src.ent === "number") ? clamp(src.ent / 3, 0, 1) * 0.06 : 0;
  const discNorm  = morRatio * 0.50 + (xp / 5) * 0.40 + entBoost;
  const disc      = scale(discNorm);

  // MOB: ARM move (70%) + xp (20%) − routed penalty (10%)
  const routPen  = (src.routed === true) ? 0.10 : 0;
  const mobNorm2 = mobNorm * 0.70 + (xp / 5) * 0.20 - routPen;
  const mob      = scale(clamp(mobNorm2, 0, 1));

  // ÉLAN: xp (50%) + leader trait (30%) + morale ratio (20%)
  const elanNorm = (xp / 5) * 0.50 + elanBonus * 0.30 / 0.18 + morRatio * 0.20;
  const elan     = scale(clamp(elanNorm, 0, 1));

  // STAM: xp (40%) + strength ratio if live (40%) + baseline (20%)
  let strRatio = 0.75;  // roster baseline (midpoint of mkUnit range / maxStr)
  if (typeof src.strength === "number" && typeof src.maxStr === "number" && src.maxStr > 0) {
    strRatio = clamp(src.strength / src.maxStr, 0, 1);
  }
  const stamNorm = (xp / 5) * 0.40 + strRatio * 0.40 + 0.20;
  const stam     = scale(clamp(stamNorm, 0, 1));

  // ---- OVR: weighted blend ----
  const wt = _OVR_WEIGHTS[type] || _OVR_WEIGHTS["inf"];
  const ovrRaw = fire * wt.fire + disc * wt.disc + mob * wt.mob + elan * wt.elan + stam * wt.stam;
  const OVR    = clamp(Math.round(ovrRaw), 40, 99);

  // ---- Dev tier / label ----
  const devLabels = ["Normal", "Star", "Superstar", "X-Factor"];
  const devLabel  = devLabels[dev] || "Normal";

  // ---- X-Factor proc ----
  const xfactor = xfactorFor(src.name || src.vetName || "");

  return { OVR, fire, disc, mob, elan, stam, dev, devLabel, xfactor };
}

// ---- XFACTOR_PROCS — keyed by lowercase name substring ----
// Each entry: {label, desc}
const XFACTOR_PROCS = {
  "iron brigade":  { label: "Black Hats",     desc: "Aura: adjacent infantry hold the line — rout threshold −8." },
  "iron":          { label: "Iron Will",       desc: "First rout check this battle is auto-passed." },
  "texas":         { label: "Lone Star Shock", desc: "First charge deals +20% casualties." },
  "stonewall":     { label: "Hold the Line",   desc: "In defense, morale loss reduced 25%." },
  "irish":         { label: "Clear the Way",   desc: "Charge bonus +15%; never retreats voluntarily." },
  "berdan":        { label: "Sharpshooter",    desc: "Fire range +1 hex; ignores half of target's entrench bonus." },
  "lightning":     { label: "Lightning March", desc: "Movement +2 hexes on first turn of every battle." },
  "orphan":        { label: "No Surrender",    desc: "Rallies automatically at end of round if strength ≥ 50%." },
  "zouave":        { label: "Parade Ground",   desc: "Starts every battle with +5 morale above max." },
  "colored":       { label: "Proving Ground",  desc: "XP gains doubled; disc rating treated as +10 for charge resistance." },
  "usct":          { label: "Proving Ground",  desc: "XP gains doubled; disc rating treated as +10 for charge resistance." },
  "virginia":      { label: "Old Dominion",    desc: "In defense on home-state terrain, +15% fire and melee." },
  "palmetto":      { label: "First to Fire",   desc: "Always fires first in simultaneous exchanges." },
  "excelsior":     { label: "Sickles' Own",    desc: "Rout range extended — withdraws rather than routs outright." },
  "black hat":     { label: "Black Hats",      desc: "Aura: adjacent infantry hold the line — rout threshold −8." },
  "lightning":     { label: "Lightning March", desc: "Movement +2 hexes on first turn of every battle." },
};

// ---- xfactorFor(name) ----
// Returns the first matching XFACTOR_PROCS entry or null.
function xfactorFor(name) {
  if (!name) return null;
  const lower = name.toLowerCase();
  const keys  = Object.keys(XFACTOR_PROCS);
  for (let i = 0; i < keys.length; i++) {
    if (lower.indexOf(keys[i]) !== -1) {
      return XFACTOR_PROCS[keys[i]];
    }
  }
  return null;
}

// ---- devTierColor(dev) ----
// Returns a CSS color string for the dev tier badge text/border.
// All colors tested against --panel (#1c1610) dark background.
// WCAG AA requires ≥4.5:1 for normal text.
//
// Contrast ratios vs #1c1610 (lum ≈ 0.009):
//   Normal  #8a8a8a  grey       → ratio ≈ 7.1:1  ✓ AA
//   Star    #c9a85f  brass-lt   → ratio ≈ 7.8:1  ✓ AA
//   Super   #c0c8d0  silver-lt  → ratio ≈ 11.2:1 ✓ AA
//   XFactor #e8c84a  gold       → ratio ≈ 12.4:1 ✓ AA
function devTierColor(dev) {
  switch (dev) {
    case 0:  return "#8a8a8a";  // Normal   — grey,    7.1:1 vs #1c1610
    case 1:  return "#c9a85f";  // Star     — brass,   7.8:1 vs #1c1610
    case 2:  return "#c0c8d0";  // Super    — silver, 11.2:1 vs #1c1610
    case 3:  return "#e8c84a";  // X-Factor — gold,   12.4:1 vs #1c1610
    default: return "#8a8a8a";
  }
}

// ---- renderRatingsCard(src, opts) ----
// Returns an HTML string.
// opts.compact → small inline badge: OVR number + dev dot only (for table cells).
// opts.noStyle  → skip ensureRatingsStyle() call (caller manages).
function renderRatingsCard(src, opts) {
  const o = opts || {};
  if (!o.noStyle) ensureRatingsStyle();

  const r    = ratingsFor(src);
  const type = src.type || "inf";
  const col  = devTierColor(r.dev);

  // ---- Compact badge ----
  if (o.compact) {
    return '<span class="rc-compact" style="border-color:' + col + ';color:' + col + '">'
      + '<span class="rc-compact-ovr" style="color:' + col + '">' + r.OVR + '</span>'
      + '<span class="rc-compact-dot t' + r.dev + '" title="' + r.devLabel + '"></span>'
      + '</span>';
  }

  // ---- Full card ----
  const armEntry   = (typeof ARM !== "undefined" && ARM[type]) ? ARM[type] : { name: type };
  const weapEntry  = (src.weapon && typeof WEAPONS !== "undefined" && WEAPONS[src.weapon]) ? WEAPONS[src.weapon] : null;
  const displayName = src.name || src.vetName || (armEntry.name + " Regiment");
  const armLine    = armEntry.name + (weapEntry ? " — " + weapEntry.name : "");

  // Header
  let h = '<div class="rc-card">';
  h += '<div class="rc-header">';
  h += '<div class="rc-ovr-badge" style="border-color:' + col + '">';
  h += '<span class="rc-ovr-num" style="color:' + col + '">' + r.OVR + '</span>';
  h += '<span class="rc-ovr-lbl">OVR</span>';
  h += '</div>';
  h += '<div class="rc-name-block">';
  h += '<div class="rc-name">' + _escHtml(displayName) + '</div>';
  h += '<div class="rc-arm-line">' + _escHtml(armLine) + '</div>';
  h += '</div>';
  h += '</div>'; // .rc-header

  // Dev tier badge (colorblind-safe: shape dot + text label + numeric OVR above)
  h += '<div class="rc-dev-badge" style="border-color:' + col + ';color:' + col + '">';
  h += '<span class="rc-dev-dot t' + r.dev + '" aria-hidden="true"></span>';
  h += '<span>' + r.devLabel + '</span>';
  h += '</div>';

  h += '<div class="rc-rule"></div>';

  // Five rating bars
  const bars = [
    { key: "fire", label: "FIR", cls: "rc-fill-fire", val: r.fire },
    { key: "disc", label: "DIS", cls: "rc-fill-disc", val: r.disc },
    { key: "mob",  label: "MOB", cls: "rc-fill-mob",  val: r.mob  },
    { key: "elan", label: "ÉLA", cls: "rc-fill-elan", val: r.elan },
    { key: "stam", label: "STA", cls: "rc-fill-stam", val: r.stam },
  ];
  for (let i = 0; i < bars.length; i++) {
    const b    = bars[i];
    const pct  = Math.round((b.val - 40) / 59 * 100);  // map 40-99 → 0-100%
    const low  = b.val < 55;
    const fill = low ? "rc-fill-low" : b.cls;
    h += '<div class="rc-stat">';
    h += '<span class="rc-stat-lbl">' + b.label + '</span>';
    h += '<div class="rc-bar-wrap">';
    h += '<i class="rc-bar-fill ' + fill + '" style="width:' + pct + '%" aria-hidden="true"></i>';
    h += '</div>';
    h += '<span class="rc-stat-num">' + b.val + '</span>';
    h += '</div>'; // .rc-stat
  }

  // X-Factor proc line
  if (r.xfactor) {
    h += '<div class="rc-rule"></div>';
    h += '<div class="rc-xfactor">';
    h += '<div class="rc-xfactor-lbl">⚡ ' + _escHtml(r.xfactor.label) + '</div>';
    h += '<div class="rc-xfactor-desc">' + _escHtml(r.xfactor.desc) + '</div>';
    h += '</div>';
  }

  h += '</div>'; // .rc-card
  return h;
}

// ---- _escHtml(s) — local helper; does NOT shadow any engine symbol ----
function _escHtml(s) {
  if (!s) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}



/* ==== §23 — MODERN 3D RENDERER (WebGL / Three.js) ====
   Graphics mode "modern" — a real 3D battlefield (terrain heightmap + orbit
   camera + lighting + 3D unit tokens + raycast hex-picking). "classic" keeps
   the existing 2D canvas board untouched. Toggle in Settings.

   Progressive fidelity: v1 = vertex-colored hex terrain + simple unit tokens
   (works once Three.js loads; tokens upgrade to painted billboards, then to
   .glb models from assets/3d/ as those land). Three.js + addons load from
   jsdelivr (the game runs in the user's own browser — not the cdnjs-only
   artifact sandbox — so addons like OrbitControls are available).

   Everything is GUARDED: if Three fails to load (offline / blocked), we revert
   to "classic" with a toast and the 2D game is unaffected. The 2D renderer is
   never modified — draw() just early-returns its battlefield paint when modern
   is active (see the guard spliced into draw()).
   ---------------------------------------------------------------- */
var __M3D = {
  loading: false, ready: false, failed: false,
  scene: null, camera: null, renderer: null, controls: null,
  raf: 0, glcv: null, terrainGroup: null, unitGroup: null,
  raycaster: null, battleId: null, S: 0.06, EH: 2.4,
};
var THREE_BASE = "https://cdn.jsdelivr.net/npm/three@0.128.0/";
// Required core — if any of these fail, Modern is unavailable (reverts to Classic).
var THREE_CORE = [
  THREE_BASE + "build/three.min.js",
  THREE_BASE + "examples/js/controls/OrbitControls.js",
];
// Optional addons — enable .glb models + HDRI when assets arrive. Their failure
// must NOT abort Modern (CDN hiccup ≠ no 3D); billboards/flat-sky stay the fallback.
var THREE_ADDONS = [
  THREE_BASE + "examples/js/loaders/GLTFLoader.js",
  THREE_BASE + "examples/js/loaders/RGBELoader.js",
];

function _m3dModern() { return G.settings && G.settings.gfx === "modern"; }

function _m3dLoadOne(src, ok, fail) {
  var s = document.createElement("script");
  s.src = src; s.onload = ok; s.onerror = fail || ok;
  document.head.appendChild(s);
}

function _m3dLoadAddons(done) {
  var j = 0;
  (function nextAddon() {
    if (j >= THREE_ADDONS.length) { done(); return; }
    _m3dLoadOne(THREE_ADDONS[j++], nextAddon, nextAddon); // ignore individual failures
  })();
}

function _m3dLoadScripts(cb) {
  if (typeof window === "undefined") { cb(false); return; }
  if (window.THREE && window.THREE.OrbitControls) { _m3dLoadAddons(function () { cb(true); }); return; }
  var i = 0;
  (function nextCore() {
    if (i >= THREE_CORE.length) {
      if (!(window.THREE && window.THREE.OrbitControls)) { cb(false); return; }
      _m3dLoadAddons(function () { cb(true); });
      return;
    }
    _m3dLoadOne(THREE_CORE[i++], nextCore, function () { cb(false); });
  })();
}

function _m3dEnsureCanvas() {
  if (__M3D.glcv) return __M3D.glcv;
  var map = document.getElementById("map");

  _clkPush(k, _clkEsc(name) + ": " + verdict +
    " (weariness " + k.weariness + ", capital " + capSign + ").");
}

// PURE render of the map-room telegraph panel. Calls clkInit, never throws, no listeners.
function clkRenderHTML(C) {

  return '<div class="benchbox" style="background:#f5edd6;color:#2b2118;border:1px solid #c8b07a;' +

      '<div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#5c3c18;' +

      meter("Foreign Intervention", k.intervention, k.intervention, 'linear-gradient(#7a8fc0,#3a4a8a)') +
      '<div class="kv" style="margin:6px 0;">' +
        '<div style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#5c3c18;margin-bottom:2px;">' +

      dispatches +

// Wire the #clkBond button. Mutates C.clock + C.funds, re-renders, saves.
function clkWire(C) {
  if (!C) return;
  clkInit(C);
  var btn = document.getElementById("clkBond");
  if (!btn) return;
  btn.addEventListener("click", function () {
    var k = C.clock;
    var cost = _clkBondCost(k);
    if (k.capital >= cost) {
      k.capital -= cost;
      C.funds = (C.funds || 0) + 150;
      k.bonds = (k.bonds || 0) + 1;
      _clkPush(k, "War-bond drive subscribed: +150 funds.");
      if (typeof _wdRefresh === "function") _wdRefresh();
      saveLocal();
    } else {
      toast("Not enough political capital.");
    }
  });
}
